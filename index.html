<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slime Dungeon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a0a;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Press Start 2P',monospace;overflow:hidden}
    canvas{display:block}
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
ctx.imageSmoothingEnabled=false;

const STONE='#3a3a4a',STONE_L='#5a5a6a',STONE_D='#2a2a3a',STONE_DD='#1a1a2a',STONE_DDD='#0e0e18',
TORCH='#ff9944',TORCH_G='#ffcc66',
SLIME='#66bb6a',SLIME_D='#4a9a4a',SLIDE='#44aaff',SLIDE_D='#2288dd',FLYER='#ff88aa',FLYER_D='#cc6688',
SLIME_BOSS='#9944ff',SLIME_BOSS_D='#6622bb',
PLAYER='#4488ff',PLAYER_D='#2255bb',WHITE='#ffffff',BLACK='#0a0a12',COIN='#ffdd44',
HP_FULL='#44cc44',HP_EMPTY='#333344',HP_BOSS='#cc4444',MANA='#4488ff',MANA_E='#223344',
VINE='#2a5a2a',VINE_D='#1a4a1a',MOSS='#3a6a3a',MOSS_D='#2a5a2a',
WOOD='#5a4a3a',WOOD_D='#4a3a2a',WOOD_DD='#3a2a1a',WATER='#4488cc',WATER_D='#2266aa';

let state='menu',score=0,coins=0,hi=parseInt(localStorage.getItem('slimeHi9'))||0,frame=0,room=0,shake=0,flash=0;
let fadeAlpha=0,fadeDir=0,fadeTarget=null,camX=0;
const RW=canvas.width*3,RH=canvas.height-80,GY=RH-65;

const P={x:100,y:GY,w:48,h:60,dh:32,dw:60,vy:0,jmp:false,duck:false,run:false,
  hp:5,maxHp:5,mana:10,maxMana:10,inv:0,pf:0,scd:0,face:1,jumps:0,maxJumps:2,bf:0};

let boss=null,bossSpawned=false;
const slimes=[],slides=[],flyers=[],bul=[],bossBul=[],parts=[];
const layer1=[],layer2=[],layer3=[],layerFront=[],waterDrops=[],mossPatches=[];

const AC=new(window.AudioContext||window.webkitAudioContext)();
function snd(t){
  if(AC.state==='suspended')AC.resume();
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);const n=AC.currentTime;
  const f={jump:['square',200,500,.06,.08],shoot:['square',600,200,.04,.06],
    hit:['sawtooth',100,60,.12,.1],kill:['sine',500,1000,.06,.08],coin:['sine',800,1200,.08,.06],
    hurt:['sawtooth',150,80,.12,.12],boss:['sawtooth',80,40,.4,.15],
    door:['sawtooth',150,80,.15,.1],dash:['sawtooth',300,100,.08,.1],
    win:['sine',400,800,.25,.1],slide:['sine',200,400,.04,.05],
    bshoot:['square',150,60,.1,.1],squish:['sine',150,80,.08,.1],
    drip:['sine',800,400,.05,.03]}[t];
  if(!f)return;
  o.type=f[0];o.frequency.setValueAtTime(f[1],n);o.frequency.exponentialRampToValueAtTime(f[2],n+f[3]);
  g.gain.setValueAtTime(f[4],n);g.gain.exponentialRampToValueAtTime(.001,n+f[3]+.02);
  o.start(n);o.stop(n+f[3]+.03);
}

function r(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x|0,y|0,w|0,h|0);}

function genLayers(){
  layer1.length=0;layer2.length=0;layer3.length=0;layerFront.length=0;
  waterDrops.length=0;mossPatches.length=0;
  
  for(let i=0;i<20;i++){
    layer1.push({x:Math.random()*RW,y:40+Math.random()*(GY-120),flicker:Math.random()*10});
  }
  for(let i=0;i<15;i++){
    layer2.push({x:Math.random()*RW,y:60+Math.random()*(GY-140),flicker:Math.random()*10});
  }
  for(let i=0;i<25;i++){
    layer3.push({x:Math.random()*RW,y:GY,type:Math.floor(Math.random()*4)});
  }
  for(let i=0;i<10;i++){
    layerFront.push({
      x:Math.random()*RW,
      w:150+Math.random()*200,
      h:120+Math.random()*180,
      type:Math.floor(Math.random()*4)
    });
  }
  for(let i=0;i<8;i++){
    waterDrops.push({
      x:Math.random()*RW,
      y:20+Math.random()*60,
      speed:1+Math.random()*2,
      active:Math.random()<.5
    });
  }
  for(let i=0;i<15;i++){
    mossPatches.push({
      x:Math.random()*RW,
      y:30+Math.random()*(GY-80),
      w:20+Math.random()*40,
      h:10+Math.random()*20
    });
  }
}

function drawMoss(){
  mossPatches.forEach(m=>{
    const parallax=camX*.5;
    const drawX=m.x-parallax;
    if(drawX<-60||drawX>canvas.width+60)return;
    ctx.globalAlpha=.4;
    for(let i=0;i<3;i++){
      r(drawX+i*m.w/3,m.y+i*3,m.w/3,m.h*.6,MOSS);
      r(drawX+i*m.w/3+2,m.y+i*3+2,m.w/3-4,m.h*.4,MOSS_D);
    }
    ctx.globalAlpha=1;
  });
}

function drawWaterDrops(){
  waterDrops.forEach(d=>{
    const parallax=camX*.3;
    const drawX=d.x-parallax;
    if(drawX<-20||drawX>canvas.width+20)return;
    if(!d.active){
      if(Math.random()<.01){d.active=true;d.y=20+Math.random()*40;}
      return;
    }
    d.y+=d.speed;
    if(d.y>GY-10){
      d.active=false;
      snd('drip');
      r(drawX-3,GY-5,6,3,WATER);
      r(drawX-2,GY-4,4,2,WATER_D);
    }
    r(drawX,d.y,2,6,WATER);
    r(drawX+1,d.y+2,1,3,WATER_D);
  });
}

function drawLayer1(){
  layer1.forEach(c=>{
    const parallax=camX*.15;
    const drawX=c.x-parallax;
    if(drawX<-60||drawX>canvas.width+60)return;
    const fl=Math.sin(frame*.1+c.flicker)*.3+.7;
    const grad=ctx.createRadialGradient(drawX,c.y,5,drawX,c.y,40*fl);
    grad.addColorStop(0,'rgba(255,180,80,0.6)');
    grad.addColorStop(.4,'rgba(255,140,50,0.2)');
    grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad;
    ctx.fillRect(drawX-40,c.y-40,80,80);
    r(drawX-4,c.y,8,20,STONE_L);
    r(drawX-7,c.y-4,14,8,STONE_L);
    r(drawX-5,c.y-2,10,4,STONE);
    const fs=8+Math.sin(frame*.12+c.flicker)*3;
    r(drawX-fs/2,c.y-fs-3,fs,fs+3,TORCH);
    r(drawX-fs/2+2,c.y-fs-1,fs-4,fs-1,TORCH_G);
    r(drawX-3,c.y-fs-8,6,6,'#fff');
    r(drawX-1,c.y-fs-6,2,2,'#ff8');
    for(let i=0;i<4;i++){
      const sx=drawX+(Math.random()-.5)*fs*1.2;
      const sy=c.y-fs-5-Math.random()*12;
      r(sx,sy,2,2,'rgba(255,200,100,0.8)');
    }
  });
}

function drawLayer2(){
  layer2.forEach(c=>{
    const parallax=camX*.35;
    const drawX=c.x-parallax;
    if(drawX<-50||drawX>canvas.width+50)return;
    const fl=Math.sin(frame*.11+c.flicker)*.25+.75;
    const grad=ctx.createRadialGradient(drawX,c.y,6,drawX,c.y,55*fl);
    grad.addColorStop(0,'rgba(255,160,60,0.5)');
    grad.addColorStop(.5,'rgba(255,120,40,0.15)');
    grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad;
    ctx.fillRect(drawX-55,c.y-55,110,110);
    r(drawX-5,c.y,10,28,STONE_L);
    r(drawX-9,c.y-5,18,10,STONE_L);
    r(drawX-7,c.y-3,14,6,STONE);
    const fs=10+Math.sin(frame*.13+c.flicker)*3;
    r(drawX-fs/2,c.y-fs-4,fs,fs+4,TORCH);
    r(drawX-fs/2+2,c.y-fs-2,fs-4,fs,TORCH_G);
    r(drawX-3,c.y-fs-9,6,6,'#fff');
    r(drawX-1,c.y-fs-7,2,2,'#ff8');
    for(let i=0;i<5;i++){
      const sx=drawX+(Math.random()-.5)*fs*1.5;
      const sy=c.y-fs-8-Math.random()*15;
      r(sx,sy,3,3,'rgba(255,200,100,0.7)');
    }
  });
}

function drawLayer3(){
  layer3.forEach(o=>{
    const parallax=camX*.55;
    const drawX=o.x-parallax;
    if(drawX<-150||drawX>canvas.width+150)return;
    ctx.globalAlpha=.35;
    if(o.type===0){
      r(drawX,GY-80,60,80,WOOD);
      r(drawX+5,GY-75,50,10,WOOD_D);
      r(drawX+3,GY-60,25,5,WOOD_DD);
      r(drawX+35,GY-50,20,5,WOOD_DD);
      r(drawX+8,GY-35,30,4,WOOD_D);
      r(drawX+50,GY-95,8,95,WOOD_D);
      r(drawX+52,GY-92,4,4,WOOD_DD);
      r(drawX+20,GY-110,6,30,WOOD_DD);
    }else if(o.type===1){
      r(drawX,GY-60,45,60,WOOD);
      r(drawX-10,GY-50,20,8,WOOD_D);
      r(drawX+35,GY-35,18,6,WOOD_D);
      for(let i=0;i<4;i++)r(drawX+5+i*10,GY-45+i*8,8,3,WOOD_DD);
      r(drawX+15,GY-80,5,20,WOOD_DD);
      r(drawX+30,GY-75,4,15,WOOD_DD);
    }else if(o.type===2){
      r(drawX,GY-70,50,70,WOOD);
      r(drawX+15,GY-90,20,20,WOOD_D);
      r(drawX+20,GY-105,10,15,WOOD_DD);
      r(drawX+5,GY-40,40,5,WOOD_DD);
      r(drawX+10,GY-25,25,4,WOOD_D);
      r(drawX+35,GY-120,6,50,WOOD_DD);
      r(drawX+10,GY-115,4,45,WOOD_DD);
    }else{
      for(let i=0;i<3;i++){
        r(drawX+i*25,GY-(50-i*10),20,50-i*10,WOOD);
        r(drawX+i*25+5,GY-(40-i*10),10,5,WOOD_DD);
      }
      r(drawX+10,GY-85,4,35,WOOD_DD);
      r(drawX+35,GY-80,5,30,WOOD_DD);
      r(drawX+55,GY-70,4,20,WOOD_DD);
    }
    ctx.globalAlpha=1;
  });
}

function drawLayerFront(){
  layerFront.forEach(s=>{
    const parallax=camX*.85;
    const drawX=s.x-parallax;
    if(drawX<-300||drawX>canvas.width+300)return;
    
    if(s.type===0){
      ctx.globalAlpha=.2;
      r(drawX,GY-s.h,s.w,s.h,'#050508');
      r(drawX+s.w*.15,GY-s.h-40,s.w*.7,40,'#050508');
      r(drawX+s.w*.3,GY-s.h-70,s.w*.4,30,'#050508');
      r(drawX+s.w*.35,GY-s.h-100,s.w*.3,30,'#050508');
      r(drawX+15,GY-s.h+20,12,40,'#040406');
      r(drawX+s.w-27,GY-s.h+25,12,35,'#040406');
      r(drawX+s.w*.25,GY-s.h-55,8,60,'#030305');
      r(drawX+s.w*.65,GY-s.h-50,8,55,'#030305');
      r(drawX+s.w*.45,GY-s.h-120,6,50,'#030305');
    }else if(s.type===1){
      ctx.globalAlpha=.18;
      r(drawX,GY-s.h*.6,s.w,s.h*.6,'#050508');
      r(drawX+s.w*.1,GY-s.h,s.w*.3,s.h*.4,'#050508');
      r(drawX+s.w*.55,GY-s.h*.85,s.w*.25,s.h*.25,'#050508');
      r(drawX+s.w*.4,GY-s.h*.5,20,50,'#040406');
      r(drawX+s.w*.7,GY-s.h*.4,16,45,'#040406');
      r(drawX+s.w*.15,GY-s.h*.7,10,35,'#030305');
      r(drawX+s.w*.5,GY-s.h*.75,8,30,'#030305');
      r(drawX+s.w*.85,GY-s.h*.45,6,25,'#030305');
    }else if(s.type===2){
      ctx.globalAlpha=.16;
      r(drawX,GY-s.h*.5,s.w,s.h*.5,'#050508');
      r(drawX+s.w*.2,GY-s.h*.7,s.w*.6,s.h*.2,'#050508');
      r(drawX+s.w*.35,GY-s.h*.9,s.w*.3,s.h*.2,'#050508');
      for(let i=0;i<3;i++){
        r(drawX+s.w*(.15+i*.35),GY-s.h*.6,10,45,'#040406');
      }
      r(drawX+s.w*.4,GY-s.h*.4,8,30,'#030305');
      r(drawX+s.w*.6,GY-s.h*.55,6,35,'#030305');
    }else{
      ctx.globalAlpha=.17;
      r(drawX,GY-s.h*.4,s.w,s.h*.4,'#050508');
      r(drawX+s.w*.1,GY-s.h*.6,s.w*.2,s.h*.2,'#050508');
      r(drawX+s.w*.7,GY-s.h*.55,s.w*.2,s.h*.15,'#050508');
      for(let i=0;i<4;i++){
        r(drawX+s.w*(.05+i*.25),GY-s.h*(.3+i*.08),8,20+i*10,'#040406');
      }
      r(drawX+s.w*.3,GY-s.h*.5,6,25,'#030305');
      r(drawX+s.w*.55,GY-s.h*.45,5,20,'#030305');
    }
    ctx.globalAlpha=1;
  });
}

function drawRoom(){
  ctx.fillStyle=STONE_DDD;ctx.fillRect(0,0,canvas.width,RH);
  for(let x=-camX*.05%65;x<canvas.width+65;x+=65){
    for(let y=0;y<RH;y+=32){
      const off=(Math.floor(y/32)%2)*32;
      r(x+off,y,63,30,STONE_D);
      r(x+off,y,63,2,STONE);
      r(x+off,y+28,63,2,STONE_DD);
    }
  }
  drawMoss();
  drawLayer3();
  drawWaterDrops();
  drawLayer2();
  drawLayer1();
  r(0,GY,canvas.width,10,STONE_L);
  r(0,GY+10,canvas.width,RH-GY-10,STONE_D);
  for(let x=-camX*.2%50;x<canvas.width+50;x+=50)r(x,GY+10,47,16,STONE);
  drawLayerFront();
  r(0,0,canvas.width,10,'#1a1a2a');
  r(0,0,10,RH,'#1a1a2a');
  r(canvas.width-10,0,10,RH,'#1a1a2a');
  r(0,0,canvas.width,4,'#2a2a3a');
  r(0,0,4,RH,'#2a2a3a');
  r(canvas.width-4,0,4,RH,'#2a2a3a');
}

function drawDoor(){
  const doorScreenX=RW-80-camX;
  const dx=doorScreenX,dy=GY-95,dw=60,dh=95;
  if(dx<canvas.width+120&&dx>-120){
    const allDead=slimes.length===0&&slides.length===0&&flyers.length===0&&!boss;
    if(allDead){
      const gl=Math.sin(frame*.05)*.3+.7;
      const grad=ctx.createRadialGradient(dx+dw/2,dy+dh/2,10,dx+dw/2,dy+dh/2,100*gl);
      grad.addColorStop(0,'rgba(80,255,80,0.5)');
      grad.addColorStop(1,'transparent');
      ctx.fillStyle=grad;ctx.fillRect(dx-90,dy-90,dw+180,dh+180);
      r(dx,dy,dw,dh,'#3a6a3a');
      r(dx+8,dy+8,dw-16,dh-16,'#4a8a4a');
      r(dx+14,dy+14,dw-28,dh-28,'#5aaa5a');
      ctx.fillStyle=WHITE;ctx.font='16px "Press Start 2P",monospace';ctx.textAlign='center';
      ctx.fillText('EXIT',dx+dw/2,dy-18);
    }else{
      r(dx,dy,dw,dh,'#4a3a3a');
      r(dx+8,dy+8,dw-16,dh-16,'#5a4a4a');
      r(dx+14,dy+14,dw-28,dh-28,'#6a5a5a');
      r(dx+dw/2-12,dy+dh/2-12,24,24,'#aa6644');
      r(dx+dw/2-7,dy+dh/2-7,14,14,'#884422');
      ctx.fillStyle='#ff8866';ctx.font='14px "Press Start 2P",monospace';ctx.textAlign='center';
      ctx.fillText('LOCKED',dx+dw/2,dy-16);
      const rem=slimes.length+slides.length+flyers.length+(boss?1:0);
      ctx.fillText(rem+' left',dx+dw/2,dy+dh+22);
    }
    r(dx-10,dy-10,dw+20,10,'#5a5a6a');
    r(dx-10,dy+dh,dw+20,10,'#5a5a6a');
    r(dx-10,dy,10,dh,'#5a5a6a');
    r(dx+dw,dy,10,dh,'#5a5a6a');
  }
}

function drawSlime(s){
  const sX=s.x-camX;
  if(sX<-250||sX>canvas.width+250)return;
  const sq=Math.sin(frame*.04+s.x*.08)*.12;
  const w=s.w*(1+sq),h=s.h*(1-sq);
  const col=s.boss?SLIME_BOSS:SLIME,colD=s.boss?SLIME_BOSS_D:SLIME_D;
  if(s.flash>0&&s.flash%2===0)return;
  const sx=sX+(s.w-w)/2,sy=s.y-h;
  r(sx+4,sy+h-5,w-8,10,'rgba(0,0,0,0.35)');
  r(sx,sy,w,h,col);
  r(sx+6,sy+6,w-12,h-12,colD);
  r(sx+10,sy+10,w-20,h/2+6,col);
  r(sx+w*.15,sy+h*.25,14,14,WHITE);
  r(sx+w*.6,sy+h*.25,14,14,WHITE);
  r(sx+w*.15+5,sy+h*.25+5,6,6,BLACK);
  r(sx+w*.6+5,sy+h*.25+5,6,6,BLACK);
  if(s.boss){
    if(s.hp<=s.mhp/2){
      ctx.fillStyle=`rgba(255,50,50,${.2+Math.sin(frame*.12)*.12})`;
      ctx.beginPath();ctx.arc(sx+w/2,sy+h/2,w*.7,0,Math.PI*2);ctx.fill();
    }
    r(sx+w*.2,sy+h*.45,w*.6,8,'#ff4444');
    r(sx+w*.25,sy+h*.55,w*.5,5,'#cc2222');
    r(sx+w*.3,sy+h*.65,w*.4,3,'#aa1111');
  }
}

function drawSlide(e){
  const eX=e.x-camX;
  if(eX<-120||eX>canvas.width+120)return;
  if(e.flash>0&&e.flash%2===0)return;
  const stretch=Math.sin(frame*.08+e.x*.08)*.1;
  const w=e.w*(1+stretch),h=e.h*(1-stretch*.4);
  const sx=eX+(e.w-w)/2,sy=e.y-h;
  r(sx+4,sy+h-4,w-8,8,'rgba(0,0,0,0.25)');
  r(sx,sy,w,h,SLIDE);
  r(sx+6,sy+6,w-12,h-12,SLIDE_D);
  r(sx+10,sy+10,w-20,h/2,SLIDE);
  r(sx+w*.18,sy+h*.28,12,12,WHITE);
  r(sx+w*.55,sy+h*.28,12,12,WHITE);
  r(sx+w*.18+4,sy+h*.28+4,6,6,BLACK);
  r(sx+w*.55+4,sy+h*.28+4,6,6,BLACK);
}

function drawFlyer(e){
  const eX=e.x-camX;
  if(eX<-120||eX>canvas.width+120)return;
  if(e.flash>0&&e.flash%2===0)return;
  const bob=Math.sin(frame*.06+e.x*.025)*10;
  const wing=Math.sin(frame*.1+e.x)*.5;
  r(eX+e.w/2-4,e.y-18+bob,8,24,FLYER_D);
  r(eX-8,e.y-28+bob,e.w+16,22,FLYER);
  r(eX,e.y-22+bob,e.w,14,FLYER_D);
  r(eX-20+wing*18,e.y-16+bob,22,12,FLYER);
  r(eX+e.w-2-wing*18,e.y-16+bob,22,12,FLYER);
  r(eX+8,e.y-20+bob,10,10,WHITE);
  r(eX+e.w-18,e.y-20+bob,10,10,WHITE);
  r(eX+11,e.y-17+bob,5,5,BLACK);
  r(eX+e.w-15,e.y-17+bob,5,5,BLACK);
  r(eX+e.w/2-5,e.y-4+bob,10,5,FLYER_D);
}

function drawPlayer(){
  if(P.inv>0&&Math.floor(P.inv/3)%2===0)return;
  const fl=P.pf>0?WHITE:PLAYER;
  let w,h,py;
  if(P.duck){w=P.dw;h=P.dh;py=GY-h;}else{w=P.w;h=P.h;py=P.y-h;}
  const x=P.x-camX;
  const bounce=P.run&&!P.jmp?Math.sin(P.bf)*5:0;
  r(x-5,GY-5,w+10,10,'rgba(0,0,0,0.3)');
  r(x,py-bounce,w,h,fl);
  r(x+5,py+5-bounce,w-10,h-10,PLAYER_D);
  r(x+(P.face>0?w-16:7),py+16-bounce,14,14,WHITE);
  r(x+(P.face>0?w-12:11),py+20-bounce,7,7,BLACK);
  if(!P.duck&&!P.jmp){
    const l=Math.floor(P.bf/3)%2;
    r(x+6,py+h-bounce,16,l?20:9,PLAYER_D);
    r(x+w-22,py+h-bounce,16,l?9:20,PLAYER_D);
    r(x+4,py+h+(l?20:9)-bounce,20,7,PLAYER_D);
    r(x+w-24,py+h+(l?9:20)-bounce,20,7,PLAYER_D);
  }
  if(P.jmp){r(x+5,py+h,18,9,PLAYER_D);r(x+w-23,py+h,18,9,PLAYER_D);}
}

function drawBullets(){
  bul.forEach(b=>{
    const bX=b.x-camX;
    const grad=ctx.createRadialGradient(bX+10,b.y+4,0,bX+10,b.y+4,20);
    grad.addColorStop(0,'rgba(68,136,255,0.6)');
    grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad;ctx.fillRect(bX-12,b.y-12,44,28);
    r(bX,b.y,20,8,MANA);r(bX+4,b.y+1,12,6,WHITE);
  });
}

function drawBossBullets(){
  bossBul.forEach(b=>{
    const bX=b.x-camX;
    const grad=ctx.createRadialGradient(bX+8,b.y+8,0,bX+8,b.y+8,18);
    grad.addColorStop(0,'rgba(153,68,255,0.7)');
    grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad;ctx.fillRect(bX-10,b.y-10,36,36);
    r(bX,b.y,16,16,SLIME_BOSS);r(bX+3,b.y+3,10,10,SLIME_BOSS_D);
  });
}

function drawHUD(){
  ctx.fillStyle='#1a1a2a';ctx.fillRect(0,RH,canvas.width,80);
  ctx.strokeStyle='#3a3a4a';ctx.lineWidth=2;
  ctx.strokeRect(5,RH+5,canvas.width-10,70);
  ctx.fillStyle='#8888aa';ctx.font='14px "Press Start 2P",monospace';ctx.textAlign='left';
  ctx.fillText('HP',20,RH+30);
  for(let i=0;i<P.maxHp;i++){
    r(70+i*36,RH+14,32,22,i<P.hp?HP_FULL:HP_EMPTY);
    r(72+i*36,RH+16,28,18,i<P.hp?'#66ee66':'#444455');
  }
  ctx.fillText('MANA',20,RH+60);
  for(let i=0;i<P.maxMana;i++)r(100+i*22,RH+48,18,20,i<P.mana?MANA:MANA_E);
  ctx.textAlign='center';
  ctx.fillStyle=COIN;ctx.fillText('COINS: '+coins,canvas.width/2,RH+30);
  ctx.fillStyle='#8888aa';
  ctx.fillText('ROOM '+(room+1)+'/6',canvas.width/2,RH+60);
  ctx.textAlign='right';
  ctx.fillText('SCORE: '+Math.floor(score),canvas.width-20,RH+45);
}

function drawBossHP(){
  if(!boss)return;
  const bw=Math.min(650,canvas.width-100),bh=30,bx=(canvas.width-bw)/2,by=18;
  ctx.fillStyle=SLIME_BOSS;ctx.font='18px "Press Start 2P",monospace';ctx.textAlign='center';
  ctx.fillText('SLIME KING',canvas.width/2,by-12);
  r(bx,by,bw,bh,'#1a1a2a');
  const hp=Math.max(0,boss.hp/boss.mhp);
  r(bx+4,by+4,(bw-8)*hp,bh-8,HP_BOSS);
  if(boss.flash>0)r(bx+4,by+4,(bw-8)*hp,bh-8,'rgba(255,255,255,0.5)');
  ctx.strokeStyle='#5a5a6a';ctx.lineWidth=2;ctx.strokeRect(bx,by,bw,bh);
  for(let i=1;i<20;i++)ctx.fillRect(bx+(bw/20)*i,by+4,1,bh-8);
  ctx.fillStyle=WHITE;ctx.font='14px "Press Start 2P",monospace';
  ctx.fillText(Math.ceil(boss.hp)+'/'+boss.mhp,canvas.width/2,by+bh+20);
  if(boss.hp<=boss.mhp/2){ctx.fillStyle='#ff6666';ctx.fillText('ENRAGED!',canvas.width/2,by+bh+42);}
  if(boss.charging){ctx.fillStyle='#ff6666';ctx.fillText('DASHING!',canvas.width/2,by+bh+62);}
  else if(boss.shooting){ctx.fillStyle='#aa66ff';ctx.fillText('SHOOTING!',canvas.width/2,by+bh+62);}
  else if(boss.recharging){ctx.fillStyle='#ffaa44';ctx.fillText('RECHARGING...',canvas.width/2,by+bh+62);}
}

function drawMenu(){
  ctx.fillStyle='#08080f';ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let i=0;i<70;i++){
    const x=(i*53+frame*.12)%canvas.width;
    const y=(i*37+Math.sin(frame*.008+i)*60+100)%canvas.height;
    const s=6+Math.sin(frame*.025+i)*2;
    const grad=ctx.createRadialGradient(x,y,0,x,y,s*8);
    grad.addColorStop(0,'rgba(100,255,100,0.08)');
    grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad;ctx.fillRect(x-s*8,y-s*8,s*16,s*16);
    r(x-s/2,y-s/2,s,s,'rgba(102,187,106,0.25)');
  }
  const tY=canvas.height/2-180;
  ctx.save();
  ctx.shadowColor='#44ff44';ctx.shadowBlur=35+Math.sin(frame*.03)*18;
  ctx.fillStyle='#66ff66';ctx.font='80px "Press Start 2P",monospace';ctx.textAlign='center';
  ctx.fillText('SLIME',canvas.width/2,tY+50);
  ctx.shadowColor='#8844ff';ctx.shadowBlur=30;
  ctx.fillStyle='#cc88ff';ctx.font='72px "Press Start 2P",monospace';
  ctx.fillText('DUNGEON',canvas.width/2,tY+140);
  ctx.restore();
  ctx.strokeStyle='#44aa44';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(canvas.width/2-350,tY+165);ctx.lineTo(canvas.width/2+350,tY+165);ctx.stroke();
  ctx.fillStyle='#aaaacc';ctx.font='16px "Press Start 2P",monospace';
  ctx.fillText('WASD / Arrows: Move & Jump',canvas.width/2,tY+210);
  ctx.fillText('SPACE: Shoot Magic  |  S: Duck',canvas.width/2,tY+245);
  ctx.fillText('Double Jump Enabled',canvas.width/2,tY+280);
  if(Math.floor(frame/25)%2===0){
    ctx.save();ctx.shadowColor='#ffffff';ctx.shadowBlur=18;
    ctx.fillStyle=WHITE;ctx.font='22px "Press Start 2P",monospace';
    ctx.fillText('PRESS SPACE TO START',canvas.width/2,tY+340);
    ctx.restore();
  }
  ctx.fillStyle='#555577';ctx.font='16px "Press Start 2P",monospace';
  ctx.fillText('HIGH SCORE: '+hi,canvas.width/2,tY+390);
}

function drawGameOver(){
  ctx.fillStyle='rgba(5,5,10,0.95)';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.save();ctx.shadowColor='#ff4444';ctx.shadowBlur=22;
  ctx.fillStyle='#ff4444';ctx.font='56px "Press Start 2P",monospace';ctx.textAlign='center';
  ctx.fillText('GAME OVER',canvas.width/2,canvas.height/2-80);
  ctx.restore();
  ctx.fillStyle=WHITE;ctx.font='20px "Press Start 2P",monospace';

  ctx.fillStyle=WHITE;
  ctx.fillText('Room: '+(room+1),canvas.width/2,canvas.height/2+80);
  if(Math.floor(frame/25)%2===0)ctx.fillText('Press SPACE to restart',canvas.width/2,canvas.height/2+130);
}

function drawWin(){
  ctx.fillStyle='rgba(5,5,10,0.95)';ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let i=0;i<60;i++){
    const x=(i*67+frame*.35)%canvas.width;
    const y=(i*43+Math.sin(frame*.02+i)*70+50)%(canvas.height-100);
    r(x,y,7,7,['#ff4444','#44ff44','#4444ff','#ffff44','#ff44ff','#44ffff'][i%6]);
  }
  ctx.save();ctx.shadowColor='#44ff44';ctx.shadowBlur=35;

  ctx.fillStyle=WHITE;ctx.font='20px "Press Start 2P",monospace';
  ctx.fillText('You conquered the Slime Dungeon!',canvas.width/2,canvas.height/2-25);
  ctx.fillText('Final Score: '+Math.floor(score),canvas.width/2,canvas.height/2+20);
  ctx.fillStyle=COIN;ctx.fillText('Total Coins: '+coins,canvas.width/2,canvas.height/2+60);
  if(Math.floor(frame/25)%2===0){
    ctx.fillStyle=WHITE;ctx.fillText('Press SPACE to play again',canvas.width/2,canvas.height/2+110);
  }
}

function spawnSlime(isBoss){
  const x=200+Math.random()*(RW-400);
  const s={x:x,y:GY,w:isBoss?180:55+Math.random()*18,h:isBoss?120:36+Math.random()*14,
    hp:isBoss?30:2,mhp:isBoss?30:2,
    boss:isBoss,flash:0,chargeTimer:0,shootTimer:0,charging:false,recharging:false,shooting:false,
    dashSpeed:0,dashDir:1,moveTimer:0,moveDir:0};
  if(isBoss){s.x=RW-400;boss=s;snd('boss');}
  else slimes.push(s);
}

function spawnSlide(){
  const side=Math.random()<.5;
  slides.push({
    x:side?-80:RW+80,y:GY,
    w:55+Math.random()*22,h:28+Math.random()*14,
    hp:2,flash:0,
    vx:(side?1:-1)*(2.5+Math.random()*1.5),
    origVx:0
  });
  slides[slides.length-1].origVx=slides[slides.length-1].vx;
  snd('slide');
}

function spawnFlyer(){
  flyers.push({
    x:150+Math.random()*(RW-300),
    y:GY-90-Math.random()*70,
    w:55,h:40,hp:1,flash:0,
    vx:(Math.random()<.5?1:-1)*(0.35+Math.random()*0.25),
    vy:(Math.random()<.5?1:-1)*.12
  });
}

function spawnP(x,y,n,c){
  for(let i=0;i<n;i++)parts.push({x,y,vx:(Math.random()-.5)*9,vy:-Math.random()*9-2,s:5+Math.random()*7,l:1,c:c||SLIME});
}

function resetRoom(){
  slimes.length=0;slides.length=0;flyers.length=0;bul.length=0;bossBul.length=0;parts.length=0;
  boss=null;bossSpawned=false;
  camX=0;
  genLayers();
  const ns=2+Math.min(room,3);
  for(let i=0;i<ns;i++)spawnSlime(false);
  const nsl=1+Math.min(room,2);
  for(let i=0;i<nsl;i++)spawnSlide();
  const nfl=1+Math.min(room,2);
  for(let i=0;i<nfl;i++)spawnFlyer();
  if(room===5&&!bossSpawned){spawnSlime(true);bossSpawned=true;}
  P.x=100;P.y=GY;P.vy=0;P.jmp=false;P.jumps=0;P.inv=90;P.duck=false;
}

function reset(){
  state='play';score=0;coins=0;room=0;frame=0;shake=0;flash=0;fadeAlpha=0;fadeDir=0;
  P.hp=P.maxHp;P.mana=P.maxMana;P.inv=0;P.pf=0;P.scd=0;
  resetRoom();
}

function playerHit(){
  if(P.inv>0)return;
  P.hp--;P.inv=60;P.pf=10;snd('hurt');shake=12;
  spawnP(P.x,P.y-P.h/2,12,PLAYER);
  if(P.hp<=0){state='over';if(score>hi){hi=Math.floor(score);localStorage.setItem('slimeHi9',hi);}}
}

function col(a,b){return a.x+a.w>b.x&&a.x<b.x+b.w&&a.y>b.y&&a.y-a.h<b.y+b.h;}

function update(){
  if(state!=='play')return;
  frame++;score+=1/60;
  if(shake>0)shake--;if(flash>0)flash--;
  if(P.inv>0)P.inv--;if(P.pf>0)P.pf--;if(P.scd>0)P.scd--;
  if(P.run&&!P.jmp)P.bf+=.35;
  if(fadeDir!==0){
    fadeAlpha+=fadeDir;
    if(fadeAlpha>=1){fadeAlpha=1;fadeDir=-1;if(fadeTarget){fadeTarget();fadeTarget=null;}}
    if(fadeAlpha<=0){fadeAlpha=0;fadeDir=0;}
  }
  const targetCamX=P.x-canvas.width/3;
  camX+=(targetCamX-camX)*.08;
  camX=Math.max(0,Math.min(RW-canvas.width,camX));
  P.y+=P.vy;
  if(P.y>=GY){P.y=GY;P.vy=0;P.jmp=false;P.jumps=0;}
  if(P.jmp)P.vy+=0.5;
  P.x=Math.max(0,Math.min(RW-P.w,P.x));
  if(P.mana<P.maxMana&&frame%50===0)P.mana=Math.min(P.maxMana,P.mana+1);
  
  for(let i=bul.length-1;i>=0;i--){
    bul[i].x+=bul[i].vx;
    if(bul[i].x<0||bul[i].x>RW){bul.splice(i,1);continue;}
    let hit=false;
    for(let j=slimes.length-1;j>=0;j--){
      const s=slimes[j];
      if(bul[i]&&bul[i].x>s.x-10&&bul[i].x<s.x+s.w+10&&bul[i].y>s.y-s.h-10&&bul[i].y<s.y+10){
        s.hp--;s.flash=8;snd('squish');spawnP(bul[i].x,bul[i].y,5);bul.splice(i,1);hit=true;
        if(s.hp<=0){snd('kill');snd('coin');spawnP(s.x+s.w/2,s.y-s.h/2,12);score+=10;coins++;slimes.splice(j,1);}
        break;
      }
    }
    if(hit)continue;
    for(let j=slides.length-1;j>=0;j--){
      const e=slides[j];
      if(bul[i]&&bul[i].x>e.x-10&&bul[i].x<e.x+e.w+10&&bul[i].y>e.y-e.h-10&&bul[i].y<e.y+10){
        e.hp--;e.flash=8;snd('squish');spawnP(bul[i].x,bul[i].y,5,SLIDE);bul.splice(i,1);hit=true;
        if(e.hp<=0){snd('kill');snd('coin');spawnP(e.x+e.w/2,e.y-e.h/2,12,SLIDE);score+=15;coins++;slides.splice(j,1);}
        break;
      }
    }
    if(hit)continue;
    for(let j=flyers.length-1;j>=0;j--){
      const e=flyers[j];
      if(bul[i]&&bul[i].x>e.x-15&&bul[i].x<e.x+e.w+15&&bul[i].y>e.y-30&&bul[i].y<e.y+15){
        e.hp--;e.flash=8;snd('squish');spawnP(bul[i].x,bul[i].y,4,FLYER);bul.splice(i,1);hit=true;
        if(e.hp<=0){snd('kill');snd('coin');spawnP(e.x+e.w/2,e.y-5,10,FLYER);score+=5;coins++;flyers.splice(j,1);}
        break;
      }
    }
    if(hit)continue;
    if(boss&&bul[i]&&bul[i].x>boss.x-15&&bul[i].x<boss.x+boss.w+15&&bul[i].y>boss.y-boss.h-15&&bul[i].y<boss.y+15){
      boss.hp--;boss.flash=8;snd('squish');spawnP(bul[i].x,bul[i].y,8,SLIME_BOSS);bul.splice(i,1);
      if(boss.hp<=0){snd('kill');snd('win');spawnP(boss.x+boss.w/2,boss.y-boss.h/2,50,SLIME_BOSS);score+=500;coins+=10;boss=null;}
    }
  }
  
  for(let i=bossBul.length-1;i>=0;i--){
    const b=bossBul[i];b.x+=b.vx;b.y+=b.vy;
    if(b.x<0||b.x>RW||b.y<0||b.y>RH){bossBul.splice(i,1);continue;}
    if(col({x:P.x,y:P.y,w:P.duck?P.dw:P.w,h:P.duck?P.dh:P.h},{x:b.x,y:b.y,w:16,h:16})){
      bossBul.splice(i,1);playerHit();
    }
  }
  
  slimes.forEach(s=>{
    s.moveTimer++;
    if(s.moveTimer>60+Math.random()*40){s.moveDir=Math.random()<.5?-1:1;s.moveTimer=0;}
    s.x+=s.moveDir*1.2;
    if(s.x<30){s.x=30;s.moveDir=1;}
    if(s.x>RW-s.w-30){s.x=RW-s.w-30;s.moveDir=-1;}
    if(s.flash>0)s.flash--;
    if(col({x:P.x,y:P.y,w:P.duck?P.dw:P.w,h:P.duck?P.dh:P.h},{x:s.x-8,y:s.y-s.h-8,w:s.w+16,h:s.h+16}))playerHit();
  });
  
  slides.forEach(e=>{
    e.x+=e.vx;
    if(e.x<-80){e.x=-80;e.vx=Math.abs(e.origVx);}
    if(e.x>RW+80){e.x=RW+80;e.vx=-Math.abs(e.origVx);}
    if(e.flash>0)e.flash--;
    if(col({x:P.x,y:P.y,w:P.duck?P.dw:P.w,h:P.duck?P.dh:P.h},{x:e.x-8,y:e.y-e.h-8,w:e.w+16,h:e.h+16}))playerHit();
  });
  
  flyers.forEach((e,i)=>{
    e.x+=e.vx;e.y+=e.vy;
    if(e.x<20||e.x>RW-e.w-20)e.vx*=-1;
    if(e.y<GY-150||e.y>GY-40)e.vy*=-1;
    if(e.flash>0)e.flash--;
    if(col({x:P.x,y:P.y,w:P.duck?P.dw:P.w,h:P.duck?P.dh:P.h},{x:e.x-15,y:e.y-30,w:e.w+30,h:45}))playerHit();
  });
  
  if(boss){
    if(boss.flash>0)boss.flash--;
    if(!boss.charging&&!boss.recharging&&!boss.shooting){
      boss.chargeTimer++;
      boss.shootTimer++;
      if(boss.shootTimer>50&&boss.hp<=boss.mhp/2){
        boss.shooting=true;boss.shootTimer=0;boss.chargeTimer=0;
        const dx=P.x-boss.x,dy=(P.y-P.h/2)-(boss.y-boss.h/2),dist=Math.sqrt(dx*dx+dy*dy);
        if(dist>0){bossBul.push({x:boss.x+boss.w/2,y:boss.y-boss.h/2,vx:(dx/dist)*5,vy:(dy/dist)*5});snd('bshoot');}
      }else if(boss.chargeTimer>90){
        boss.charging=true;boss.chargeTimer=0;boss.shootTimer=0;
        boss.dashDir=P.x>boss.x?1:-1;
        boss.dashSpeed=12*boss.dashDir;
        snd('dash');
      }
      boss.x+=Math.sin(frame*.01)*1.5;
    }
    if(boss.charging){
      boss.x+=boss.dashSpeed;
      if(boss.x<=30||boss.x>=RW-boss.w-30){
        boss.charging=false;boss.recharging=true;boss.chargeTimer=0;
        boss.x=Math.max(30,Math.min(RW-boss.w-30,boss.x));
        shake=20;snd('hit');
      }
    }
    if(boss.shooting){boss.chargeTimer++;if(boss.chargeTimer>30){boss.shooting=false;boss.recharging=true;boss.chargeTimer=0;}}
    if(boss.recharging){boss.chargeTimer++;if(boss.chargeTimer>50){boss.recharging=false;boss.chargeTimer=0;}}
    if(col({x:P.x,y:P.y,w:P.duck?P.dw:P.w,h:P.duck?P.dh:P.h},{x:boss.x-10,y:boss.y-boss.h-10,w:boss.w+20,h:boss.h+20}))playerHit();
  }
  
  const dx=RW-80;
  const allDead=slimes.length===0&&slides.length===0&&flyers.length===0&&!boss;
  if(P.x+P.w>dx&&P.y>GY-95&&fadeDir===0&&allDead){
    if(room<4){fadeTarget=()=>{room++;score+=50;resetRoom();};fadeDir=1;snd('door');}
    else if(room===4){fadeTarget=()=>{room=5;score+=100;resetRoom();};fadeDir=1;snd('door');}
    else if(room===5){state='win';if(score>hi){hi=Math.floor(score);localStorage.setItem('slimeHi9',hi);}}
  }
  
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.l-=.01;
    if(p.l<=0)parts.splice(i,1);
  }
}

function shoot(){
  if(P.scd>0||P.mana<=0||bul.length>=6)return;
  P.mana--;P.scd=14;snd('shoot');
  bul.push({x:P.x+(P.face>0?(P.duck?P.dw:P.w):0),y:P.y-(P.duck?P.dh:P.h)/2,vx:P.face*14});
}

function draw(){
  ctx.save();
  if(shake>0)ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
  if(state==='menu'){drawMenu();ctx.restore();return;}
  drawRoom();drawDoor();drawBullets();drawBossBullets();
  slimes.forEach(s=>drawSlime(s));
  slides.forEach(e=>drawSlide(e));
  flyers.forEach(e=>drawFlyer(e));
  if(boss)drawSlime(boss);
  drawPlayer();
  parts.forEach(p=>{
    const pX=p.x-camX;
    ctx.globalAlpha=p.l;r(pX-p.s/2,p.y-p.s/2,p.s,p.s,p.c);
  });
  ctx.globalAlpha=1;
  if(flash>0){ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(0,0,canvas.width,RH);}
  ctx.restore();
  drawHUD();if(boss)drawBossHP();
  if(fadeAlpha>0){ctx.fillStyle=`rgba(0,0,0,${fadeAlpha})`;ctx.fillRect(0,0,canvas.width,canvas.height);}
  if(state==='over')drawGameOver();
  if(state==='win')drawWin();
}

function loop(){update();draw();requestAnimationFrame(loop);}

const keys={};
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Space'){e.preventDefault();if(state==='menu'||state==='over'||state==='win')reset();else if(state==='play')shoot();}
  if((e.code==='ArrowUp'||e.code==='KeyW')&&state==='play'){e.preventDefault();if(P.jumps<P.maxJumps){P.jmp=true;P.vy=-13;P.jumps++;snd('jump');}}
  if((e.code==='ArrowDown'||e.code==='KeyS')&&state==='play'){e.preventDefault();P.duck=true;}
});
document.addEventListener('keyup',e=>{keys[e.code]=false;if(e.code==='ArrowDown'||e.code==='KeyS')P.duck=false;});

function mv(){
  if(state!=='play'||fadeDir!==0)return;
  P.run=false;
  if(keys['ArrowRight']||keys['KeyD']){P.x+=8;P.face=1;P.run=true;}
  if(keys['ArrowLeft']||keys['KeyA']){P.x-=8;P.face=-1;P.run=true;}
}
setInterval(mv,16);

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();const t=e.touches[0],rc=canvas.getBoundingClientRect();
  const x=t.clientX-rc.left;
  if(state!=='play'){reset();return;}
  if(x>canvas.width*.6)shoot();
  else if(x<canvas.width*.3){P.x-=8;P.face=-1;}
  else if(P.jumps<P.maxJumps){P.jmp=true;P.vy=-13;P.jumps++;snd('jump');}
});

window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});

loop();
</script>
</body>
</html>
