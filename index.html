<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slime Dungeon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a0a;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Press Start 2P',monospace;overflow:hidden}
    canvas{display:block}
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
ctx.imageSmoothingEnabled=false;

const STONE='#3a3a4a',STONE_L='#5a5a6a',STONE_D='#2a2a3a',STONE_DD='#1a1a2a',STONE_DDD='#0e0e18',
TORCH='#ff9944',TORCH_G='#ffcc66',
SLIME='#66bb6a',SLIME_D='#4a9a4a',SLIDE='#44aaff',SLIDE_D='#2288dd',FLYER='#ff88aa',FLYER_D='#cc6688',
SLIME_BOSS='#9944ff',SLIME_BOSS_D='#6622bb',
PLAYER='#4488ff',PLAYER_D='#2255bb',WHITE='#ffffff',BLACK='#0a0a12',COIN='#ffdd44',
HP_FULL='#44cc44',HP_EMPTY='#333344',HP_BOSS='#cc4444',MANA='#4488ff',MANA_E='#223344',
VINE='#2a5a2a',VINE_D='#1a4a1a',MOSS='#3a6a3a',MOSS_D='#2a5a2a',
WOOD='#5a4a3a',WOOD_D='#4a3a2a',WOOD_DD='#3a2a1a',WATER='#4488cc',WATER_D='#2266aa',
// New character colors
WIZARD='#4a3a8a',WIZARD_D='#3a2a6a',WIZARD_L='#6a5aaa',STAFF='#8a6a4a',STAFF_D='#6a4a2a',ORB='#aa88ff',ORB_G='#cc99ff',
STONE_MON='#6a6a7a',STONE_MON_D='#5a5a6a',STONE_MON_L='#7a7a8a',STONE_EYE='#ff4444',
BAT='#4a3a3a',BAT_D='#3a2a2a',BAT_L='#5a4a4a',BAT_WING='#3a2a2a';

let state='menu',score=0,coins=0,hi=parseInt(localStorage.getItem('slimeHi9'))||0,frame=0,room=0,shake=0,flash=0;
let fadeAlpha=0,fadeDir=0,fadeTarget=null,camX=0;
let lightning=0,lightningTimer=0;

// Weather system: 'clear', 'rain', 'storm'
let weatherState='clear';
let weatherTimer=0;
let weatherDuration=1800; // frames until next weather change

// Day/Night cycle: 0=midnight, 0.5=noon, 1=midnight
let dayNightCycle=0.25; // start at morning
let dayNightSpeed=0.0003; // speed of cycle

const RW=canvas.width*3,RH=canvas.height-80,GY=RH-65;

const P={x:100,y:GY,w:56,h:72,dh:40,dw:72,vy:0,jmp:false,duck:false,run:false,
  hp:5,maxHp:5,mana:10,maxMana:10,inv:0,pf:0,scd:0,face:1,jumps:0,maxJumps:2,bf:0};

let boss=null,bossSpawned=false;
const slimes=[],slides=[],flyers=[],bul=[],bossBul=[],parts=[];
const layer1=[],layer2=[],layer3=[],layerFront=[],waterDrops=[],mossPatches=[],rainDrops=[];

const AC=new(window.AudioContext||window.webkitAudioContext)();
function snd(t){
  if(AC.state==='suspended')AC.resume();
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);const n=AC.currentTime;
  const f={jump:['square',200,500,.06,.08],shoot:['square',600,200,.04,.06],
    hit:['sawtooth',100,60,.12,.1],kill:['sine',500,1000,.06,.08],coin:['sine',800,1200,.08,.06],
    hurt:['sawtooth',150,80,.12,.12],boss:['sawtooth',80,40,.4,.15],
    door:['sawtooth',150,80,.15,.1],dash:['sawtooth',300,100,.08,.1],
    win:['sine',400,800,.25,.1],slide:['sine',200,400,.04,.05],
    bshoot:['square',150,60,.1,.1],squish:['sine',150,80,.08,.1],
    drip:['sine',800,400,.05,.03],thunder:['sawtooth',100,30,.8,.4]}[t];
  if(!f)return;
  o.type=f[0];o.frequency.setValueAtTime(f[1],n);o.frequency.exponentialRampToValueAtTime(f[2],n+f[3]);
  g.gain.setValueAtTime(f[4],n);g.gain.exponentialRampToValueAtTime(.001,n+f[3]+.02);
  o.start(n);o.stop(n+f[3]+.03);
}

function r(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x|0,y|0,w|0,h|0);}

function genLayers(){
  layer1.length=0;layer2.length=0;layer3.length=0;layerFront.length=0;
  waterDrops.length=0;mossPatches.length=0;rainDrops.length=0;
  
  // Layer 1: Closest torches (15% parallax)
  for(let i=0;i<20;i++){
    layer1.push({x:Math.random()*RW,y:40+Math.random()*(GY-120),flicker:Math.random()*10});
  }
  // Layer 2: Mid torches (35% parallax)
  for(let i=0;i<15;i++){
    layer2.push({x:Math.random()*RW,y:60+Math.random()*(GY-140),flicker:Math.random()*10});
  }
  // Layer 3: Background structures (55% parallax) - 8 types now
  for(let i=0;i<30;i++){
    layer3.push({
      x:Math.random()*RW,
      y:GY,
      type:Math.floor(Math.random()*8),
      size:0.8+Math.random()*0.6 // Size variation
    });
  }
  // Layer Front: Foreground objects (95% parallax) - 6 types, larger
  for(let i=0;i<12;i++){
    layerFront.push({
      x:Math.random()*RW,
      w:200+Math.random()*250,
      h:150+Math.random()*220,
      type:Math.floor(Math.random()*6)
    });
  }
  for(let i=0;i<8;i++){
    waterDrops.push({
      x:Math.random()*RW,
      y:20+Math.random()*60,
      speed:1+Math.random()*2,
      active:Math.random()<.5
    });
  }
  for(let i=0;i<15;i++){
    mossPatches.push({
      x:Math.random()*RW,
      y:30+Math.random()*(GY-80),
      w:20+Math.random()*40,
      h:10+Math.random()*20
    });
  }
  for(let i=0;i<200;i++){
    rainDrops.push({
      x:Math.random()*RW,
      y:Math.random()*RH,
      speed:12+Math.random()*8,
      length:15+Math.random()*20
    });
  }
}

function drawMoss(){
  mossPatches.forEach(m=>{
    const parallax=camX*.5;
    const drawX=m.x-parallax;
    if(drawX<-60||drawX>canvas.width+60)return;
    ctx.globalAlpha=.4;
    for(let i=0;i<3;i++){
      r(drawX+i*m.w/3,m.y+i*3,m.w/3,m.h*.6,MOSS);
      r(drawX+i*m.w/3+2,m.y+i*3+2,m.w/3-4,m.h*.4,MOSS_D);
    }
    ctx.globalAlpha=1;
  });
}

function drawWaterDrops(){
  waterDrops.forEach(d=>{
    const parallax=camX*.3;
    const drawX=d.x-parallax;
    if(drawX<-20||drawX>canvas.width+20)return;
    if(!d.active){
      if(Math.random()<.01){d.active=true;d.y=20+Math.random()*40;}
      return;
    }
    d.y+=d.speed;
    if(d.y>GY-10){
      d.active=false;
      snd('drip');
      r(drawX-3,GY-5,6,3,WATER);
      r(drawX-2,GY-4,4,2,WATER_D);
    }
    r(drawX,d.y,2,6,WATER);
    r(drawX+1,d.y+2,1,3,WATER_D);
  });
}

function drawRain(){
  // Only draw rain during rain or storm weather
  if(weatherState==='clear') return;
  
  const rainIntensity = weatherState==='storm' ? 1.0 : 0.6;
  ctx.strokeStyle=`rgba(180,200,240,${rainIntensity})`;
  ctx.lineWidth=weatherState==='storm' ? 2 : 1;
  rainDrops.forEach(d=>{
    const parallax=camX*.8;
    const drawX=d.x-parallax;
    d.y+=d.speed;
    if(d.y>RH){
      d.y=-30;
      d.x=Math.random()*RW;
    }
    if(drawX<-30||drawX>canvas.width+30)return;
    ctx.beginPath();
    ctx.moveTo(drawX,d.y);
    ctx.lineTo(drawX-3,d.y+d.length);
    ctx.stroke();
  });
}

function drawLightning(){
  if(lightning>0){
    ctx.fillStyle=`rgba(255,255,255,${lightning*.5})`;
    ctx.fillRect(0,0,canvas.width,RH);
    lightning-=0.05;
  }
}

function drawRainFilter(){
  // Dark filter intensity varies by weather
  let intensity = 0;
  if(weatherState==='rain') intensity = 0.2;
  else if(weatherState==='storm') intensity = 0.4;
  
  // Additional darkness at night
  const nightDarkness = Math.sin(dayNightCycle * Math.PI) * 0.15; // peaks at midnight
  intensity += nightDarkness;
  
  if(intensity > 0){
    ctx.fillStyle=`rgba(20,25,40,${intensity})`;
    ctx.fillRect(0,0,canvas.width,RH);
  }
}

function drawLayer1(){
  // Day/night brightness for torches (brighter at night)
  const dayBrightness = Math.sin(dayNightCycle * Math.PI);
  const torchBrightness = 1.3 - dayBrightness * 0.6; // torches 1.3x at night, 0.7x at noon
  
  layer1.forEach(c=>{
    const parallax=camX*.15;
    const drawX=c.x-parallax;
    if(drawX<-80||drawX>canvas.width+80)return;
    const fl=Math.sin(frame*.1+c.flicker)*.3+.7;
    const grad=ctx.createRadialGradient(drawX,c.y,8,drawX,c.y,60*fl*torchBrightness);
    grad.addColorStop(0,`rgba(255,180,80,${0.7*torchBrightness})`);
    grad.addColorStop(.3,`rgba(255,140,50,${0.3*torchBrightness})`);
    grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad;
    ctx.fillRect(drawX-60*torchBrightness,c.y-60*torchBrightness,120*torchBrightness,120*torchBrightness);
    r(drawX-6,c.y,12,30,STONE_L);
    r(drawX-11,c.y-6,22,12,STONE_L);
    r(drawX-9,c.y-4,18,8,STONE);
    const fs=12+Math.sin(frame*.12+c.flicker)*4;
    r(drawX-fs/2,c.y-fs-5,fs,fs+5,TORCH);
    r(drawX-fs/2+3,c.y-fs-2,fs-6,fs-1,TORCH_G);
    r(drawX-4,c.y-fs-12,8,8,'#fff');
    r(drawX-2,c.y-fs-10,4,4,'#ff8');
    for(let i=0;i<6;i++){
      const sx=drawX+(Math.random()-.5)*fs*1.5;
      const sy=c.y-fs-8-Math.random()*18;
      r(sx,sy,4,4,`rgba(255,200,100,${0.8*torchBrightness})`);
    }
  });
}

function drawLayer2(){
  // Day/night brightness for torches (brighter at night)
  const dayBrightness = Math.sin(dayNightCycle * Math.PI);
  const torchBrightness = 1.3 - dayBrightness * 0.6;
  
  layer2.forEach(c=>{
    const parallax=camX*.35;
    const drawX=c.x-parallax;
    if(drawX<-70||drawX>canvas.width+70)return;
    const fl=Math.sin(frame*.11+c.flicker)*.25+.75;
    const grad=ctx.createRadialGradient(drawX,c.y,10,drawX,c.y,80*fl*torchBrightness);
    grad.addColorStop(0,`rgba(255,160,60,${0.6*torchBrightness})`);
    grad.addColorStop(.4,`rgba(255,120,40,${0.2*torchBrightness})`);
    grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad;
    ctx.fillRect(drawX-80*torchBrightness,c.y-80*torchBrightness,160*torchBrightness,160*torchBrightness);
    r(drawX-8,c.y,16,42,STONE_L);
    r(drawX-14,c.y-8,28,16,STONE_L);
    r(drawX-12,c.y-5,24,10,STONE);
    const fs=16+Math.sin(frame*.13+c.flicker)*5;
    r(drawX-fs/2,c.y-fs-6,fs,fs+6,TORCH);
    r(drawX-fs/2+3,c.y-fs-3,fs-6,fs-1,TORCH_G);
    r(drawX-5,c.y-fs-14,10,10,'#fff');
    r(drawX-3,c.y-fs-12,6,6,'#ff8');
    for(let i=0;i<7;i++){
      const sx=drawX+(Math.random()-.5)*fs*1.8;
      const sy=c.y-fs-12-Math.random()*20;
      r(sx,sy,4,4,`rgba(255,200,100,${0.7*torchBrightness})`);
    }
  });
}

function drawLayer3(){
  layer3.forEach(o=>{
    const parallax=camX*.55;
    const drawX=o.x-parallax;
    if(drawX<-300||drawX>canvas.width+300)return;
    ctx.globalAlpha=1;
    const s=o.size; // Size multiplier
    
    if(o.type===0){
      // Tall tower
      r(drawX,GY-200*s,140*s,200*s,WOOD);
      r(drawX+12*s,GY-188*s,116*s,25*s,WOOD_D);
      r(drawX+10*s,GY-150*s,60*s,12*s,WOOD_DD);
      r(drawX+75*s,GY-125*s,55*s,12*s,WOOD_DD);
      r(drawX+18*s,GY-85*s,70*s,10*s,WOOD_D);
      r(drawX+115*s,GY-235*s,20*s,235*s,WOOD_D);
      r(drawX+120*s,GY-230*s,10*s,10*s,WOOD_DD);
      r(drawX+50*s,GY-275*s,18*s,75*s,WOOD_DD);
    }else if(o.type===1){
      // Broken house
      r(drawX,GY-150*s,120*s,150*s,WOOD);
      r(drawX-25*s,GY-125*s,50*s,18*s,WOOD_D);
      r(drawX+95*s,GY-95*s,48*s,15*s,WOOD_D);
      for(let i=0;i<7;i++)r(drawX+12*s+i*16*s,GY-115*s+i*14*s,18*s,8*s,WOOD_DD);
      r(drawX+45*s,GY-200*s,12*s,50*s,WOOD_DD);
      r(drawX+75*s,GY-195*s,10*s,45*s,WOOD_DD);
    }else if(o.type===2){
      // Watchtower
      r(drawX,GY-175*s,130*s,175*s,WOOD);
      r(drawX+35*s,GY-225*s,55*s,50*s,WOOD_D);
      r(drawX+50*s,GY-265*s,25*s,40*s,WOOD_DD);
      r(drawX+12*s,GY-100*s,100*s,12*s,WOOD_DD);
      r(drawX+25*s,GY-65*s,65*s,10*s,WOOD_D);
      r(drawX+90*s,GY-300*s,18*s,125*s,WOOD_DD);
      r(drawX+25*s,GY-290*s,12*s,115*s,WOOD_DD);
    }else if(o.type===3){
      // Multiple pillars
      for(let i=0;i<4;i++){
        r(drawX+i*60*s,GY-(125-i*25)*s,50*s,(125-i*25)*s,WOOD);
        r(drawX+i*60*s+12*s,GY-(100-i*25)*s,25*s,12*s,WOOD_DD);
      }
      r(drawX+25*s,GY-215*s,10*s,90*s,WOOD_DD);
      r(drawX+90*s,GY-200*s,12*s,75*s,WOOD_DD);
      r(drawX+140*s,GY-175*s,10*s,50*s,WOOD_DD);
    }else if(o.type===4){
      // Ruined arch
      r(drawX,GY-180*s,50*s,180*s,WOOD);
      r(drawX+130*s,GY-180*s,50*s,180*s,WOOD);
      r(drawX+50*s,GY-220*s,80*s,40*s,WOOD_D);
      r(drawX+60*s,GY-200*s,60*s,20*s,WOOD_DD);
      r(drawX+15*s,GY-215*s,8*s,35*s,WOOD_DD);
      r(drawX+155*s,GY-215*s,8*s,35*s,WOOD_DD);
    }else if(o.type===5){
      // Stone wall section
      r(drawX,GY-100*s,200*s,100*s,STONE_D);
      r(drawX+10*s,GY-90*s,40*s,20*s,STONE);
      r(drawX+60*s,GY-85*s,35*s,25*s,STONE_DD);
      r(drawX+110*s,GY-90*s,45*s,20*s,STONE);
      r(drawX+165*s,GY-85*s,25*s,25*s,STONE_DD);
      r(drawX+25*s,GY-130*s,12*s,30*s,STONE_L);
      r(drawX+95*s,GY-125*s,10*s,25*s,STONE_L);
      r(drawX+165*s,GY-130*s,12*s,30*s,STONE_L);
    }else if(o.type===6){
      // Fallen columns
      r(drawX,GY-40*s,180*s,40*s,STONE);
      r(drawX+20*s,GY-70*s,30*s,30*s,STONE_D);
      r(drawX+80*s,GY-60*s,25*s,20*s,STONE_DD);
      r(drawX+140*s,GY-75*s,35*s,35*s,STONE_D);
      r(drawX+30*s,GY-45*s,20*s,5*s,STONE_L);
      r(drawX+100*s,GY-50*s,25*s,5*s,STONE_L);
    }else{
      // Archway ruins
      r(drawX,GY-160*s,60*s,160*s,WOOD);
      r(drawX+120*s,GY-160*s,60*s,160*s,WOOD);
      r(drawX+60*s,GY-200*s,60*s,40*s,WOOD_D);
      r(drawX+70*s,GY-180*s,40*s,20*s,WOOD_DD);
      r(drawX+20*s,GY-195*s,10*s,35*s,WOOD_DD);
      r(drawX+150*s,GY-195*s,10*s,35*s,WOOD_DD);
      r(drawX+85*s,GY-220*s,10*s,20*s,WOOD);
    }
    ctx.globalAlpha=1;
  });
}

function drawLayerFront(){
  layerFront.forEach(s=>{
    const parallax=camX*.95;
    const drawX=s.x-parallax;
    if(drawX<-500||drawX>canvas.width+500)return;
    
    ctx.globalAlpha=0.25;
    
    if(s.type===0){
      // Large ruined tower
      r(drawX,GY-s.h,s.w,s.h,'#000000');
      r(drawX+s.w*.15,GY-s.h-60,s.w*.7,60,'#000000');
      r(drawX+s.w*.3,GY-s.h-110,s.w*.4,50,'#000000');
      r(drawX+s.w*.35,GY-s.h-160,s.w*.3,50,'#000000');
      r(drawX+25,GY-s.h+30,20,60,'#000000');
      r(drawX+s.w-45,GY-s.h+35,20,55,'#000000');
      r(drawX+s.w*.25,GY-s.h-85,12,95,'#000000');
      r(drawX+s.w*.65,GY-s.h-80,12,85,'#000000');
      r(drawX+s.w*.45,GY-s.h-180,10,80,'#000000');
    }else if(s.type===1){
      // Broken wall with arches
      r(drawX,GY-s.h*.8,s.w,s.h*.8,'#000000');
      r(drawX+s.w*.1,GY-s.h*1.3,s.w*.4,s.h*.5,'#000000');
      r(drawX+s.w*.55,GY-s.h*1.15,s.w*.35,s.h*.35,'#000000');
      r(drawX+s.w*.35,GY-s.h*.7,30,70,'#000000');
      r(drawX+s.w*.7,GY-s.h*.6,25,65,'#000000');
      r(drawX+s.w*.15,GY-s.h*.95,15,55,'#000000');
      r(drawX+s.w*.5,GY-s.h*1,12,50,'#000000');
      r(drawX+s.w*.85,GY-s.h*.65,10,45,'#000000');
    }else if(s.type===2){
      // Multiple pillars
      r(drawX,GY-s.h*.7,s.w,s.h*.7,'#000000');
      r(drawX+s.w*.2,GY-s.h*.95,s.w*.6,s.h*.3,'#000000');
      r(drawX+s.w*.35,GY-s.h*1.25,s.w*.3,s.h*.3,'#000000');
      for(let i=0;i<5;i++){
        r(drawX+s.w*(.08+i*.25),GY-s.h*(.55+i*.12),15,65+i*18,'#000000');
      }
      r(drawX+s.w*.4,GY-s.h*.55,12,50,'#000000');
      r(drawX+s.w*.6,GY-s.h*.75,10,55,'#000000');
    }else if(s.type===3){
      // Collapsed structure
      r(drawX,GY-s.h*.55,s.w,s.h*.55,'#000000');
      r(drawX+s.w*.1,GY-s.h*.8,s.w*.3,s.h*.3,'#000000');
      r(drawX+s.w*.7,GY-s.h*.75,s.w*.25,s.h*.25,'#000000');
      for(let i=0;i<6;i++){
        r(drawX+s.w*(.05+i*.18),GY-s.h*(.4+i*.08),12,30+i*14,'#000000');
      }
      r(drawX+s.w*.3,GY-s.h*.7,10,40,'#000000');
      r(drawX+s.w*.55,GY-s.h*.65,8,35,'#000000');
    }else if(s.type===4){
      // Stone archway
      r(drawX,GY-s.h*.9,s.w*.25,s.h*.9,'#000000');
      r(drawX+s.w*.75,GY-s.h*.9,s.w*.25,s.h*.9,'#000000');
      r(drawX+s.w*.25,GY-s.h*1.1,s.w*.5,s.h*.2,'#000000');
      r(drawX+s.w*.3,GY-s.h*.95,s.w*.4,s.h*.15,'#000000');
      r(drawX+s.w*.1,GY-s.h*1.05,12,45,'#000000');
      r(drawX+s.w*.85,GY-s.h*1.05,12,45,'#000000');
      r(drawX+s.w*.45,GY-s.h*1.2,10,30,'#000000');
    }else{
      // Ruined gate
      r(drawX,GY-s.h*.85,s.w*.3,s.h*.85,'#000000');
      r(drawX+s.w*.7,GY-s.h*.85,s.w*.3,s.h*.85,'#000000');
      r(drawX+s.w*.3,GY-s.h*1.05,s.w*.4,s.h*.2,'#000000');
      r(drawX+s.w*.35,GY-s.h*.9,s.w*.3,s.h*.15,'#000000');
      r(drawX+s.w*.15,GY-s.h*1,15,50,'#000000');
      r(drawX+s.w*.8,GY-s.h*1,15,50,'#000000');
      r(drawX+s.w*.45,GY-s.h*1.15,10,25,'#000000');
      r(drawX+s.w*.2,GY-s.h*.75,12,40,'#000000');
      r(drawX+s.w*.75,GY-s.h*.75,12,40,'#000000');
    }
    ctx.globalAlpha=1;
  });
}

function drawRoom(){
  // Calculate day/night brightness (0=midnight, 0.5=noon, 1=midnight)
  const dayBrightness = Math.sin(dayNightCycle * Math.PI); // 0 at midnight, 1 at noon
  
  ctx.fillStyle=STONE_DDD;ctx.fillRect(0,0,canvas.width,RH);
  for(let x=-camX*.05%65;x<canvas.width+65;x+=65){
    for(let y=0;y<RH;y+=32){
      const off=(Math.floor(y/32)%2)*32;
      r(x+off,y,63,30,STONE_D);
      r(x+off,y,63,2,STONE);
      r(x+off,y+28,63,2,STONE_DD);
    }
  }
  drawMoss();
  drawLayer3();
  drawWaterDrops();
  drawLayer2();
  drawLayer1();
  r(0,GY,canvas.width,10,STONE_L);
  r(0,GY+10,canvas.width,RH-GY-10,STONE_D);
  for(let x=-camX*.2%50;x<canvas.width+50;x+=50)r(x,GY+10,47,16,STONE);
  r(0,0,canvas.width,10,'#1a1a2a');
  r(0,0,10,RH,'#1a1a2a');
  r(canvas.width-10,0,10,RH,'#1a1a2a');
  r(0,0,canvas.width,4,'#2a2a3a');
  r(0,0,4,RH,'#2a2a3a');
  r(canvas.width-4,0,4,RH,'#2a2a3a');
  
  // Night overlay (darker at night)
  const nightIntensity = (1 - dayBrightness) * 0.25;
  if(nightIntensity > 0){
    ctx.fillStyle=`rgba(10,10,30,${nightIntensity})`;
    ctx.fillRect(0,0,canvas.width,RH);
  }
}

function drawDoor(){
  const doorScreenX=RW-80-camX;
  const dx=doorScreenX,dy=GY-95,dw=60,dh=95;
  if(dx<canvas.width+120&&dx>-120){
    const allDead=slimes.length===0&&slides.length===0&&flyers.length===0&&!boss;
    if(allDead){
      const gl=Math.sin(frame*.05)*.3+.7;
      const grad=ctx.createRadialGradient(dx+dw/2,dy+dh/2,10,dx+dw/2,dy+dh/2,100*gl);
      grad.addColorStop(0,'rgba(80,255,80,0.5)');
      grad.addColorStop(1,'transparent');
      ctx.fillStyle=grad;ctx.fillRect(dx-90,dy-90,dw+180,dh+180);
      r(dx,dy,dw,dh,'#3a6a3a');
      r(dx+8,dy+8,dw-16,dh-16,'#4a8a4a');
      r(dx+14,dy+14,dw-28,dh-28,'#5aaa5a');
      ctx.fillStyle=WHITE;ctx.font='16px "Press Start 2P",monospace';ctx.textAlign='center';
      ctx.fillText('EXIT',dx+dw/2,dy-18);
    }else{
      r(dx,dy,dw,dh,'#4a3a3a');
      r(dx+8,dy+8,dw-16,dh-16,'#5a4a4a');
      r(dx+14,dy+14,dw-28,dh-28,'#6a5a5a');
      r(dx+dw/2-12,dy+dh/2-12,24,24,'#aa6644');
      r(dx+dw/2-7,dy+dh/2-7,14,14,'#884422');
      ctx.fillStyle='#ff8866';ctx.font='14px "Press Start 2P",monospace';ctx.textAlign='center';
      ctx.fillText('LOCKED',dx+dw/2,dy-16);
      const rem=slimes.length+slides.length+flyers.length+(boss?1:0);
      ctx.fillText(rem+' left',dx+dw/2,dy+dh+22);
    }
    r(dx-10,dy-10,dw+20,10,'#5a5a6a');
    r(dx-10,dy+dh,dw+20,10,'#5a5a6a');
    r(dx-10,dy,10,dh,'#5a5a6a');
    r(dx+dw,dy,10,dh,'#5a5a6a');
  }
}

function drawSlime(s){
  const sX=s.x-camX;
  if(sX<-250||sX>canvas.width+250)return;
  const sq=Math.sin(frame*.03+s.x*.06)*.05;
  const w=s.w*(1+sq),h=s.h*(1-sq);
  const col=s.boss?SLIME_BOSS:STONE_MON,colD=s.boss?SLIME_BOSS_D:STONE_MON_D,colL=s.boss?'#bb99ff':STONE_MON_L;
  if(s.flash>0&&s.flash%2===0)return;
  const sx=sX+(s.w-w)/2,sy=s.y-h;
  
  // Shadow
  r(sx+6,sy+h-6,w-12,12,'rgba(0,0,0,0.35)');
  
  // Body (rocky texture)
  r(sx,sy,w,h,col);
  r(sx+8,sy+8,w-16,h-16,colD);
  r(sx+12,sy+12,w-24,h/2,colL);
  
  // Rocky texture details
  r(sx+w*.2,sy+h*.3,w*.15,h*.15,colL);
  r(sx+w*.65,sy+h*.4,w*.12,h*.12,colL);
  r(sx+w*.4,sy+h*.6,w*.18,h*.1,colD);
  
  // Glowing red eyes
  r(sx+w*.2,sy+h*.2,16,12,STONE_EYE);
  r(sx+w*.6,sy+h*.2,16,12,STONE_EYE);
  r(sx+w*.2+3,sy+h*.2+2,10,8,'#ff6644');
  r(sx+w*.6+3,sy+h*.2+2,10,8,'#ff6644');
  r(sx+w*.2+5,sy+h*.2+4,6,4,'#ffaa88');
  r(sx+w*.6+5,sy+h*.2+4,6,4,'#ffaa88');
  
  // Mouth crack
  r(sx+w*.3,sy+h*.55,w*.4,6,colD);
  r(sx+w*.35,sy+h*.57,w*.3,3,STONE_EYE);
  
  // Arms (rocky)
  r(sx-15,sy+h*.4,20,30,col);
  r(sx+w-5,sy+h*.4,20,30,col);
  r(sx-12,sy+h*.45,15,20,colD);
  r(sx+w-3,sy+h*.45,15,20,colD);
  
  // Legs
  r(sx+w*.2,sy+h-5,w*.2,15,col);
  r(sx+w*.6,sy+h-5,w*.2,15,col);
  r(sx+w*.22,sy+h-3,w*.16,10,colD);
  r(sx+w*.62,sy+h-3,w*.16,10,colD);
  
  // Boss specific
  if(s.boss){
    if(s.hp<=s.mhp/2){
      ctx.fillStyle=`rgba(255,50,50,${.25+Math.sin(frame*.1)*.15})`;
      ctx.beginPath();ctx.arc(sx+w/2,sy+h/2,w*.8,0,Math.PI*2);ctx.fill();
    }
    // Crown/horns
    r(sx+w*.3,sy-20,w*.1,25,SLIME_BOSS);
    r(sx+w*.6,sy-20,w*.1,25,SLIME_BOSS);
    r(sx+w*.45,sy-30,w*.1,35,SLIME_BOSS_D);
  }
}

function drawSlide(e){
  const eX=e.x-camX;
  if(eX<-120||eX>canvas.width+120)return;
  if(e.flash>0&&e.flash%2===0)return;
  const stretch=Math.sin(frame*.06+e.x*.06)*.08;
  const w=e.w*(1+stretch),h=e.h*(1-stretch*.3);
  const sx=eX+(e.w-w)/2,sy=e.y-h;
  
  // Shadow
  r(sx+4,sy+h-4,w-8,8,'rgba(0,0,0,0.25)');
  
  // Body (low stone creature)
  r(sx,sy,w,h,STONE_MON);
  r(sx+5,sy+5,w-10,h-10,STONE_MON_D);
  r(sx+8,sy+8,w-16,h-16,STONE_MON_L);
  
  // Rocky texture
  r(sx+w*.15,sy+h*.2,w*.2,h*.3,STONE_MON_L);
  r(sx+w*.6,sy+h*.3,w*.15,h*.25,STONE_MON_D);
  
  // Glowing eyes
  r(sx+w*.2,sy+h*.25,10,8,STONE_EYE);
  r(sx+w*.55,sy+h*.25,10,8,STONE_EYE);
  r(sx+w*.2+2,sy+h*.25+2,6,4,'#ff8866');
  r(sx+w*.55+2,sy+h*.25+2,6,4,'#ff8866');
  
  // Mouth
  r(sx+w*.3,sy+h*.55,w*.4,5,STONE_MON_D);
  r(sx+w*.35,sy+h*.57,w*.3,2,STONE_EYE);
  
  // Sliding motion lines
  ctx.strokeStyle='rgba(100,100,110,0.3)';
  ctx.lineWidth=2;
  for(let i=0;i<3;i++){
    ctx.beginPath();
    ctx.moveTo(sx-10-i*15,sy+h*.3+i*10);
    ctx.lineTo(sx-25-i*15,sy+h*.3+i*10);
    ctx.stroke();
  }
}

function drawFlyer(e){
  const eX=e.x-camX;
  if(eX<-150||eX>canvas.width+150)return;
  if(e.flash>0&&e.flash%2===0)return;
  const bob=Math.sin(frame*.06+e.x*.025)*12;
  const wingFlap=Math.sin(frame*.2+e.x*.08);
  
  // Body (larger)
  r(eX+e.w/2-12,e.y-30+bob,24,35,BAT);
  r(eX+e.w/2-8,e.y-26+bob,16,28,BAT_D);
  
  // Head (larger)
  r(eX+e.w/2-15,e.y-50+bob,30,22,BAT);
  r(eX+e.w/2-10,e.y-46+bob,20,16,BAT_D);
  
  // Ears (larger)
  r(eX+e.w/2-18,e.y-65+bob,10,18,BAT);
  r(eX+e.w/2+8,e.y-65+bob,10,18,BAT);
  r(eX+e.w/2-15,e.y-62+bob,5,12,BAT_D);
  r(eX+e.w/2+10,e.y-62+bob,5,12,BAT_D);
  
  // Eyes (larger red glowing)
  r(eX+e.w/2-10,e.y-46+bob,8,8,STONE_EYE);
  r(eX+e.w/2+2,e.y-46+bob,8,8,STONE_EYE);
  r(eX+e.w/2-8,e.y-44+bob,5,5,'#ff6644');
  r(eX+e.w/2+4,e.y-44+bob,5,5,'#ff6644');
  r(eX+e.w/2-6,e.y-42+bob,3,3,'#ffaa88');
  r(eX+e.w/2+6,e.y-42+bob,3,3,'#ffaa88');
  
  // Fangs
  r(eX+e.w/2-4,e.y-32+bob,3,6,WHITE);
  r(eX+e.w/2+1,e.y-32+bob,3,6,WHITE);
  
  // Wings (larger and more detailed)
  const leftWingX=eX+e.w/2-55+wingFlap*25;
  const rightWingX=eX+e.w/2+5-wingFlap*25;
  const wingY=e.y-25+bob;
  
  // Left wing
  ctx.beginPath();
  ctx.moveTo(eX+e.w/2-12,wingY+15);
  ctx.lineTo(leftWingX,wingY-10+wingFlap*12);
  ctx.lineTo(leftWingX+15,wingY);
  ctx.lineTo(leftWingX+30,wingY+15);
  ctx.lineTo(leftWingX+40,wingY+30);
  ctx.lineTo(eX+e.w/2-12,wingY+35);
  ctx.fillStyle=BAT_WING;
  ctx.fill();
  
  // Right wing
  ctx.beginPath();
  ctx.moveTo(eX+e.w/2+12,wingY+15);
  ctx.lineTo(rightWingX+50,wingY-10+wingFlap*12);
  ctx.lineTo(rightWingX+35,wingY);
  ctx.lineTo(rightWingX+20,wingY+15);
  ctx.lineTo(rightWingX+10,wingY+30);
  ctx.lineTo(eX+e.w/2+12,wingY+35);
  ctx.fillStyle=BAT_WING;
  ctx.fill();
  
  // Feet (larger)
  r(eX+e.w/2-10,e.y+3+bob,6,10,BAT_D);
  r(eX+e.w/2+4,e.y+3+bob,6,10,BAT_D);
}

function drawPlayer(){
  if(P.inv>0&&Math.floor(P.inv/3)%2===0)return;
  const fl=P.pf>0?WHITE:WIZARD;
  let w,h,py;
  if(P.duck){w=P.dw;h=P.dh;py=GY-h;}else{w=P.w;h=P.h;py=P.y-h;}
  const x=P.x-camX;
  const bounce=P.run&&!P.jmp?Math.sin(P.bf)*5:0;
  const jumpStretch=P.jmp?1.1:1;
  const jumpSquash=P.jmp?0.9:1;
  
  // Shadow
  r(x-5,GY-5,w+10,10,'rgba(0,0,0,0.3)');
  
  // Cube body (slightly stretched when jumping)
  const cubeW=w*jumpSquash;
  const cubeH=h*jumpStretch;
  const cubeX=x+(w-cubeW)/2;
  r(cubeX,py-bounce,cubeW,cubeH,fl);
  r(cubeX+4,py+4-bounce,cubeW-8,cubeH-8,WIZARD_D);
  
  // Cube highlights
  r(cubeX+6,py+6-bounce,15,15,WIZARD_L);
  r(cubeX+cubeW-20,py+cubeH-20-bounce,15,15,WIZARD_L);
  
  // Face (simple cube face)
  const faceX=P.face>0?cubeX+cubeW-20:cubeX+5;
  r(faceX,py+15-bounce,15,15,WIZARD_L);
  r(faceX+2,py+18-bounce,10,8,WHITE);
  r(faceX+4,py+20-bounce,6,5,ORB);
  
  // Wizard hat (pointed)
  const hatX=x+w/2-16;
  const hatBob=bounce*0.5;
  r(hatX,py-20-hatBob,32,25,WIZARD);
  r(hatX+6,py-45-hatBob,20,28,WIZARD);
  r(hatX+10,py-65-hatBob,12,22,WIZARD);
  r(hatX+13,py-75-hatBob,6,12,WIZARD_L);
  // Hat brim
  r(hatX-6,py-2-hatBob,44,8,WIZARD_D);
  // Star on hat
  const starGlow=Math.sin(frame*.08)*.3+.7;
  r(hatX+12,py-50-hatBob,10,10,ORB_G);
  r(hatX+14,py-48-hatBob,6,6,ORB);
  r(hatX+16,py-46-hatBob,3,3,WHITE);
  
  // Staff (always visible, bobbing with jump)
  const staffX=P.face>0?x+w+3:x-28;
  const staffBob=bounce*0.8;
  r(staffX,py-55-staffBob,8,105,STAFF);
  r(staffX+1,py-53-staffBob,6,101,STAFF_D);
  // Staff orb (glowing)
  const orbGlow=Math.sin(frame*.1)*.3+.7;
  ctx.fillStyle=`rgba(170,136,255,${orbGlow})`;
  ctx.beginPath();
  ctx.arc(staffX+4,py-62-staffBob,14,0,Math.PI*2);
  ctx.fill();
  r(staffX-5,py-72-staffBob,18,18,ORB);
  r(staffX-3,py-70-staffBob,14,14,ORB_G);
  r(staffX-1,py-68-staffBob,10,10,WHITE);
  
  // Legs (cube feet, animated)
  if(!P.duck&&!P.jmp){
    const l=Math.floor(P.bf/3)%2;
    r(cubeX+6,py+cubeH-bounce,14,l?18:8,WIZARD_D);
    r(cubeX+cubeW-20,py+cubeH-bounce,14,l?8:18,WIZARD_D);
    r(cubeX+4,py+cubeH+(l?18:8)-bounce,18,6,STAFF_D);
    r(cubeX+cubeW-22,py+cubeH+(l?8:18)-bounce,18,6,STAFF_D);
  }
  if(P.jmp){
    // Feet tucked when jumping
    r(cubeX+6,py+cubeH-5,12,8,WIZARD_D);
    r(cubeX+cubeW-18,py+cubeH-5,12,8,WIZARD_D);
  }
}

function drawBossHP(){
  if(!boss)return;
  const bw=Math.min(650,canvas.width-100),bh=30,bx=(canvas.width-bw)/2,by=18;
  ctx.fillStyle=SLIME_BOSS;ctx.font='18px "Press Start 2P",monospace';ctx.textAlign='center';
  ctx.fillText('SLIME KING',canvas.width/2,by-12);
  r(bx,by,bw,bh,'#1a1a2a');
  const hp=Math.max(0,boss.hp/boss.mhp);
  r(bx+4,by+4,(bw-8)*hp,bh-8,HP_BOSS);
  if(boss.flash>0)r(bx+4,by+4,(bw-8)*hp,bh-8,'rgba(255,255,255,0.5)');
  ctx.strokeStyle='#5a5a6a';ctx.lineWidth=2;ctx.strokeRect(bx,by,bw,bh);
  for(let i=1;i<20;i++)ctx.fillRect(bx+(bw/20)*i,by+4,1,bh-8);
  ctx.fillStyle=WHITE;ctx.font='14px "Press Start 2P",monospace';
  ctx.fillText(Math.ceil(boss.hp)+'/'+boss.mhp,canvas.width/2,by+bh+20);
  if(boss.hp<=boss.mhp/2){ctx.fillStyle='#ff6666';ctx.fillText('ENRAGED!',canvas.width/2,by+bh+42);}
  if(boss.charging){ctx.fillStyle='#ff6666';ctx.fillText('DASHING!',canvas.width/2,by+bh+62);}
  else if(boss.shooting){ctx.fillStyle='#aa66ff';ctx.fillText('SHOOTING!',canvas.width/2,by+bh+62);}
  else if(boss.recharging){ctx.fillStyle='#ffaa44';ctx.fillText('RECHARGING...',canvas.width/2,by+bh+62);}
}

function drawMenu(){

  for(let i=0;i<70;i++){
    const x=(i*53+frame*.12)%canvas.width;

    grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad;ctx.fillRect(x-s*8,y-s*8,s*16,s*16);

  ctx.shadowColor='#44ff44';ctx.shadowBlur=35+Math.sin(frame*.03)*18;

  ctx.fillText('SLIME',canvas.width/2,tY+50);
  ctx.shadowColor='#8844ff';ctx.shadowBlur=30;
  ctx.fillStyle='#cc88ff';ctx.font='72px "Press Start 2P",monospace';

  ctx.strokeStyle='#44aa44';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(canvas.width/2-350,tY+165);ctx.lineTo(canvas.width/2+350,tY+165);ctx.stroke();
  ctx.fillStyle='#aaaacc';ctx.font='16px "Press Start 2P",monospace';
  ctx.fillText('WASD / Arrows: Move & Jump',canvas.width/2,tY+210);
  ctx.fillText('SPACE: Shoot Magic  |  S: Duck',canvas.width/2,tY+245);
  ctx.fillText('Double Jump Enabled',canvas.width/2,tY+280);
  if(Math.floor(frame/25)%2===0){
    ctx.save();ctx.shadowColor='#ffffff';ctx.shadowBlur=18;

}

function drawGameOver(){
  ctx.fillStyle='rgba(5,5,10,0.95)';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.save();ctx.shadowColor='#ff4444';ctx.shadowBlur=22;
  ctx.fillStyle='#ff4444';ctx.font='56px "Press Start 2P",monospace';ctx.textAlign='center';
  ctx.fillText('GAME OVER',canvas.width/2,canvas.height/2-80);
  ctx.restore();
  ctx.fillStyle=WHITE;ctx.font='20px "Press Start 2P",monospace';
  ctx.fillText('Score: '+Math.floor(score),canvas.width/2,canvas.height/2);
  ctx.fillStyle=COIN;ctx.fillText('Coins: '+coins,canvas.width/2,canvas.height/2+40);
  ctx.fillStyle=WHITE;
  ctx.fillText('Room: '+(room+1),canvas.width/2,canvas.height/2+80);
  if(Math.floor(frame/25)%2===0)ctx.fillText('Press SPACE to restart',canvas.width/2,canvas.height/2+130);
}

function drawWin(){
  ctx.fillStyle='rgba(5,5,10,0.95)';ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let i=0;i<60;i++){
    const x=(i*67+frame*.35)%canvas.width;
    const y=(i*43+Math.sin(frame*.02+i)*70+50)%(canvas.height-100);
    r(x,y,7,7,['#ff4444','#44ff44','#4444ff','#ffff44','#ff44ff','#44ffff'][i%6]);
  }
  ctx.save();ctx.shadowColor='#44ff44';ctx.shadowBlur=35;
  ctx.fillStyle='#44ff44';ctx.font='52px "Press Start 2P",monospace';ctx.textAlign='center';
  ctx.fillText('VICTORY!',canvas.width/2,canvas.height/2-90);
  ctx.restore();
  ctx.fillStyle=WHITE;ctx.font='20px "Press Start 2P",monospace';
  ctx.fillText('You conquered the Slime Dungeon!',canvas.width/2,canvas.height/2-25);
  ctx.fillText('Final Score: '+Math.floor(score),canvas.width/2,canvas.height/2+20);
  ctx.fillStyle=COIN;ctx.fillText('Total Coins: '+coins,canvas.width/2,canvas.height/2+60);
  if(Math.floor(frame/25)%2===0){
    ctx.fillStyle=WHITE;ctx.fillText('Press SPACE to play again',canvas.width/2,canvas.height/2+110);
  }
}

function spawnSlime(isBoss){
  const x=200+Math.random()*(RW-400);
  const s={x:x,y:GY,w:isBoss?220:70+Math.random()*20,h:isBoss?150:45+Math.random()*15,
    hp:isBoss?30:2,mhp:isBoss?30:2,
    boss:isBoss,flash:0,chargeTimer:0,shootTimer:0,charging:false,recharging:false,shooting:false,
    dashSpeed:0,dashDir:1,moveTimer:0,moveDir:0};
  if(isBoss){s.x=RW-400;boss=s;snd('boss');}
  else slimes.push(s);
}

function spawnSlide(){
  const side=Math.random()<.5;
  slides.push({
    x:side?-80:RW+80,y:GY,
    w:70+Math.random()*25,h:35+Math.random()*15,
    hp:2,flash:0,
    vx:(side?1:-1)*(2.5+Math.random()*1.5),
    origVx:0
  });
  slides[slides.length-1].origVx=slides[slides.length-1].vx;
  snd('slide');
}

function spawnFlyer(){
  flyers.push({
    x:150+Math.random()*(RW-300),
    y:GY-120-Math.random()*80,
    w:100,h:70,hp:1,flash:0,
    vx:(Math.random()<.5?1:-1)*(0.35+Math.random()*0.25),
    vy:(Math.random()<.5?1:-1)*.12
  });
}

function spawnP(x,y,n,c){
  for(let i=0;i<n;i++)parts.push({x,y,vx:(Math.random()-.5)*9,vy:-Math.random()*9-2,s:5+Math.random()*7,l:1,c:c||SLIME});
}

function resetRoom(){
  slimes.length=0;slides.length=0;flyers.length=0;bul.length=0;bossBul.length=0;parts.length=0;
  boss=null;bossSpawned=false;
  camX=0;
  genLayers();
  const ns=2+Math.min(room,3);
  for(let i=0;i<ns;i++)spawnSlime(false);
  const nsl=1+Math.min(room,2);
  for(let i=0;i<nsl;i++)spawnSlide();
  const nfl=1+Math.min(room,2);
  for(let i=0;i<nfl;i++)spawnFlyer();
  if(room===5&&!bossSpawned){spawnSlime(true);bossSpawned=true;}
  P.x=100;P.y=GY;P.vy=0;P.jmp=false;P.jumps=0;P.inv=90;P.duck=false;
}

function reset(){
  state='play';score=0;coins=0;room=0;frame=0;shake=0;flash=0;fadeAlpha=0;fadeDir=0;
  P.hp=P.maxHp;P.mana=P.maxMana;P.inv=0;P.pf=0;P.scd=0;
  resetRoom();
}

function playerHit(){
  if(P.inv>0)return;
  P.hp--;P.inv=60;P.pf=10;snd('hurt');shake=12;
  spawnP(P.x,P.y-P.h/2,12,PLAYER);
  if(P.hp<=0){state='over';if(score>hi){hi=Math.floor(score);localStorage.setItem('slimeHi9',hi);}}
}

function col(a,b){return a.x+a.w>b.x&&a.x<b.x+b.w&&a.y>b.y&&a.y-a.h<b.y+b.h;}

function update(){
  if(state!=='play')return;
  frame++;score+=1/60;
  if(shake>0)shake--;if(flash>0)flash--;
  if(P.inv>0)P.inv--;if(P.pf>0)P.pf--;if(P.scd>0)P.scd--;
  if(P.run&&!P.jmp)P.bf+=.35;
  
  // Weather rotation: clear -> rain -> storm -> clear
  weatherTimer++;
  if(weatherTimer>=weatherDuration){
    weatherTimer=0;
    weatherDuration=1800+Math.random()*1800; // 30-60 seconds
    if(weatherState==='clear') weatherState='rain';
    else if(weatherState==='rain') weatherState='storm';
    else weatherState='clear';
  }
  
  // Lightning only during storms
  if(weatherState==='storm'){
    lightningTimer++;
    if(lightningTimer>180+Math.random()*120){
      lightning=1;
      lightningTimer=0;
      snd('thunder');
    }
  }
  
  // Day/Night cycle
  dayNightCycle+=dayNightSpeed;
  if(dayNightCycle>=1) dayNightCycle=0;
  
  if(fadeDir!==0){
    fadeAlpha+=fadeDir;
    if(fadeAlpha>=1){fadeAlpha=1;fadeDir=-1;if(fadeTarget){fadeTarget();fadeTarget=null;}}
    if(fadeAlpha<=0){fadeAlpha=0;fadeDir=0;}
  }
  const targetCamX=P.x-canvas.width/3;
  camX+=(targetCamX-camX)*.08;
  camX=Math.max(0,Math.min(RW-canvas.width,camX));
  P.y+=P.vy;
  if(P.y>=GY){P.y=GY;P.vy=0;P.jmp=false;P.jumps=0;}
  if(P.jmp)P.vy+=0.5;
  P.x=Math.max(0,Math.min(RW-P.w,P.x));
  if(P.mana<P.maxMana&&frame%50===0)P.mana=Math.min(P.maxMana,P.mana+1);
  
  for(let i=bul.length-1;i>=0;i--){
    bul[i].x+=bul[i].vx;
    if(bul[i].x<0||bul[i].x>RW){bul.splice(i,1);continue;}
    let hit=false;
    for(let j=slimes.length-1;j>=0;j--){
      const s=slimes[j];
      if(bul[i]&&bul[i].x>s.x-10&&bul[i].x<s.x+s.w+10&&bul[i].y>s.y-s.h-10&&bul[i].y<s.y+10){
        s.hp--;s.flash=8;snd('squish');spawnP(bul[i].x,bul[i].y,5);bul.splice(i,1);hit=true;
        if(s.hp<=0){snd('kill');snd('coin');spawnP(s.x+s.w/2,s.y-s.h/2,12);score+=10;coins++;slimes.splice(j,1);}
        break;
      }
    }
    if(hit)continue;
    for(let j=slides.length-1;j>=0;j--){
      const e=slides[j];
      if(bul[i]&&bul[i].x>e.x-10&&bul[i].x<e.x+e.w+10&&bul[i].y>e.y-e.h-10&&bul[i].y<e.y+10){
        e.hp--;e.flash=8;snd('squish');spawnP(bul[i].x,bul[i].y,5,SLIDE);bul.splice(i,1);hit=true;
        if(e.hp<=0){snd('kill');snd('coin');spawnP(e.x+e.w/2,e.y-e.h/2,12,SLIDE);score+=15;coins++;slides.splice(j,1);}
        break;
      }
    }
    if(hit)continue;
    for(let j=flyers.length-1;j>=0;j--){
      const e=flyers[j];
      if(bul[i]&&bul[i].x>e.x-15&&bul[i].x<e.x+e.w+15&&bul[i].y>e.y-30&&bul[i].y<e.y+15){
        e.hp--;e.flash=8;snd('squish');spawnP(bul[i].x,bul[i].y,4,FLYER);bul.splice(i,1);hit=true;
        if(e.hp<=0){snd('kill');snd('coin');spawnP(e.x+e.w/2,e.y-5,10,FLYER);score+=5;coins++;flyers.splice(j,1);}
        break;
      }
    }
    if(hit)continue;
    if(boss&&bul[i]&&bul[i].x>boss.x-15&&bul[i].x<boss.x+boss.w+15&&bul[i].y>boss.y-boss.h-15&&bul[i].y<boss.y+15){
      boss.hp--;boss.flash=8;snd('squish');spawnP(bul[i].x,bul[i].y,8,SLIME_BOSS);bul.splice(i,1);
      if(boss.hp<=0){snd('kill');snd('win');spawnP(boss.x+boss.w/2,boss.y-boss.h/2,50,SLIME_BOSS);score+=500;coins+=10;boss=null;}
    }
  }
  
  for(let i=bossBul.length-1;i>=0;i--){
    const b=bossBul[i];b.x+=b.vx;b.y+=b.vy;
    if(b.x<0||b.x>RW||b.y<0||b.y>RH){bossBul.splice(i,1);continue;}
    if(col({x:P.x,y:P.y,w:P.duck?P.dw:P.w,h:P.duck?P.dh:P.h},{x:b.x,y:b.y,w:16,h:16})){
      bossBul.splice(i,1);playerHit();
    }
  }
  
  slimes.forEach(s=>{
    s.moveTimer++;
    if(s.moveTimer>60+Math.random()*40){s.moveDir=Math.random()<.5?-1:1;s.moveTimer=0;}
    s.x+=s.moveDir*1.2;
    if(s.x<30){s.x=30;s.moveDir=1;}
    if(s.x>RW-s.w-30){s.x=RW-s.w-30;s.moveDir=-1;}
    if(s.flash>0)s.flash--;
    if(col({x:P.x,y:P.y,w:P.duck?P.dw:P.w,h:P.duck?P.dh:P.h},{x:s.x-8,y:s.y-s.h-8,w:s.w+16,h:s.h+16}))playerHit();
  });
  
  slides.forEach(e=>{
    e.x+=e.vx;
    if(e.x<-80){e.x=-80;e.vx=Math.abs(e.origVx);}
    if(e.x>RW+80){e.x=RW+80;e.vx=-Math.abs(e.origVx);}
    if(e.flash>0)e.flash--;
    if(col({x:P.x,y:P.y,w:P.duck?P.dw:P.w,h:P.duck?P.dh:P.h},{x:e.x-8,y:e.y-e.h-8,w:e.w+16,h:e.h+16}))playerHit();
  });
  
  flyers.forEach((e,i)=>{
    e.x+=e.vx;e.y+=e.vy;
    if(e.x<20||e.x>RW-e.w-20)e.vx*=-1;
    if(e.y<GY-150||e.y>GY-40)e.vy*=-1;
    if(e.flash>0)e.flash--;
    if(col({x:P.x,y:P.y,w:P.duck?P.dw:P.w,h:P.duck?P.dh:P.h},{x:e.x-15,y:e.y-30,w:e.w+30,h:45}))playerHit();
  });
  
  if(boss){
    if(boss.flash>0)boss.flash--;
    if(!boss.charging&&!boss.recharging&&!boss.shooting){
      boss.chargeTimer++;
      boss.shootTimer++;
      if(boss.shootTimer>50&&boss.hp<=boss.mhp/2){
        boss.shooting=true;boss.shootTimer=0;boss.chargeTimer=0;
        const dx=P.x-boss.x,dy=(P.y-P.h/2)-(boss.y-boss.h/2),dist=Math.sqrt(dx*dx+dy*dy);
        if(dist>0){bossBul.push({x:boss.x+boss.w/2,y:boss.y-boss.h/2,vx:(dx/dist)*5,vy:(dy/dist)*5});snd('bshoot');}
      }else if(boss.chargeTimer>90){
        boss.charging=true;boss.chargeTimer=0;boss.shootTimer=0;
        boss.dashDir=P.x>boss.x?1:-1;
        boss.dashSpeed=12*boss.dashDir;
        snd('dash');
      }
      boss.x+=Math.sin(frame*.01)*1.5;
    }
    if(boss.charging){
      boss.x+=boss.dashSpeed;
      if(boss.x<=30||boss.x>=RW-boss.w-30){
        boss.charging=false;boss.recharging=true;boss.chargeTimer=0;
        boss.x=Math.max(30,Math.min(RW-boss.w-30,boss.x));
        shake=20;snd('hit');
      }
    }
    if(boss.shooting){boss.chargeTimer++;if(boss.chargeTimer>30){boss.shooting=false;boss.recharging=true;boss.chargeTimer=0;}}
    if(boss.recharging){boss.chargeTimer++;if(boss.chargeTimer>50){boss.recharging=false;boss.chargeTimer=0;}}
    if(col({x:P.x,y:P.y,w:P.duck?P.dw:P.w,h:P.duck?P.dh:P.h},{x:boss.x-10,y:boss.y-boss.h-10,w:boss.w+20,h:boss.h+20}))playerHit();
  }
  
  const dx=RW-80;
  const allDead=slimes.length===0&&slides.length===0&&flyers.length===0&&!boss;
  if(P.x+P.w>dx&&P.y>GY-95&&fadeDir===0&&allDead){
    if(room<4){fadeTarget=()=>{room++;score+=50;resetRoom();};fadeDir=1;snd('door');}
    else if(room===4){fadeTarget=()=>{room=5;score+=100;resetRoom();};fadeDir=1;snd('door');}
    else if(room===5){state='win';if(score>hi){hi=Math.floor(score);localStorage.setItem('slimeHi9',hi);}}
  }
  
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.l-=.01;
    if(p.l<=0)parts.splice(i,1);
  }
}

function shoot(){
  if(P.scd>0||P.mana<=0||bul.length>=6)return;
  P.mana--;P.scd=14;snd('shoot');
  bul.push({x:P.x+(P.face>0?(P.duck?P.dw:P.w):0),y:P.y-(P.duck?P.dh:P.h)/2,vx:P.face*14});
}

function draw(){
  ctx.save();
  if(shake>0)ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
  if(state==='menu'){drawMenu();ctx.restore();return;}
  drawRoom();drawDoor();drawBullets();drawBossBullets();
  drawRain();
  slimes.forEach(s=>drawSlime(s));
  slides.forEach(e=>drawSlide(e));
  flyers.forEach(e=>drawFlyer(e));
  if(boss)drawSlime(boss);
  drawPlayer();
  parts.forEach(p=>{
    const pX=p.x-camX;
    ctx.globalAlpha=p.l;r(pX-p.s/2,p.y-p.s/2,p.s,p.s,p.c);
  });
  ctx.globalAlpha=1;
  drawLayerFront();
  drawRainFilter();
  drawLightning();
  if(flash>0){ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(0,0,canvas.width,RH);}
  ctx.restore();
  drawHUD();if(boss)drawBossHP();
  if(fadeAlpha>0){ctx.fillStyle=`rgba(0,0,0,${fadeAlpha})`;ctx.fillRect(0,0,canvas.width,canvas.height);}
  if(state==='over')drawGameOver();
  if(state==='win')drawWin();
}

function loop(){update();draw();requestAnimationFrame(loop);}

const keys={};
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Space'){e.preventDefault();if(state==='menu'||state==='over'||state==='win')reset();else if(state==='play')shoot();}
  if((e.code==='ArrowUp'||e.code==='KeyW')&&state==='play'){e.preventDefault();if(P.jumps<P.maxJumps){P.jmp=true;P.vy=-13;P.jumps++;snd('jump');}}
  if((e.code==='ArrowDown'||e.code==='KeyS')&&state==='play'){e.preventDefault();P.duck=true;}
});
document.addEventListener('keyup',e=>{keys[e.code]=false;if(e.code==='ArrowDown'||e.code==='KeyS')P.duck=false;});

function mv(){
  if(state!=='play'||fadeDir!==0)return;
  P.run=false;
  if(keys['ArrowRight']||keys['KeyD']){P.x+=8;P.face=1;P.run=true;}
  if(keys['ArrowLeft']||keys['KeyA']){P.x-=8;P.face=-1;P.run=true;}
}
setInterval(mv,16);

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();const t=e.touches[0],rc=canvas.getBoundingClientRect();
  const x=t.clientX-rc.left;
  if(state!=='play'){reset();return;}
  if(x>canvas.width*.6)shoot();
  else if(x<canvas.width*.3){P.x-=8;P.face=-1;}
  else if(P.jumps<P.maxJumps){P.jmp=true;P.vy=-13;P.jumps++;snd('jump');}
});

window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});

loop();
</script>
</body>
</html>
