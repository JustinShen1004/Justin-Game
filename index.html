<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Justin's Shooter</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#111;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Press Start 2P',monospace;overflow:hidden}
    canvas{display:block;border:3px solid #888}
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
canvas.width=Math.min(window.innerWidth-10,1200);
canvas.height=Math.min(window.innerHeight-10,500);
ctx.imageSmoothingEnabled=false;

// Colors (all monochrome)
const SKY='#607D8B',SKYN='#263238',CLOUD='#CFD8DC',CLOUDN='#37474F',
GROUND='#B0BEC5',GROUNDL='#90A4AE',
FILL='#ECEFF1',OUTLINE='#455A64',DARK='#263238',MID='#607D8B',WHITE='#ECEFF1';

// State
let state='idle',score=0,hi=parseInt(localStorage.getItem('shooterHi'))||0,speed=3,frame=0,night=false;
let shake=0,flash=0;

const GY=canvas.height-35, GRAV=0.5, JUMP=-11, MAXAM=10, RLD=50;

// Player
const P={x:80,y:GY,w:28,h:28,dh:18,dw:36,vy:0,jmp:false,duck:false,ammo:MAXAM,rl:false,rlt:0,scd:0,dub:false,tri:false,flash:0};

// Boss
let boss=null,b1=false,b2=false;

// Pools
const bul=[],bbe=[],ene=[],par=[],smk=[],exp=[],cld=[],mrk=[];

// Init clouds & marks
for(let i=0;i<8;i++)cld.push({x:Math.random()*canvas.width,y:20+Math.random()*80,w:40+Math.random()*60,h:10+Math.random()*8,s:.1+Math.random()*.25});
for(let i=0;i<25;i++)mrk.push({x:Math.random()*canvas.width,y:GY+4+Math.random()*20,s:1+Math.random()*2});

// Audio
const AC=new(window.AudioContext||window.webkitAudioContext)();
function snd(t){
  if(AC.state==='suspended')AC.resume();
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);const n=AC.currentTime;
  const f={jump:['square',250,600,.08,.1],shoot:['square',800,200,.05,.07],
    hit:['sawtooth',120,120,.15,.15],kill:['sine',700,1400,.08,.1],
    boss:['sawtooth',80,40,.4,.15],charge:['sawtooth',60,250,.25,.12],
    boom:['sawtooth',200,20,.6,.2],sword:['sawtooth',400,80,.15,.1],
    bshoot:['square',150,60,.1,.1],phase:['square',300,800,.15,.12],
    reload:['sine',500,700,.08,.05],ding:['sine',800,800,.06,.08]}[t];
  if(!f)return;
  o.type=f[0];o.frequency.setValueAtTime(f[1],n);o.frequency.exponentialRampToValueAtTime(f[2],n+f[3]);
  g.gain.setValueAtTime(f[4],n);g.gain.exponentialRampToValueAtTime(.001,n+f[3]+.02);
  o.start(n);o.stop(n+f[3]+.03);
}

// Drawing helpers
function r(x,y,w,h,c){ctx.fillStyle=c||FILL;ctx.fillRect(x|0,y|0,w|0,h|0);}
function drawPlayer(){
  const p=P,bg=night?SKYN:SKY;
  let w,h,y;
  if(p.duck){w=p.dw;h=p.dh;y=GY-h;}else{w=p.w;h=p.h;y=p.y-h;}
  const x=p.x,fl=p.flash>0?WHITE:FILL;
  r(x-2,GY-2,w+4,4,'rgba(0,0,0,0.08)');
  r(x,y,w,h,fl);r(x+2,y+2,w-4,h-4,fl);
  // Eye
  r(x+w-9,y+5,5,5,bg);r(x+w-7,y+7,2,2,OUTLINE);
  // Gun tube
  if(!p.duck){r(x+w-2,y+12,14,5,OUTLINE);r(x+w+8,y+10,5,9,OUTLINE);}
  else{r(x+w-2,y+4,14,5,OUTLINE);r(x+w+8,y+2,5,9,OUTLINE);}
  // Legs
  if(!p.duck&&!p.jmp){
    const l=Math.floor(frame/5)%2;
    r(x+3,y+h,7,l?9:4,OUTLINE);r(x+w-10,y+h,7,l?4:9,OUTLINE);
    r(x+1,y+h+(l?9:4),11,3,OUTLINE);r(x+w-12,y+h+(l?4:9),11,3,OUTLINE);
  }
}

function drawBullets(){bul.forEach(b=>{r(b.x,b.y,12,4,WHITE);r(b.x-6,b.y+1,6,2,'rgba(228,228,228,0.3)');});}
function drawBB(){bbe.forEach(b=>{r(b.x,b.y,b.z,b.z,DARK);r(b.x+2,b.y+2,b.z-4,b.z-4,MID);});}
function drawEne(){
  ene.forEach(e=>{
    if(e.t==='g'){
      const l=Math.floor(frame/4)%2;
      r(e.x,e.y-e.h,e.w,e.h,DARK);r(e.x+2,e.y-e.h+2,e.w-4,e.h-4,OUTLINE);
      r(e.x+4,e.y-e.h+4,5,5,WHITE);r(e.x+5,e.y-e.h+5,3,3,DARK);
      r(e.x+2,e.y,5,l?7:3,DARK);r(e.x+e.w-7,e.y,5,l?3:7,DARK);
    }else{
      const w=Math.sin(frame*.25)*6;
      r(e.x,e.y-e.h/2,e.w,e.h,OUTLINE);r(e.x+2,e.y-e.h/2+2,e.w-4,e.h-4,MID);
      r(e.x-7,e.y-e.h/2-7+w,9,7,OUTLINE);r(e.x+e.w-2,e.y-e.h/2-7-w,9,7,OUTLINE);
      r(e.x+6,e.y-e.h/2+4,5,5,WHITE);r(e.x+7,e.y-e.h/2+5,3,3,OUTLINE);
    }
  });
}

function drawKnight(b){
  const p2=b.phase2,sc=p2?1.4:1,bx=b.x,by=b.y;
  const mc=b.flash>0?WHITE:FILL,bob=Math.sin(frame*(p2?.08:.04))*(p2?6:3);
  // Shadow
  r(bx-8*sc,GY-2,(b.w+16)*sc,5,'rgba(0,0,0,0.08)');
  // Legs
  r(bx+15*sc,by+75*sc+bob,16*sc,28*sc,mc);r(bx+10*sc,by+100*sc+bob,22*sc,14*sc,mc);r(bx+6*sc,by+110*sc+bob,28*sc,8*sc,OUTLINE);
  r(bx+68*sc,by+75*sc+bob,16*sc,28*sc,mc);r(bx+65*sc,by+100*sc+bob,22*sc,14*sc,mc);r(bx+62*sc,by+110*sc+bob,28*sc,8*sc,OUTLINE);
  r(bx+17*sc,by+95*sc+bob,12*sc,6*sc,DARK);r(bx+70*sc,by+95*sc+bob,12*sc,6*sc,DARK);
  // Body
  r(bx+5*sc,by+20*sc+bob,90*sc,58*sc,mc);r(bx+10*sc,by+25*sc+bob,80*sc,48*sc,OUTLINE);r(bx+15*sc,by+30*sc+bob,70*sc,38*sc,mc);
  r(bx+40*sc,by+30*sc+bob,20*sc,38*sc,DARK);r(bx+8*sc,by+70*sc+bob,84*sc,8*sc,OUTLINE);r(bx+42*sc,by+71*sc+bob,16*sc,6*sc,DARK);
  // Core
  const cf=b.cflash>0;r(bx+40*sc,by+42*sc+bob,20*sc,16*sc,cf?WHITE:DARK);r(bx+44*sc,by+46*sc+bob,12*sc,8*sc,mc);
  // Left arm/shield
  const sb=Math.sin(frame*.06)*3;
  r(bx-12*sc,by+28*sc+bob+sb,14*sc,26*sc,mc);r(bx-16*sc,by+50*sc+bob+sb,18*sc,14*sc,mc);
  r(bx-10*sc,by+50*sc+bob+sb,10*sc,5*sc,DARK);
  r(bx-28*sc,by+32*sc+bob+sb,16*sc,36*sc,OUTLINE);r(bx-26*sc,by+36*sc+bob+sb,12*sc,28*sc,DARK);r(bx-24*sc,by+42*sc+bob+sb,8*sc,16*sc,OUTLINE);r(bx-32*sc,by+46*sc+bob+sb,6*sc,8*sc,DARK);
  // Right arm/sword
  let sa=0;if(b.ap==='sword')sa=Math.sin(b.at*.18)*40;if(b.ap==='fire')sa=-20;
  r(bx+96*sc,by+28*sc+bob-sa/20,14*sc,26*sc,mc);r(bx+98*sc,by+50*sc+bob-sa/20,16*sc,14*sc,mc);r(bx+98*sc,by+50*sc+bob-sa/20,10*sc,5*sc,DARK);
  r(bx+110*sc,by+10*sc+bob-sa/8,8*sc,48*sc,MID);r(bx+112*sc,by+12*sc+bob-sa/8,4*sc,44*sc,WHITE);
  r(bx+106*sc,by+52*sc+bob-sa/20,16*sc,6*sc,DARK);r(bx+112*sc,by+56*sc+bob-sa/20,6*sc,12*sc,OUTLINE);
  // Head
  r(bx+20*sc,by-5*sc+bob,60*sc,30*sc,mc);r(bx+25*sc,by-12*sc+bob,50*sc,10*sc,OUTLINE);
  r(bx+22*sc,by+2*sc+bob,8*sc,14*sc,DARK);r(bx+24*sc,by+5*sc+bob,6*sc,8*sc,mc);r(bx+25*sc,by+7*sc+bob,3*sc,4*sc,WHITE);
  r(bx+20*sc,by-1*sc+bob,12*sc,4*sc,OUTLINE);r(bx+22*sc,by+18*sc+bob,10*sc,6*sc,DARK);
  for(let i=0;i<3;i++)r(bx+24*sc,by+(19+i*2)*sc+bob,6*sc,1*sc,mc);
  r(bx+46*sc,by-20*sc+bob,8*sc,12*sc,OUTLINE);r(bx+42*sc,by-26*sc+bob,16*sc,8*sc,OUTLINE);r(bx+44*sc,by-32*sc+bob,12*sc,8*sc,OUTLINE);
  r(bx+18*sc,by-10*sc+bob,6*sc,16*sc,MID);r(bx+14*sc,by-16*sc+bob,8*sc,8*sc,MID);
  r(bx+76*sc,by-10*sc+bob,6*sc,16*sc,MID);r(bx+78*sc,by-16*sc+bob,8*sc,8*sc,MID);
  r(bx+20*sc,by+22*sc+bob,14*sc,6*sc,OUTLINE);
  // P2 aura
  if(p2){ctx.fillStyle=`rgba(80,80,80,${.06+Math.sin(frame*.1)*.03})`;ctx.fillRect(bx-6*sc,by-28*sc+bob,(b.w+12)*sc,(b.h+36)*sc);}
  // Weak points
  if(Math.sin(frame*.2)>0){r(bx+42*sc,by+44*sc+bob,4*sc,4*sc,WHITE);r(bx+19*sc,by+97*sc+bob,4*sc,4*sc,WHITE);r(bx+73*sc,by+97*sc+bob,4*sc,4*sc,WHITE);}
}

function drawBoss(){
  if(!boss)return;const b=boss;
  if(b.t==='knight'){if(b.ph==='trans'){ctx.fillStyle=`rgba(200,200,200,${Math.sin(b.tt*.3)*.08+.06})`;ctx.fillRect(0,0,canvas.width,canvas.height);}drawKnight(b);}
  else{
    const fc=b.flash>0,ic=b.ph==='charge';
    r(b.x,b.y,b.w,b.h,fc?WHITE:FILL);
    for(let i=0;i<5;i++)r(b.x+8+i*16,b.y-8-(i%2)*4,8,8+(i%2)*4,OUTLINE);
    r(b.x+4,b.y+4,b.w-8,b.h-8,OUTLINE);r(b.x+8,b.y+8,b.w-16,b.h-16,FILL);
    r(b.x+14,b.y+18,16,12,WHITE);r(b.x+50,b.y+18,16,12,WHITE);
    r(b.x+18,b.y+21,6,6,FILL);r(b.x+54,b.y+21,6,6,FILL);
    r(b.x+12,b.y+14,18,3,OUTLINE);r(b.x+48,b.y+14,18,3,OUTLINE);
    r(b.x+22,b.y+44,36,6,OUTLINE);
    r(b.x+4,b.y+b.h,14,ic?12:8,OUTLINE);r(b.x+b.w-18,b.y+b.h,14,ic?12:8,OUTLINE);
  }
  // HP bar
  const hp=b.dhp/b.mhp,bw=b.t==='knight'?300:140,bh=14,bx=(canvas.width-bw)/2,by=35;
  ctx.fillStyle=night?WHITE:OUTLINE;ctx.font='8px "Press Start 2P",monospace';ctx.textAlign='center';
  ctx.fillText(b.lbl,canvas.width/2,by-8);
  r(bx,by,bw,bh,night?DARK:MID);r(bx+1,by+1,(bw-2)*hp,bh-2,OUTLINE);
  if(b.flash>0)r(bx+1,by+1,(bw-2)*hp,bh-2,'rgba(255,255,255,0.3)');
  ctx.strokeStyle=OUTLINE;ctx.lineWidth=2;ctx.strokeRect(bx,by,bw,bh);
  const sg=b.t==='knight'?20:10;ctx.fillStyle=night?SKYN:SKY;for(let i=1;i<sg;i++)ctx.fillRect(bx+(bw/sg)*i,by+1,1,bh-2);
  ctx.fillStyle=night?WHITE:OUTLINE;ctx.font='7px "Press Start 2P",monospace';
  ctx.fillText(Math.ceil(b.hp)+'/'+b.mhp,canvas.width/2,by+bh+12);
  if(b.phase2)ctx.fillText('PHASE 2 - FURY',canvas.width/2,by+bh+24);
}

function drawClouds(){ctx.fillStyle=night?CLOUDN:CLOUD;cld.forEach(c=>{ctx.fillRect(c.x,c.y,c.w,c.h);ctx.fillRect(c.x+8,c.y-5,c.w*.4,7);ctx.fillRect(c.x+c.w*.4,c.y-8,c.w*.3,7);});}
function drawGround(){r(0,GY,canvas.width,3,GROUNDL);r(0,GY+3,canvas.width,canvas.height-GY-3,GROUND);mrk.forEach(m=>{r(m.x,m.y,m.s,m.s,GROUNDL);});}
function drawSmk(){smk.forEach(p=>{r(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz,p.c);});}
function drawExp(){exp.forEach(p=>{ctx.fillStyle=p.c;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});}
function drawPar(){par.forEach(p=>{r(p.x,p.y,p.s,p.s,p.c);});}
function drawHUD(){
  ctx.fillStyle=night?WHITE:OUTLINE;ctx.font='16px "Press Start 2P",monospace';ctx.textAlign='right';
  ctx.fillText('HI '+String(hi).padStart(5,'0')+'  '+String(Math.floor(score)).padStart(5,'0'),canvas.width-20,30);
  ctx.textAlign='left';ctx.font='10px "Press Start 2P",monospace';ctx.fillText('AMMO',16,canvas.height-8);
  const ax=80,ay=canvas.height-18;
  for(let i=0;i<MAXAM;i++){r(ax+i*14,ay,10,12,i<P.ammo?OUTLINE:(night?DARK:MID));}
  if(P.rl){const pct=P.rlt/RLD;r(ax,ay+14,10,50*pct,DARK);ctx.font='7px "Press Start 2P",monospace';ctx.fillStyle=night?WHITE:OUTLINE;ctx.fillText('RELOADING',ax+14,ay+20);}
  ctx.textAlign='center';
  if(P.tri){ctx.fillStyle=night?WHITE:OUTLINE;ctx.font='10px "Press Start 2P",monospace';ctx.fillText('TRIPLE SHOT',canvas.width/2,30);}
  else if(P.dub){ctx.fillStyle=night?WHITE:OUTLINE;ctx.font='10px "Press Start 2P",monospace';ctx.fillText('DOUBLE SHOT',canvas.width/2,30);}
}
function drawGO(){ctx.fillStyle=night?WHITE:OUTLINE;ctx.font='20px "Press Start 2P",monospace';ctx.textAlign='center';ctx.fillText('GAME OVER',canvas.width/2,canvas.height/2-20);ctx.font='10px "Press Start 2P",monospace';ctx.fillText('Press SPACE to restart',canvas.width/2,canvas.height/2+10);}
function drawIdle(){ctx.fillStyle=night?WHITE:OUTLINE;ctx.font='18px "Press Start 2P",monospace';ctx.textAlign='center';ctx.fillText("Justin's Shooter",canvas.width/2,canvas.height/2-30);ctx.font='11px "Press Start 2P",monospace';ctx.fillText('SPACE: Shoot | W: Jump | S: Duck',canvas.width/2,canvas.height/2+10);}

// Spawn
function spawnE(){const t=Math.random()<.5?'g':'f';let y,w,h;if(t==='g'){w=16+Math.random()*10;h=16+Math.random()*8;y=GY;}else{w=28;h=20;y=GY-80-Math.random()*70;}ene.push({x:canvas.width+20,y,w,h,t,hp:1});}
function spawnK(){boss={t:'knight',x:canvas.width+60,y:GY-120,w:120,h:120,hp:50,mhp:50,dhp:50,ph:'enter',phase2:false,ap:'idle',at:0,st:0,si:140,flash:0,cflash:0,lbl:'KNIGHT COMMANDER',hx:canvas.width-180,tt:0};}
function spawnC(){boss={t:'charger',x:canvas.width+40,y:GY-80,w:80,h:70,hp:35,mhp:35,dhp:35,ph:'enter',hx:canvas.width-140,ct:0,cs:0,flash:0,lbl:'CHARGING BOSS'};}

function sp(x,y,n){for(let i=0;i<n;i++)par.push({x,y,vx:(Math.random()-.5)*5,vy:(Math.random()-1)*4,s:2+Math.random()*3,l:1,c:FILL});}
function spS(x,y,n){for(let i=0;i<n;i++)smk.push({x:x+(Math.random()-.5)*20,y:y+(Math.random()-.5)*20,vx:(Math.random()-.5)*1.5,vy:-1-Math.random()*1.5,sz:4+Math.random()*8,l:1,c:`rgba(${100+Math.random()*50|0},${100+Math.random()*50|0},${100+Math.random()*50|0},0.4)`});}
function spE(bx,by,bw,bh){shake=20;flash=6;
for(let i=0;i<20;i++){exp.push({x:bx+Math.random()*bw,y:by+Math.random()*bh,vx:(Math.random()-.5)*8,vy:(Math.random()-1)*6,w:4+Math.random()*12,h:4+Math.random()*12,l:1,c:[FILL,WHITE,OUTLINE][Math.floor(Math.random()*3)],r:(Math.random()-.5)*.3});}
sp(bx+bw/2,by+bh/2,25);spS(bx+bw/2,by+bh/2,6);}

function ro(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function phb(){const p=P;if(p.duck)return{x:p.x+4,y:GY-p.dh+2,w:p.dw-8,h:p.dh-4};return{x:p.x+4,y:p.y-p.h+2,w:p.w-8,h:p.h-4};}

// Update
function update(){
  if(state!=='play')return;
  frame++;score+=1/6;speed=Math.min(10,3+score*.001+Math.floor(score/100)*.25);
  if(Math.floor(score/100)>ml){ml=Math.floor(score/100);snd('ding');}
  if(shake>0)shake--;if(flash>0)flash--;
  const sn=Math.floor(score/700)%2===1;if(sn!==night){night=sn;}
  if(P.scd>0)P.scd--;if(P.flash>0)P.flash--;
  // Auto-reload
  if(P.rl){P.rlt++;if(P.rlt>=RLD){P.ammo=MAXAM;P.rl=false;P.rlt=0;snd('reload');}}
  else if(P.ammo<MAXAM&&P.scd===0&&frame%10===0)P.ammo=Math.min(MAXAM,P.ammo+1);
  P.y+=P.vy;if(P.y>=GY){P.y=GY;P.vy=0;P.jmp=false;}
  if(P.jmp)P.vy+=GRAV;
  // Scrolling
  mrk.forEach(m=>{m.x-=speed;if(m.x<-5){m.x=canvas.width+5;m.y=GY+4+Math.random()*20;}});
  cld.forEach(c=>{c.x-=c.s;if(c.x+c.w<0){c.x=canvas.width+10;c.y=20+Math.random()*80;}});
  // Bullets
  for(let i=bul.length-1;i>=0;i--){bul[i].x+=bul[i].vx;if(bul[i].x>canvas.width+20)bul.splice(i,1);}
  // Boss bullets
  for(let i=bbe.length-1;i>=0;i--){const b=bbe[i];b.x+=b.vx;b.y+=b.vy;if(b.x<-20||b.x>canvas.width+20||b.y<-20||b.y>canvas.height+20){bbe.splice(i,1);continue;}
  if(ro(phb(),{x:b.x,y:b.y,w:b.z,h:b.z})){state='over';snd('hit');sp(P.x+P.w/2,P.y-P.h/2,15);if(score>hi){hi=Math.floor(score);localStorage.setItem('shooterHi',hi);}return;}}
  // Spawn bosses
  if(score>=200&&!b1&&!boss){spawnK();b1=true;snd('boss');}
  if(score>=700&&!b2&&!boss&&b1){spawnC();b2=true;snd('boss');}
  // Spawn enemies
  const br=boss?.006:(score>400?.02:(score>200?.015:.012));
  const mg=boss?220:(score>400?140:180);
  if(Math.random()<br&&(ene.length===0||ene[ene.length-1].x<canvas.width-mg))spawnE();
  // Enemies
  for(let i=ene.length-1;i>=0;i--){const e=ene[i];e.x-=speed*(e.t==='f'?1.4:1);
  if(e.t==='f')e.y+=Math.sin(frame*.12+i)*1.5;
  if(e.x<-40){ene.splice(i,1);continue;}
  for(let j=bul.length-1;j>=0;j--){const b=bul[j];
  const hw=e.t==='f'?e.w+16:e.w,hh=e.t==='f'?e.h+16:e.h,hx=e.t==='f'?e.x-8:e.x,hy=e.t==='f'?e.y-e.h-8:e.y-e.h;
  if(ro({x:b.x,y:b.y,w:12,h:4},{x:hx,y:hy,w:hw,h:hh})){e.hp--;bul.splice(j,1);sp(e.x+e.w/2,e.y-e.h/2,4);if(e.hp<=0){snd('kill');sp(e.x+e.w/2,e.y-e.h/2,8);score+=10;ene.splice(i,1);break;}}}
  if(e.hp>0&&ro(phb(),{x:e.x,y:e.y-e.h,w:e.w,h:e.h})){state='over';snd('hit');sp(P.x+P.w/2,P.y-P.h/2,15);if(score>hi){hi=Math.floor(score);localStorage.setItem('shooterHi',hi);}}}
  // Boss
  if(boss){const b=boss;if(b.flash>0)b.flash--;if(b.cflash>0)b.cflash--;b.dhp+=(b.hp-b.dhp)*.12;
  if(b.t==='knight'){
    if(b.ph==='trans'){b.tt++;b.y=GY-120+Math.sin(b.tt*.1)*15;if(b.tt%8===0)spE(b.x+Math.random()*b.w,b.y+Math.random()*b.h,25,25);
    if(b.tt>80){b.ph='fight';b.phase2=true;b.w=160;b.h=160;b.y=GY-160;b.hx=canvas.width-220;b.x=b.hx;b.si=70;b.ap='idle';b.at=0;flash=12;shake=15;}}
    else if(b.ph==='enter'){b.x-=1.5;if(b.x<=b.hx){b.x=b.hx;b.ph='fight';b.ap='idle';b.at=0;}}
    else if(b.ph==='fight'){
      const bs=b.phase2?.06:.03,ba=b.phase2?8:4;
      b.y=(b.phase2?GY-160:GY-120)+Math.sin(frame*bs)*ba;b.at++;
      const iv=b.phase2?b.si*.5:b.si;
      if(b.ap==='idle'){b.st++;if(b.st>=iv){b.st=0;const rr=Math.random();
      if(rr<(b.phase2?.35:.4)){b.ap='fire';b.at=0;}else if(rr<(b.phase2?.65:.7)){b.ap='sword';b.at=0;}else{b.ap='stomp';b.at=0;}}}
      else if(b.ap==='fire'){const fr=b.phase2?10:18;
      if(b.at%fr===0&&b.at<=fr*(b.phase2?5:3)){snd('bshoot');const dx=P.x-b.x,dy=(P.y-P.h/2)-(b.y+40),dist=Math.sqrt(dx*dx+dy*dy),spd=b.phase2?4.5:3;
      bbe.push({x:b.x-5,y:b.y+(b.phase2?20:12),vx:(dx/dist)*spd,vy:(dy/dist)*spd,z:b.phase2?10:8});}
      if(b.at>60)b.ap='idle';}
      else if(b.ap==='sword'){if(b.at===10)snd('sword');if(b.phase2&&b.at%15===0&&b.at<50)bbe.push({x:b.x+100,y:b.y+60,vx:2,vy:Math.sin(b.at*.2)*3,z:10});if(b.at>(b.phase2?45:50))b.ap='idle';}
      else if(b.ap==='stomp'){if(b.at===15){snd('bshoot');bbe.push({x:b.x+60,y:GY-8,vx:-4,vy:0,z:14});bbe.push({x:b.x+60,y:GY-8,vx:4,vy:0,z:14});
      if(b.phase2){bbe.push({x:b.x+60,y:GY-8,vx:-2.5,vy:-2,z:10});bbe.push({x:b.x+60,y:GY-8,vx:2.5,vy:-2,z:10});}}
      if(b.at>(b.phase2?35:50))b.ap='idle';}
      if(!b.phase2&&b.hp<=b.mhp*.5){b.ph='trans';b.tt=0;b.ap='idle';snd('phase');flash=15;shake=20;}}
    else if(b.ph==='die'){b.dt++;
    if(b.dt===5)spE(b.x,b.y,b.w*.3,b.h*.3);if(b.dt===15)spE(b.x+b.w*.5,b.y,b.w*.3,b.h*.3);
    if(b.dt===25)spE(b.x+b.w*.7,b.y+20,b.w*.3,b.h*.3);if(b.dt===35)spE(b.x+10,b.y+b.h*.5,b.w*.5,b.h*.3);
    if(b.dt===45)spE(b.x+b.w*.3,b.y+b.h*.6,b.w*.4,b.h*.3);
    if(b.dt===55){spE(b.x+b.w/2,b.y+b.h/2,b.w,b.h);shake=30;flash=10;}
    if(b.dt>75){snd('boom');sp(b.x+b.w/2,b.y+b.h/2,50);score+=100;P.dub=true;boss=null;}}
  }else{
    if(b.ph==='enter'){b.x-=1.5;if(b.x<=b.hx){b.x=b.hx;b.ph='idle';b.ct=0;}}
    else if(b.ph==='idle'){b.y=GY-80+Math.sin(frame*.05)*15;b.ct++;if(b.ct>=90){b.ph='charge';b.cs=10;b.ty=P.y-P.h;snd('charge');}}
    else if(b.ph==='charge'){b.x-=b.cs;const dy=b.ty-b.y;b.y+=dy*.08;b.cs*=.99;if(b.x<40||b.cs<2)b.ph='retreat';}
    else if(b.ph==='retreat'){b.x+=3;b.y+=(GY-80-b.y)*.05;if(b.x>=b.hx){b.x=b.hx;b.ph='idle';b.ct=0;}}
  }
  if(boss&&boss.ph!=='die'&&boss.ph!=='trans'&&ro(phb(),{x:b.x,y:b.y,w:b.w,h:b.h})){state='over';snd('hit');sp(P.x+P.w/2,P.y-P.h/2,15);if(score>hi){hi=Math.floor(score);localStorage.setItem('shooterHi',hi);}return;}
  if(boss&&boss.ph!=='die'&&boss.ph!=='trans'){
  for(let j=bul.length-1;j>=0;j--){const bl=bul[j];let dmg=1;
  if(boss.t==='knight'){const sc=boss.phase2?1.4:1;
  if(ro({x:bl.x,y:bl.y,w:12,h:4},{x:boss.x+40*sc,y:boss.y+42*sc,w:20*sc,h:16*sc})){dmg=3;boss.cflash=8;}
  else if(ro({x:bl.x,y:bl.y,w:12,h:4},{x:boss.x+15*sc,y:boss.y+95*sc,w:16*sc,h:8*sc}))dmg=2;
  else if(ro({x:bl.x,y:bl.y,w:12,h:4},{x:boss.x+68*sc,y:boss.y+95*sc,w:16*sc,h:8*sc}))dmg=2;
  }else{if(boss.ph==='charge')dmg=.5;}
  if(ro({x:bl.x,y:bl.y,w:12,h:4},{x:boss.x,y:boss.y,w:boss.w,h:boss.h})){
  boss.hp-=dmg;boss.flash=6;bul.splice(j,1);sp(bl.x,bl.y,dmg>1?6:3);spS(bl.x,bl.y,dmg>1?4:2);
  if(boss.hp<=0){if(boss.t==='knight'){boss.ph='die';boss.dt=0;snd('boom');}else{snd('kill');snd('boom');sp(boss.x+boss.w/2,boss.y+boss.h/2,30);score+=50;P.tri=true;boss=null;}break;}}}}}}
  // Particles
  for(let i=exp.length-1;i>=0;i--){const p=exp[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.l-=.01;p.r+=.02;if(p.l<=0)exp.splice(i,1);}
  for(let i=smk.length-1;i>=0;i--){const p=smk[i];p.x+=p.vx;p.y+=p.vy;p.sz+=.12;p.l-=.015;if(p.l<=0)smk.splice(i,1);}
  for(let i=par.length-1;i>=0;i--){const p=par[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.l-=.03;if(p.l<=0)par.splice(i,1);}
}

let ml=0;
function shoot(){
  if(P.ammo<=0||P.scd>0)return;
  P.ammo--;P.scd=8;snd('shoot');
  if(P.ammo<=0){P.rl=true;P.rlt=0;}
  const gx=P.x+(P.duck?P.dw:P.w)+8,gy=P.duck?GY-P.dh+6:P.y-P.h+14;
  bul.push({x:gx,y:gy,vx:16});
  if(P.dub)bul.push({x:gx,y:gy-10,vx:16});
  if(P.tri)bul.push({x:gx,y:gy+10,vx:16});
}

function draw(){
  ctx.save();
  if(shake>0)ctx.translate((Math.random()-.5)*shake*1.2,(Math.random()-.5)*shake*1.2);
  ctx.fillStyle=night?SKYN:SKY;ctx.fillRect(0,0,canvas.width,canvas.height);
  drawClouds();drawGround();drawBullets();drawBB();drawEne();drawBoss();drawSmk();drawExp();drawPar();
  if(flash>0){ctx.fillStyle='rgba(200,200,200,0.12)';ctx.fillRect(0,0,canvas.width,canvas.height);}
  ctx.restore();
  drawPlayer();
  if(state==='play'||state==='over')drawHUD();
  if(state==='idle')drawIdle();
  if(state==='over')drawGO();
}

function reset(){
  state='play';score=0;speed=3;frame=0;ml=0;shake=0;flash=0;night=false;
  P.y=GY;P.vy=0;P.jmp=false;P.duck=false;P.ammo=MAXAM;P.rl=false;P.rlt=0;P.scd=0;P.dub=false;P.tri=false;P.flash=0;
  boss=null;b1=false;b2=false;
  bul.length=0;bbe.length=0;ene.length=0;par.length=0;smk.length=0;exp.length=0;
}

function loop(){update();draw();requestAnimationFrame(loop);}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();if(state==='idle'||state==='over')reset();else if(state==='play')shoot();}
  if(e.code==='KeyW'||e.code==='ArrowUp'){e.preventDefault();if(state==='play'&&!P.jmp){P.jmp=true;P.duck=false;P.vy=JUMP;snd('jump');}}
  if(e.code==='KeyS'||e.code==='ArrowDown'){e.preventDefault();if(state==='play'&&!P.jmp)P.duck=true;}
});
document.addEventListener('keyup',e=>{if(e.code==='KeyS'||e.code==='ArrowDown')P.duck=false;});
canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0],r=canvas.getBoundingClientRect(),y=t.clientY-r.top,x=t.clientX-r.left;
if(state!=='play'){reset();return;}if(x>canvas.width*.6)shoot();else if(y<canvas.height*.4){if(!P.jmp){P.jmp=true;P.vy=JUMP;snd('jump');}}else P.duck=true;});
canvas.addEventListener('touchend',()=>{P.duck=false;});
loop();
</script>
</body>
