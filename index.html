<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dino Runner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
    }
    
    #gameContainer {
      position: relative;
      border: 4px solid #535353;
      background: #f7f7f7;
    }
    
    #gameCanvas {
      display: block;
    }
    
    #instructions {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      color: #535353;
      font-size: 10px;
      text-align: center;
      white-space: nowrap;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    #instructions.hidden {
      opacity: 0;
    }
    
    .night #gameContainer {
      background: #1a1a2e;
      border-color: #f7f7f7;
    }
    
    .night #instructions {
      color: #f7f7f7;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="instructions">SPACE / ↑ : Jump | ↓ : Duck</div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('gameContainer');
    const instructions = document.getElementById('instructions');

    canvas.width = Math.min(800, window.innerWidth - 40);
    canvas.height = 200;
    ctx.imageSmoothingEnabled = false;

    const GameState = { IDLE: 0, PLAYING: 1, GAME_OVER: 2 };
    let state = GameState.IDLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('dinoHighScore')) || 0;
    let gameSpeed = 6;
    let frameCount = 0;
    let isNight = false;
    let lastMilestone = 0;

    const GROUND_Y = canvas.height - 20;
    const GRAVITY = 0.6;
    const JUMP_VELOCITY = -12;

    const dino = {
      x: 50,
      y: GROUND_Y,
      width: 48,
      height: 52,
      duckWidth: 62,
      duckHeight: 30,
      velocityY: 0,
      isJumping: false,
      isDucking: false,
      frame: 0,
      frameTimer: 0
    };

    const ground = {
      offset: 0,
      pebbles: []
    };

    const obstacles = [];
    const stars = [];
    for (let i = 0; i < 30; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * (canvas.height - 60),
        size: Math.random() < 0.3 ? 2 : 1,
        twinkle: Math.random() * Math.PI * 2
      });
    }

    for (let i = 0; i < 20; i++) {
      ground.pebbles.push({
        x: Math.random() * canvas.width,
        y: GROUND_Y + 4 + Math.random() * 10,
        size: 1 + Math.random() * 2
      });
    }

    const clouds = [];
    for (let i = 0; i < 6; i++) {
      clouds.push({
        x: Math.random() * canvas.width,
        y: 20 + Math.random() * 60,
        width: 30 + Math.random() * 40,
        height: 10 + Math.random() * 8,
        speed: 0.2 + Math.random() * 0.3
      });
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      switch(type) {
        case 'jump':
          oscillator.type = 'square';
          oscillator.frequency.setValueAtTime(100, audioCtx.currentTime);
          oscillator.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);
          gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
          oscillator.start(audioCtx.currentTime);
          oscillator.stop(audioCtx.currentTime + 0.1);
          break;
        case 'hit':
          oscillator.type = 'sawtooth';
          oscillator.frequency.setValueAtTime(80, audioCtx.currentTime);
          gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
          oscillator.start(audioCtx.currentTime);
          oscillator.stop(audioCtx.currentTime + 0.2);
          break;
        case 'milestone':
          oscillator.type = 'sine';
          oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
          gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
          oscillator.start(audioCtx.currentTime);
          oscillator.stop(audioCtx.currentTime + 0.05);
          break;
      }
    }

    function drawDino() {
      const col = '#535353';
      const bg = isNight ? '#1a1a2e' : '#f7f7f7';
      ctx.fillStyle = col;

      if (dino.isDucking) {
        const x = dino.x;
        const y = GROUND_Y - dino.duckHeight;

        // Ducking T-rex - flat and wide
        // Body
        ctx.fillRect(x + 6, y + 6, 36, 16);
        ctx.fillRect(x + 2, y + 10, 44, 8);
        // Head
        ctx.fillRect(x + 36, y + 2, 18, 12);
        ctx.fillRect(x + 48, y + 6, 8, 8);
        // Jaw
        ctx.fillRect(x + 48, y + 10, 10, 6);
        // Eye
        ctx.fillStyle = bg;
        ctx.fillRect(x + 44, y + 4, 4, 4);
        ctx.fillStyle = col;
        ctx.fillRect(x + 45, y + 5, 2, 2);
        // Teeth
        ctx.fillStyle = bg;
        ctx.fillRect(x + 50, y + 14, 2, 2);
        ctx.fillRect(x + 54, y + 14, 2, 2);
        // Arm
        ctx.fillStyle = col;
        ctx.fillRect(x + 32, y + 16, 4, 6);
        // Legs
        const leg = state !== GameState.GAME_OVER && Math.floor(frameCount / 6) % 2;
        ctx.fillRect(x + 10, y + 22, 6, leg ? 6 : 4);
        ctx.fillRect(x + 22, y + 22, 6, leg ? 4 : 6);
      } else {
        const x = dino.x;
        const y = dino.y - dino.height;

        // Tail
        ctx.fillRect(x, y + 20, 4, 6);
        ctx.fillRect(x + 4, y + 16, 4, 8);

        // Body (main torso)
        ctx.fillRect(x + 8, y + 10, 18, 28);

        // Chest bump
        ctx.fillRect(x + 20, y + 14, 6, 20);

        // Head
        ctx.fillRect(x + 22, y, 14, 16);
        ctx.fillRect(x + 30, y + 2, 10, 14);

        // Snout/jaw
        ctx.fillRect(x + 36, y + 8, 8, 8);
        ctx.fillRect(x + 38, y + 12, 8, 6);

        // Eye
        ctx.fillStyle = bg;
        ctx.fillRect(x + 34, y + 4, 4, 4);
        ctx.fillStyle = col;
        ctx.fillRect(x + 35, y + 5, 2, 2);

        // Teeth
        ctx.fillStyle = bg;
        ctx.fillRect(x + 38, y + 16, 2, 2);
        ctx.fillRect(x + 42, y + 16, 2, 2);

        // Arm (tiny!)
        ctx.fillStyle = col;
        ctx.fillRect(x + 24, y + 20, 4, 6);
        ctx.fillRect(x + 26, y + 24, 4, 4);

        // Legs
        const leg = state !== GameState.GAME_OVER && !dino.isJumping && Math.floor(frameCount / 6) % 2;
        // Back leg
        ctx.fillRect(x + 8, y + 36, 8, 4);
        if (leg) {
          ctx.fillRect(x + 6, y + 40, 8, 6);
          ctx.fillRect(x + 4, y + 44, 4, 2);
        } else {
          ctx.fillRect(x + 10, y + 40, 8, 6);
          ctx.fillRect(x + 12, y + 44, 4, 2);
        }
        // Front leg
        ctx.fillRect(x + 18, y + 36, 8, 4);
        if (leg) {
          ctx.fillRect(x + 20, y + 40, 8, 6);
          ctx.fillRect(x + 22, y + 44, 4, 2);
        } else {
          ctx.fillRect(x + 16, y + 40, 8, 6);
          ctx.fillRect(x + 14, y + 44, 4, 2);
        }
      }
    }

    function drawGround() {
      ctx.fillStyle = '#535353';
      ctx.fillRect(0, GROUND_Y, canvas.width, 2);

      ground.pebbles.forEach(pebble => {
        ctx.fillRect(pebble.x, pebble.y, pebble.size, pebble.size);
      });
    }

    function drawClouds() {
      const cloudColor = isNight ? '#2a2a4a' : '#e0e0e0';
      ctx.fillStyle = cloudColor;
      clouds.forEach(cloud => {
        ctx.fillRect(cloud.x, cloud.y, cloud.width, cloud.height);
        ctx.fillRect(cloud.x + 6, cloud.y - 6, cloud.width * 0.5, 8);
        ctx.fillRect(cloud.x + cloud.width * 0.4, cloud.y - 10, cloud.width * 0.35, 8);
        ctx.fillRect(cloud.x + 2, cloud.y + cloud.height, cloud.width - 4, 4);
      });
    }

    function drawObstacle(obs) {
      ctx.fillStyle = '#535353';
      
      if (obs.type === 'cactus') {
        const cx = obs.x;
        const cy = obs.y;
        const h = obs.height;
        const trunkW = 12;
        const trunkX = cx + (obs.width - trunkW) / 2;

        // Main trunk
        ctx.fillRect(trunkX, cy - h, trunkW, h);

        // Left arm
        ctx.fillRect(trunkX - 10, cy - h * 0.65, 10, 6);
        ctx.fillRect(trunkX - 10, cy - h * 0.65 - 14, 6, 14);
        ctx.fillRect(trunkX - 12, cy - h * 0.65 - 14, 4, 6);

        // Right arm
        ctx.fillRect(trunkX + trunkW, cy - h * 0.55, 10, 6);
        ctx.fillRect(trunkX + trunkW + 4, cy - h * 0.55 - 16, 6, 16);
        ctx.fillRect(trunkX + trunkW + 10, cy - h * 0.55 - 16, 4, 6);
      } else if (obs.type === 'cactus_cluster') {
        // Three small cacti grouped together
        const cx = obs.x;
        const cy = obs.y;
        const spacing = 14;
        const heights = [obs.height * 0.7, obs.height, obs.height * 0.55];

        for (let i = 0; i < 3; i++) {
          const bx = cx + i * spacing;
          const bh = heights[i];
          const bw = 8;
          ctx.fillRect(bx, cy - bh, bw, bh);
          // Small arm on middle cactus
          if (i === 1) {
            ctx.fillRect(bx - 6, cy - bh * 0.6, 6, 4);
            ctx.fillRect(bx - 6, cy - bh * 0.6 - 8, 4, 8);
          }
          // Small arm on right cactus
          if (i === 2) {
            ctx.fillRect(bx + bw, cy - bh * 0.5, 6, 4);
            ctx.fillRect(bx + bw + 2, cy - bh * 0.5 - 6, 4, 6);
          }
        }
      } else if (obs.type === 'bird') {
        const wingOffset = Math.floor(frameCount / 8) % 2 === 0 ? 0 : -8;
        ctx.fillRect(obs.x, obs.y - 15 + wingOffset, obs.width, 4);
        ctx.fillRect(obs.x + obs.width - 10, obs.y - 25 + wingOffset, 4, 10);
        ctx.fillRect(obs.x + 4, obs.y - 10 + wingOffset, obs.width - 8, 3);
        ctx.fillRect(obs.x + 6, obs.y - 8 + wingOffset, obs.width - 12, 3);
      } else if (obs.type === 'floater') {
        // Floating enemy - spiky ball that hovers at head height
        const fx = obs.x;
        const fy = obs.y - obs.height;
        const bob = Math.sin(frameCount * 0.08) * 4;

        // Core body
        ctx.fillRect(fx + 6, fy + 6 + bob, 20, 16);
        ctx.fillRect(fx + 2, fy + 10 + bob, 28, 8);

        // Spikes top
        ctx.fillRect(fx + 8, fy + bob, 4, 6);
        ctx.fillRect(fx + 18, fy - 2 + bob, 4, 8);
        ctx.fillRect(fx + 26, fy + 2 + bob, 4, 6);

        // Spikes sides
        ctx.fillRect(fx, fy + 12 + bob, 4, 4);
        ctx.fillRect(fx + 28, fy + 12 + bob, 4, 4);

        // Eye
        ctx.fillStyle = isNight ? '#1a1a2e' : '#f7f7f7';
        ctx.fillRect(fx + 14, fy + 10 + bob, 6, 6);
        ctx.fillStyle = '#535353';
        ctx.fillRect(fx + 16, fy + 12 + bob, 3, 3);
      }
    }

    function drawStars() {
      if (!isNight) return;
      
      stars.forEach(star => {
        const alpha = 0.5 + 0.5 * Math.sin(star.twinkle + frameCount * 0.05);
        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.fillRect(star.x, star.y, star.size, star.size);
      });
    }

    function drawScore() {
      ctx.fillStyle = isNight ? '#f7f7f7' : '#535353';
      ctx.font = '16px "Press Start 2P", monospace';
      ctx.textAlign = 'right';
      ctx.fillText(`HI ${String(highScore).padStart(5, '0')}  ${String(Math.floor(score)).padStart(5, '0')}`, canvas.width - 20, 30);
    }

    function drawGameOver() {
      ctx.fillStyle = isNight ? '#f7f7f7' : '#535353';
      ctx.font = '20px "Press Start 2P", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
      
      ctx.font = '10px "Press Start 2P", monospace';
      ctx.fillText('Press any key to restart', canvas.width / 2, canvas.height / 2 + 10);
    }

    function drawStartMessage() {
      ctx.fillStyle = isNight ? '#f7f7f7' : '#535353';
      ctx.font = '14px "Press Start 2P", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('Press SPACE to start', canvas.width / 2, canvas.height / 2);
    }

    function spawnObstacle() {
      const floaterChance = score > 300 ? 0.25 : 0;
      const birdChance = score > 600 ? 0.3 : (score > 300 ? 0.1 : 0);
      const roll = Math.random();
      
      let type, width, height, y;
      if (roll < floaterChance) {
        type = 'floater';
        width = 32;
        height = 24;
        y = GROUND_Y - 35 - Math.random() * 15;
      } else if (roll < floaterChance + birdChance) {
        type = 'bird';
        width = 46;
        height = 40;
        y = GROUND_Y - 50 - Math.random() * 50;
      } else {
        // Ground obstacle - single cactus or cluster
        if (Math.random() < 0.4) {
          type = 'cactus_cluster';
          width = 42;
          height = 35 + Math.random() * 15;
          y = GROUND_Y;
        } else {
          type = 'cactus';
          width = 30 + Math.random() * 20;
          height = 35 + Math.random() * 35;
          y = GROUND_Y;
        }
      }
      
      obstacles.push({ x: canvas.width + 20, type, width, height, y });
    }

    function checkCollision() {
      const dinoHitbox = {
        x: dino.x + 6,
        y: (dino.isDucking ? GROUND_Y - dino.duckHeight : dino.y - dino.height) + 6,
        width: (dino.isDucking ? dino.duckWidth : dino.width) - 16,
        height: (dino.isDucking ? dino.duckHeight : dino.height) - 12
      };

      for (const obs of obstacles) {
        let obsHitbox;
        if (obs.type === 'floater') {
          const bob = Math.sin(frameCount * 0.08) * 4;
          obsHitbox = {
            x: obs.x + 4,
            y: obs.y - obs.height + 4 + bob,
            width: obs.width - 8,
            height: obs.height - 8
          };
        } else {
          obsHitbox = {
            x: obs.x + 4,
            y: obs.y - obs.height + 4,
            width: obs.width - 8,
            height: obs.height - 8
          };
        }

        if (dinoHitbox.x < obsHitbox.x + obsHitbox.width &&
            dinoHitbox.x + dinoHitbox.width > obsHitbox.x &&
            dinoHitbox.y < obsHitbox.y + obsHitbox.height &&
            dinoHitbox.y + dinoHitbox.height > obsHitbox.y) {
          return true;
        }
      }
      return false;
    }

    function update() {
      if (state !== GameState.PLAYING) return;

      frameCount++;
      score += 1/6;
      gameSpeed = Math.min(15, 6 + score * 0.001 + Math.floor(score / 100) * 0.4);

      if (Math.floor(score / 100) > lastMilestone) {
        lastMilestone = Math.floor(score / 100);
        playSound('milestone');
      }

      const cycleScore = Math.floor(score / 700);
      const shouldBeNight = cycleScore % 2 === 1;
      if (shouldBeNight !== isNight) {
        isNight = shouldBeNight;
        container.classList.toggle('night', isNight);
      }

      if (!dino.isJumping && !dino.isDucking) {
        dino.frameTimer++;
        if (dino.frameTimer > 6) {
          dino.frame = (dino.frame + 1) % 2;
          dino.frameTimer = 0;
        }
      }

      ground.offset = (ground.offset + gameSpeed) % canvas.width;
      ground.pebbles.forEach(pebble => {
        pebble.x -= gameSpeed;
        if (pebble.x < -5) {
          pebble.x = canvas.width + 5;
          pebble.y = GROUND_Y + 4 + Math.random() * 10;
        }
      });

      // Move clouds
      clouds.forEach(cloud => {
        cloud.x -= cloud.speed;
        if (cloud.x + cloud.width < 0) {
          cloud.x = canvas.width + 10;
          cloud.y = 20 + Math.random() * 60;
          cloud.width = 30 + Math.random() * 40;
        }
      });

      if (dino.isJumping) {
        dino.velocityY += GRAVITY;
        dino.y += dino.velocityY;
        
        if (dino.y >= GROUND_Y) {
          dino.y = GROUND_Y;
          dino.velocityY = 0;
          dino.isJumping = false;
        }
      }

      const spawnRate = score > 600 ? 0.035 : (score > 300 ? 0.03 : 0.025);
      if (Math.random() < spawnRate && (obstacles.length === 0 || obstacles[obstacles.length - 1].x < canvas.width - 200)) {
        spawnObstacle();
      }

      for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].x -= gameSpeed;
        if (obstacles[i].x < -60) {
          obstacles.splice(i, 1);
        }
      }

      if (checkCollision()) {
        state = GameState.GAME_OVER;
        playSound('hit');
        if (score > highScore) {
          highScore = Math.floor(score);
          localStorage.setItem('dinoHighScore', highScore);
        }
      }
    }

    function draw() {
      ctx.fillStyle = isNight ? '#1a1a2e' : '#f7f7f7';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawStars();
      drawClouds();
      drawGround();

      obstacles.forEach(drawObstacle);
      drawDino();
      
      if (state === GameState.PLAYING || state === GameState.GAME_OVER) {
        drawScore();
      }
      
      if (state === GameState.IDLE) {
        drawStartMessage();
        instructions.classList.remove('hidden');
      } else {
        instructions.classList.add('hidden');
      }
      
      if (state === GameState.GAME_OVER) {
        drawGameOver();
      }
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    function resetGame() {
      state = GameState.PLAYING;
      score = 0;
      gameSpeed = 6;
      frameCount = 0;
      lastMilestone = 0;
      dino.y = GROUND_Y;
      dino.velocityY = 0;
      dino.isJumping = false;
      dino.isDucking = false;
      obstacles.length = 0;
      ground.offset = 0;
    }

    function handleKeyDown(e) {
      if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
        e.preventDefault();
        
        if (state === GameState.IDLE) {
          resetGame();
        } else if (state === GameState.PLAYING && !dino.isJumping) {
          dino.isJumping = true;
          dino.isDucking = false;
          dino.velocityY = JUMP_VELOCITY;
          playSound('jump');
        } else if (state === GameState.GAME_OVER) {
          resetGame();
        }
      }
      
      if (e.code === 'ArrowDown' || e.code === 'KeyS') {
        e.preventDefault();
        if (state === GameState.PLAYING && !dino.isJumping) {
          dino.isDucking = true;
        }
      }
    }

    function handleKeyUp(e) {
      if (e.code === 'ArrowDown' || e.code === 'KeyS') {
        dino.isDucking = false;
      }
    }

    document.addEventListener('keydown', handleKeyDown);
    document.addEventListener('keyup', handleKeyUp);

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      const rect = canvas.getBoundingClientRect();
      const y = touch.clientY - rect.top;
      
      if (y < canvas.height / 2) {
        if (state === GameState.IDLE || state === GameState.GAME_OVER) {
          resetGame();
        } else if (!dino.isJumping) {
          dino.isJumping = true;
          dino.velocityY = JUMP_VELOCITY;
          playSound('jump');
        }
      } else {
        if (state === GameState.PLAYING && !dino.isJumping) {
          dino.isDucking = true;
        }
      }
    });

    canvas.addEventListener('touchend', (e) => {
      dino.isDucking = false;
    });

    gameLoop();
  </script>
</body>
</html>
