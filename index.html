<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slime Dungeon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a0a;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Press Start 2P',monospace;overflow:hidden}
    canvas{display:block;border:2px solid #444;border-radius:4px}
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
canvas.width=Math.min(window.innerWidth-20,900);
canvas.height=Math.min(window.innerHeight-20,600);
ctx.imageSmoothingEnabled=false;

const STONE='#3a3a4a',STONE_L='#5a5a6a',STONE_D='#2a2a3a',TORCH='#ff9944',TORCH_GLOW='rgba(255,150,50,0.15)',
SLIME='#66bb6a',SLIME_D='#4a9a4a',SLIME_E='#ff5555',SLIME_BOSS='#9944ff',SLIME_BOSS_D='#7722dd',
PLAYER='#4488ff',PLAYER_D='#2266dd',WHITE='#ffffff',BLACK='#111122',
DOOR='#aa8844',DOOR_L='#ccaa66',KEY='#ffdd44',KEY_GLOW='rgba(255,220,50,0.2)',
HP_FULL='#44cc44',HP_EMPTY='#333344',HP_BOSS='#cc4444';

let state='menu',score=0,hi=parseInt(localStorage.getItem('slimeHi'))||0,frame=0,room=0,keys=0,shake=0;
const ROOM_W=canvas.width,ROOM_H=canvas.height-60,GY=ROOM_H-40;

const P={x:60,y:GY,w:24,h:32,vy:0,jmp:false,hp:5,maxHp:5,inv:0,flash:0,scd:0,face:1};
let camX=0,targetCamX=0;
let boss=null,bossSpawned=false;
const slimes=[],bul=[],particles=[],torches=[];
const doors=[{x:ROOM_W-50,y:GY-60,w:30,h:60,locked:true},{x:ROOM_W-50,y:GY-60,w:30,h:60,locked:true},{x:ROOM_W-50,y:GY-60,w:30,h:60,locked:false}];
const keyItems=[{x:300,y:GY-20,got:false},{x:250,y:GY-20,got:false}];
let exitDoor={x:ROOM_W-50,y:GY-60,w:30,h:60};

const AC=new(window.AudioContext||window.webkitAudioContext)();
function snd(t){
  if(AC.state==='suspended')AC.resume();
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);const n=AC.currentTime;
  const f={jump:['square',200,500,.06,.08],shoot:['square',600,200,.04,.06],
    hit:['sawtooth',100,60,.15,.1],kill:['sine',500,1000,.06,.08],
    key:['sine',800,1200,.1,.08],door:['sawtooth',150,80,.2,.1],
    hurt:['sawtooth',150,80,.15,.12],boss:['sawtooth',80,40,.5,.15],
    win:['sine',400,800,.3,.1]}[t];
  if(!f)return;
  o.type=f[0];o.frequency.setValueAtTime(f[1],n);o.frequency.exponentialRampToValueAtTime(f[2],n+f[3]);
  g.gain.setValueAtTime(f[4],n);g.gain.exponentialRampToValueAtTime(.001,n+f[3]+.02);
  o.start(n);o.stop(n+f[3]+.03);
}

function r(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x|0,y|0,w|0,h|0);}

function drawRoom(){
  ctx.fillStyle=STONE_D;
  ctx.fillRect(0,0,ROOM_W,ROOM_H);
  
  for(let x=0;x<ROOM_W;x+=40){
    for(let y=0;y<ROOM_H;y+=20){
      const off=(Math.floor(y/20)%2)*20;
      r(x+off,y,38,18,STONE);
      r(x+off,y,38,2,STONE_L);
      r(x+off,y+16,38,2,STONE_D);
    }
  }
  
  torches.forEach(t=>{
    const flicker=Math.sin(frame*.15+t.x)*.3+.7;
    const grad=ctx.createRadialGradient(t.x,t.y,0,t.x,t.y,60*flicker);
    grad.addColorStop(0,TORCH_GLOW);
    grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad;
    ctx.fillRect(t.x-60,t.y-60,120,120);
    r(t.x-3,t.y,6,15,STONE_L);
    const fs=4+Math.sin(frame*.2+t.x)*2;
    r(t.x-fs/2,t.y-fs,fs,fs,TORCH);
    r(t.x-fs/2+1,t.y-fs+1,fs-2,fs-2,'#ffcc66');
  });
  
  r(0,GY,ROOM_W,4,STONE_L);
  r(0,GY+4,ROOM_W,ROOM_H-GY-4,STONE);
  
  for(let x=0;x<ROOM_W;x+=30){
    r(x,GY+4,28,8,STONE_L);
  }
}

function drawDoor(d){
  if(d.locked){
    r(d.x,d.y,d.w,d.h,STONE);
    r(d.x+4,d.y+4,d.w-8,d.h-8,'#553322');
    r(d.x+d.w/2-4,d.y+d.h/2-4,8,8,KEY);
  }else{
    r(d.x,d.y,d.w,d.h,DOOR);
    r(d.x+2,d.y+2,d.w-4,d.h-4,DOOR_L);
    r(d.x+d.w/2-3,d.y+d.h/2+10,6,6,STONE_D);
  }
}

function drawExitDoor(d){
  const glow=Math.sin(frame*.08)*.3+.7;
  const grad=ctx.createRadialGradient(d.x+d.w/2,d.y+d.h/2,0,d.x+d.w/2,d.y+d.h/2,50*glow);
  grad.addColorStop(0,'rgba(100,255,100,0.3)');
  grad.addColorStop(1,'transparent');
  ctx.fillStyle=grad;
  ctx.fillRect(d.x-40,d.y-40,d.w+80,d.h+80);
  r(d.x,d.y,d.w,d.h,'#44aa44');
  r(d.x+4,d.y+4,d.w-8,d.h-8,'#66cc66');
  r(d.x+d.w/2-2,d.y+d.h/2,4,8,'#44aa44');
}

function drawKey(k){
  if(k.got)return;
  const bob=Math.sin(frame*.08+k.x)*3;
  const grad=ctx.createRadialGradient(k.x,k.y+bob,0,k.x,k.y+bob,20);
  grad.addColorStop(0,KEY_GLOW);
  grad.addColorStop(1,'transparent');
  ctx.fillStyle=grad;
  ctx.fillRect(k.x-20,k.y-20+bob,40,40);
  r(k.x-6,k.y-4+bob,12,8,KEY);
  r(k.x-8,k.y-2+bob,4,4,KEY);
  r(k.x+4,k.y+2+bob,8,3,KEY);
}

function drawSlime(s){
  const squash=Math.sin(frame*.1+s.x)*.15;
  const w=s.w*(1+squash),h=s.h*(1-squash);
  const col=s.boss?SLIME_BOSS:SLIME;
  const colD=s.boss?SLIME_BOSS_D:SLIME_D;
  
  r(s.x+(s.w-w)/2,s.y+(s.h-h),w,h,col);
  r(s.x+(s.w-w)/2+2,s.y+(s.h-h)+2,w-4,h-4,colD);
  r(s.x+(s.w-w)/2+4,s.y+(s.h-h)+4,w-8,h/2,col);
  
  const eyeY=s.y+(s.h-h)+h*.3;
  r(s.x+s.w*.3,eyeY,6,6,WHITE);
  r(s.x+s.w*.6,eyeY,6,6,WHITE);
  r(s.x+s.w*.3+2,eyeY+2,3,3,BLACK);
  r(s.x+s.w*.6+2,eyeY+2,3,3,BLACK);
}

function drawPlayer(){
  if(P.inv>0&&Math.floor(P.inv/3)%2===0)return;
  const fl=P.flash>0?WHITE:PLAYER;
  r(P.x-2,GY-2,P.w+4,4,'rgba(0,0,0,0.2)');
  r(P.x,P.y-P.h,P.w,P.h,fl);
  r(P.x+2,P.y-P.h+2,P.w-4,P.h-4,PLAYER_D);
  r(P.x+(P.face>0?P.w-8:4),P.y-P.h+8,6,6,WHITE);
  r(P.x+(P.face>0?P.w-6:6),P.y-P.h+10,3,3,BLACK);
  if(!P.jmp){
    const l=Math.floor(frame/6)%2;
    r(P.x+4,P.y,l?8:4,4,PLAYER_D);
    r(P.x+P.w-8,P.y,l?4:8,4,PLAYER_D);
  }
}

function drawBullets(){
  bul.forEach(b=>{
    r(b.x,b.y,10,4,WHITE);
    r(b.x-4,b.y+1,4,2,'rgba(255,255,255,0.3)');
  });
}

function drawHUD(){
  ctx.fillStyle='#8888aa';ctx.font='10px "Press Start 2P",monospace';ctx.textAlign='left';
  ctx.fillText('HP',12,22);
  for(let i=0;i<P.maxHp;i++){
    r(50+i*22,12,18,14,i<P.hp?HP_FULL:HP_EMPTY);
    r(52+i*22,14,14,10,i<P.hp?'#66ee66':'#444455');
  }
  ctx.textAlign='right';
  ctx.fillText('KEYS: '+keys,canvas.width-12,22);
  ctx.fillText('ROOM '+(room+1),canvas.width-12,42);
  ctx.textAlign='left';
  ctx.fillText('SCORE: '+Math.floor(score),12,42);
}

function drawBossHP(){
  if(!boss)return;
  const bw=300,bh=16,bx=(canvas.width-bw)/2,by=52;
  ctx.fillStyle='#8888aa';ctx.font='8px "Press Start 2P",monospace';ctx.textAlign='center';
  ctx.fillText('SLIME KING',canvas.width/2,by-4);
  r(bx,by,bw,bh,'#333344');
  const hp=Math.max(0,boss.hp/boss.mhp);
  r(bx+2,by+2,(bw-4)*hp,bh-4,HP_BOSS);
  r(bx+2,by+2,(bw-4)*hp,bh/2-2,'#ff6666');
  ctx.strokeStyle='#666688';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,bh);
  ctx.fillStyle=WHITE;ctx.font='8px "Press Start 2P",monospace';
  ctx.fillText(Math.ceil(boss.hp)+'/'+boss.mhp,canvas.width/2,by+bh+12);
}

function drawMenu(){
  ctx.fillStyle=BLACK;ctx.fillRect(0,0,canvas.width,canvas.height);
  
  for(let i=0;i<20;i++){
    const x=(i*47+frame*.3)%canvas.width;
    const y=(i*31+Math.sin(frame*.02+i)*20)%canvas.height;
    const s=3+Math.sin(frame*.05+i)*2;
    const grad=ctx.createRadialGradient(x,y,0,x,y,s*3);
    grad.addColorStop(0,'rgba(100,255,100,0.3)');
    grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad;
    ctx.fillRect(x-s*3,y-s*3,s*6,s*6);
    r(x-s/2,y-s/2,s,s,SLIME);
  }
  
  ctx.fillStyle=SLIME;ctx.font='32px "Press Start 2P",monospace';ctx.textAlign='center';
  ctx.fillText('SLIME',canvas.width/2,canvas.height/2-80);
  ctx.fillStyle=WHITE;ctx.font='28px "Press Start 2P",monospace';
  ctx.fillText('DUNGEON',canvas.width/2,canvas.height/2-40);
  
  ctx.fillStyle='#aaaacc';ctx.font='10px "Press Start 2P",monospace';
  ctx.fillText('Arrow Keys / WASD: Move & Jump',canvas.width/2,canvas.height/2+20);
  ctx.fillText('SPACE: Shoot',canvas.width/2,canvas.height/2+40);
  
  if(Math.floor(frame/30)%2===0){
    ctx.fillStyle=WHITE;ctx.font='12px "Press Start 2P",monospace';
    ctx.fillText('PRESS SPACE TO START',canvas.width/2,canvas.height/2+90);
  }
  
  ctx.fillStyle='#666688';ctx.font='8px "Press Start 2P",monospace';
  ctx.fillText('HIGH SCORE: '+hi,canvas.width/2,canvas.height/2+130);
}

function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle=SLIME_E;ctx.font='28px "Press Start 2P",monospace';ctx.textAlign='center';
  ctx.fillText('GAME OVER',canvas.width/2,canvas.height/2-30);
  ctx.fillStyle=WHITE;ctx.font='12px "Press Start 2P",monospace';
  ctx.fillText('Score: '+Math.floor(score),canvas.width/2,canvas.height/2+10);
  ctx.fillText('Rooms: '+(room+1),canvas.width/2,canvas.height/2+35);
  ctx.fillText('Press SPACE to restart',canvas.width/2,canvas.height/2+70);
}

function drawWin(){
  ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#44ff44';ctx.font='24px "Press Start 2P",monospace';ctx.textAlign='center';
  ctx.fillText('YOU WIN!',canvas.width/2,canvas.height/2-40);
  ctx.fillStyle=WHITE;ctx.font='14px "Press Start 2P",monospace';
  ctx.fillText('Final Score: '+Math.floor(score),canvas.width/2,canvas.height/2+10);
  ctx.fillText('Press SPACE to play again',canvas.width/2,canvas.height/2+50);
}

function spawnSlime(bossType){
  const s={
    x:ROOM_W+20+Math.random()*100,
    y:GY,
    w:bossType?80:30+Math.random()*15,
    h:bossType?60:20+Math.random()*10,
    vx:(bossType?2:1+Math.random())*(Math.random()<.5?1:-1),
    hp:bossType?50:2,
    mhp:bossType?50:2,
    boss:bossType,
    flash:0,
    dir:1,
    chargeTimer:0,
    charging:false
  };
  if(bossType){
    s.x=ROOM_W-200;
    s.y=GY;
    boss=s;
    snd('boss');
  }else{
    slimes.push(s);
  }
}

function spawnParticles(x,y,n,col){
  for(let i=0;i<n;i++){
    particles.push({
      x,y,
      vx:(Math.random()-.5)*4,
      vy:-Math.random()*4-1,
      s:2+Math.random()*3,
      l:1,
      c:col||SLIME
    });
  }
}

function resetRoom(){
  slimes.length=0;
  bul.length=0;
  particles.length=0;
  boss=null;
  bossSpawned=false;
  torches.length=0;
  
  for(let i=0;i<4;i++){
    torches.push({x:80+i*(ROOM_W-160)/3,y:60});
  }
  torches.push({x:ROOM_W/2,y:80});
  
  const numSlimes=2+Math.min(room,5);
  for(let i=0;i<numSlimes;i++){
    const delay=i*60;
    setTimeout(()=>{
      if(state==='play'){
        spawnSlime(false);
      }
    },delay);
  }
  
  if(room>0&&room%3===0&&!bossSpawned){
    setTimeout(()=>{
      if(state==='play'){
        spawnSlime(true);
        bossSpawned=true;
      }
    },1000);
  }
  
  P.x=60;P.y=GY;P.vy=0;P.jmp=false;P.inv=60;
}

function reset(){
  state='play';score=0;room=0;keys=0;frame=0;shake=0;
  P.hp=P.maxHp;P.inv=0;P.flash=0;P.scd=0;
  camX=0;targetCamX=0;
  resetRoom();
}

function checkDoorCollision(){
  const d=exitDoor;
  if(P.x+P.w>d.x&&P.x<d.x+d.w&&P.y>d.y&&P.y-P.h<d.y+d.h){
    room++;
    score+=50;
    snd('door');
    resetRoom();
  }
}

function checkSlimeCollision(s){
  if(P.inv>0)return false;
  return P.x+P.w>s.x+4&&P.x<s.x+s.w-4&&P.y>s.y+s.h*.3&&P.y-P.h<s.y+s.h;
}

function update(){
  if(state!=='play')return;
  frame++;
  score+=1/60;
  
  if(shake>0)shake--;
  if(P.inv>0)P.inv--;
  if(P.flash>0)P.flash--;
  if(P.scd>0)P.scd--;
  
  P.y+=P.vy;
  if(P.y>=GY){P.y=GY;P.vy=0;P.jmp=false;}
  if(P.jmp)P.vy+=0.5;
  
  P.x=Math.max(0,Math.min(ROOM_W-P.w,P.x));
  
  for(let i=bul.length-1;i>=0;i--){
    bul[i].x+=bul[i].vx;
    if(bul[i].x<0||bul[i].x>ROOM_W){bul.splice(i,1);continue;}
    
    for(let j=slimes.length-1;j>=0;j--){
      const s=slimes[j];
      if(bul[i].x>s.x&&bul[i].x<s.x+s.w&&bul[i].y>s.y&&bul[i].y<s.y+s.h){
        s.hp--;s.flash=6;bul.splice(i,1);
        spawnParticles(bul[i]?.x||s.x+s.w/2,bul[i]?.y||s.y,4);
        if(s.hp<=0){
          snd('kill');
          spawnParticles(s.x+s.w/2,s.y+s.h/2,10);
          score+=10;
          slimes.splice(j,1);
        }
        break;
      }
    }
    
    if(boss&&bul[i]&&bul[i].x>boss.x&&bul[i].x<boss.x+boss.w&&bul[i].y>boss.y&&bul[i].y<boss.y+boss.h){
      boss.hp--;boss.flash=6;
      spawnParticles(bul[i].x,bul[i].y,6,SLIME_BOSS);
      bul.splice(i,1);
      if(boss.hp<=0){
        snd('kill');
        snd('win');
        spawnParticles(boss.x+boss.w/2,boss.y+boss.h/2,30,SLIME_BOSS);
        score+=200;
        boss=null;
      }
    }
  }
  
  slimes.forEach(s=>{
    s.x+=s.vx*s.dir;
    if(s.x<20||s.x>ROOM_W-s.w-20)s.dir*=-1;
    if(s.flash>0)s.flash--;
    
    if(checkSlimeCollision(s)){
      P.hp--;P.inv=60;P.flash=10;snd('hurt');shake=8;
      spawnParticles(P.x+P.w/2,P.y-P.h/2,8,PLAYER);
      if(P.hp<=0){
        state='over';
        if(score>hi){hi=Math.floor(score);localStorage.setItem('slimeHi',hi);}
      }
    }
  });
  
  if(boss){
    boss.chargeTimer++;
    if(boss.flash>0)boss.flash--;
    
    if(!boss.charging&&boss.chargeTimer>90){
      boss.charging=true;
      boss.chargeTimer=0;
      boss.vx=(P.x>boss.x?5:-5);
      snd('boss');
    }
    
    if(boss.charging){
      boss.x+=boss.vx;
      if(boss.x<20||boss.x>ROOM_W-boss.w-20){
        boss.vx*=-1;
        boss.charging=false;
        boss.chargeTimer=0;
      }
    }else{
      boss.x+=Math.sin(frame*.03)*2;
    }
    
    if(checkSlimeCollision(boss)){
      P.hp--;P.inv=90;P.flash=10;snd('hurt');shake=12;
      spawnParticles(P.x+P.w/2,P.y-P.h/2,12,PLAYER);
      if(P.hp<=0){
        state='over';
        if(score>hi){hi=Math.floor(score);localStorage.setItem('slimeHi',hi);}
      }
    }
  }
  
  checkDoorCollision();
  
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.l-=0.02;
    if(p.l<=0)particles.splice(i,1);
  }
}

function shoot(){
  if(P.scd>0||bul.length>=6)return;
  P.scd=12;snd('shoot');
  bul.push({x:P.x+(P.face>0?P.w:0),y:P.y-P.h/2,vx:P.face*8});
}

function draw(){
  ctx.save();
  if(shake>0)ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
  
  if(state==='menu'){drawMenu();ctx.restore();return;}
  
  drawRoom();
  drawDoor(exitDoor);
  drawBullets();
  slimes.forEach(s=>drawSlime(s));
  if(boss)drawSlime(boss);
  drawPlayer();
  particles.forEach(p=>{
    ctx.globalAlpha=p.l;
    r(p.x-p.s/2,p.y-p.s/2,p.s,p.s,p.c);
  });
  ctx.globalAlpha=1;
  
  if(flash>0){ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(0,0,canvas.width,ROOM_H);}
  ctx.restore();
  
  ctx.fillStyle='#222233';ctx.fillRect(0,ROOM_H,canvas.width,60);
  drawHUD();
  if(boss)drawBossHP();
  if(state==='over')drawGameOver();
  if(state==='win')drawWin();
}

function loop(){
  update();draw();requestAnimationFrame(loop);
}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'){
    e.preventDefault();
    if(state==='menu'||state==='over'||state==='win')reset();
    else if(state==='play')shoot();
  }
  if(e.code==='ArrowRight'||e.code==='KeyD'){
    e.preventDefault();
    if(state==='play'){P.x+=6;P.face=1;}
  }
  if(e.code==='ArrowLeft'||e.code==='KeyA'){
    e.preventDefault();
    if(state==='play'){P.x-=6;P.face=-1;}
  }
  if(e.code==='ArrowUp'||e.code==='KeyW'){
    e.preventDefault();
    if(state==='play'&&!P.jmp){P.jmp=true;P.vy=-10;snd('jump');}
  }
});

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0],rect=canvas.getBoundingClientRect();
  const x=t.clientX-rect.left;
  if(state!=='play'){reset();return;}
  if(x>canvas.width*.6)shoot();
  else if(x<canvas.width*.3){P.x-=6;P.face=-1;}
  else if(!P.jmp){P.jmp=true;P.vy=-10;snd('jump');}
});

window.addEventListener('resize',()=>{
  canvas.width=Math.min(window.innerWidth-20,900);
  canvas.height=Math.min(window.innerHeight-20,600);
});

loop();
</script>
</body>
</html>
