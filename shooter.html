<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Square Shooter</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
    }

    #gameContainer {
      position: relative;
      border: 4px solid #535353;
      background: #f7f7f7;
    }

    #gameCanvas { display: block; }

    #instructions {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      color: #535353;
      font-size: 9px;
      text-align: center;
      white-space: nowrap;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    #instructions.hidden { opacity: 0; }

    .night #gameContainer {
      background: #1a1a2e;
      border-color: #f7f7f7;
    }
    .night #instructions { color: #f7f7f7; }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="instructions">W: Jump | S: Duck | SPACE: Shoot</div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('gameContainer');
    const instructions = document.getElementById('instructions');

    canvas.width = Math.min(800, window.innerWidth - 40);
    canvas.height = 250;
    ctx.imageSmoothingEnabled = false;

    // --- State ---
    const GameState = { IDLE: 0, PLAYING: 1, GAME_OVER: 2 };
    let state = GameState.IDLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('sqshooterHS')) || 0;
    let gameSpeed = 4;
    let frameCount = 0;
    let isNight = false;
    let lastMilestone = 0;

    const GROUND_Y = canvas.height - 24;
    const GRAVITY = 0.55;
    const JUMP_VEL = -11;
    const MAX_AMMO = 10;
    const RELOAD_TIME = 60; // frames (~1s at 60fps)

    // --- Player ---
    const player = {
      x: 80, y: GROUND_Y,
      size: 32,
      duckSize: 20,
      duckWidth: 40,
      velY: 0,
      isJumping: false,
      isDucking: false,
      ammo: MAX_AMMO,
      reloading: false,
      reloadTimer: 0,
      squash: 1,
      stretch: 1,
      shootCooldown: 0,
      doubleShot: false,
      doubleShotTimer: 0
    };

    // --- Boss ---
    let boss = null;
    let bossSpawned = false;

    // --- Pools ---
    const bullets = [];
    const enemies = [];
    const particles = [];
    const clouds = [];
    const groundMarks = [];

    // Clouds
    for (let i = 0; i < 5; i++) {
      clouds.push({
        x: Math.random() * canvas.width,
        y: 15 + Math.random() * 50,
        w: 30 + Math.random() * 40, h: 8 + Math.random() * 6,
        speed: 0.2 + Math.random() * 0.3
      });
    }
    // Ground marks
    for (let i = 0; i < 15; i++) {
      groundMarks.push({
        x: Math.random() * canvas.width,
        y: GROUND_Y + 4 + Math.random() * 14,
        size: 1 + Math.random() * 2
      });
    }

    // --- Audio ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function snd(type) {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      const t = audioCtx.currentTime;
      switch (type) {
        case 'jump':
          o.type = 'square';
          o.frequency.setValueAtTime(200, t);
          o.frequency.exponentialRampToValueAtTime(500, t + 0.08);
          g.gain.setValueAtTime(0.1, t);
          g.gain.exponentialRampToValueAtTime(0.01, t + 0.08);
          o.start(t); o.stop(t + 0.08); break;
        case 'shoot':
          o.type = 'square';
          o.frequency.setValueAtTime(800, t);
          o.frequency.exponentialRampToValueAtTime(200, t + 0.06);
          g.gain.setValueAtTime(0.08, t);
          g.gain.exponentialRampToValueAtTime(0.01, t + 0.06);
          o.start(t); o.stop(t + 0.06); break;
        case 'hit':
          o.type = 'sawtooth';
          o.frequency.setValueAtTime(100, t);
          g.gain.setValueAtTime(0.15, t);
          g.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
          o.start(t); o.stop(t + 0.15); break;
        case 'kill':
          o.type = 'sine';
          o.frequency.setValueAtTime(600, t);
          o.frequency.exponentialRampToValueAtTime(1200, t + 0.08);
          g.gain.setValueAtTime(0.1, t);
          g.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
          o.start(t); o.stop(t + 0.1); break;
        case 'reload':
          o.type = 'sine';
          o.frequency.setValueAtTime(400, t);
          o.frequency.exponentialRampToValueAtTime(600, t + 0.1);
          g.gain.setValueAtTime(0.06, t);
          g.gain.exponentialRampToValueAtTime(0.01, t + 0.12);
          o.start(t); o.stop(t + 0.12); break;
        case 'milestone':
          o.type = 'sine';
          o.frequency.setValueAtTime(800, t);
          g.gain.setValueAtTime(0.08, t);
          g.gain.exponentialRampToValueAtTime(0.01, t + 0.06);
          o.start(t); o.stop(t + 0.06); break;
        case 'boss':
          o.type = 'sawtooth';
          o.frequency.setValueAtTime(150, t);
          o.frequency.exponentialRampToValueAtTime(50, t + 0.3);
          g.gain.setValueAtTime(0.12, t);
          g.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
          o.start(t); o.stop(t + 0.3); break;
        case 'powerup':
          o.type = 'sine';
          o.frequency.setValueAtTime(400, t);
          o.frequency.exponentialRampToValueAtTime(1000, t + 0.15);
          g.gain.setValueAtTime(0.1, t);
          g.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
          o.start(t); o.stop(t + 0.2); break;
      }
    }

    // --- Drawing ---
    function drawPlayer() {
      const p = player;
      const bg = isNight ? '#1a1a2e' : '#f7f7f7';
      const col = '#535353';

      let w, h, y;
      if (p.isDucking) {
        w = p.duckWidth;
        h = p.duckSize;
        y = GROUND_Y - h;
      } else {
        w = p.size * p.stretch;
        h = p.size * p.squash;
        y = p.y - h;
      }
      const x = p.x;

      // Shadow under player
      ctx.fillStyle = 'rgba(0,0,0,0.1)';
      ctx.fillRect(x - 2, GROUND_Y - 2, w + 4, 4);

      // Main body
      ctx.fillStyle = col;
      ctx.fillRect(x, y, w, h);

      // Face - eye
      ctx.fillStyle = bg;
      ctx.fillRect(x + w - 10, y + 6, 5, 5);
      ctx.fillStyle = col;
      ctx.fillRect(x + w - 8, y + 7, 2, 3);

      // Mouth (open when shooting)
      ctx.fillStyle = bg;
      if (p.shootCooldown > 5) {
        ctx.fillRect(x + w - 10, y + 14, 6, 4);
      } else {
        ctx.fillRect(x + w - 8, y + 15, 4, 2);
      }

      // Legs (when not ducking and on ground)
      if (!p.isDucking && !p.isJumping) {
        const leg = Math.floor(frameCount / 5) % 2;
        ctx.fillStyle = col;
        ctx.fillRect(x + 4, y + h, 6, leg ? 8 : 5);
        ctx.fillRect(x + w - 10, y + h, 6, leg ? 5 : 8);
        // Feet
        ctx.fillRect(x + 2, y + h + (leg ? 8 : 5), 10, 3);
        ctx.fillRect(x + w - 12, y + h + (leg ? 5 : 8), 10, 3);
      }

      // Gun barrel
      if (!p.isDucking) {
        ctx.fillStyle = col;
        ctx.fillRect(x + w - 2, y + 12, 10, 4);
        ctx.fillRect(x + w + 4, y + 10, 4, 8);
      } else {
        ctx.fillRect(x + w - 2, y + 4, 10, 4);
        ctx.fillRect(x + w + 4, y + 2, 4, 8);
      }
    }

    function drawBullets() {
      ctx.fillStyle = '#535353';
      bullets.forEach(b => {
        ctx.fillRect(b.x, b.y, 10, 4);
        // Trail
        ctx.fillStyle = 'rgba(83,83,83,0.3)';
        ctx.fillRect(b.x - 6, b.y + 1, 6, 2);
        ctx.fillStyle = '#535353';
      });
    }

    function drawEnemies() {
      enemies.forEach(e => {
        ctx.fillStyle = '#535353';
        if (e.type === 'walker') {
          const leg = Math.floor(frameCount / 4) % 2;
          ctx.fillRect(e.x, e.y - e.h, e.w, e.h);
          ctx.fillStyle = isNight ? '#1a1a2e' : '#f7f7f7';
          ctx.fillRect(e.x + 3, e.y - e.h + 3, 4, 4);
          ctx.fillStyle = '#535353';
          ctx.fillRect(e.x + 4, e.y - e.h + 4, 2, 2);
          ctx.fillRect(e.x + 2, e.y, 4, leg ? 6 : 3);
          ctx.fillRect(e.x + e.w - 6, e.y, 4, leg ? 3 : 6);
        } else if (e.type === 'flyer') {
          const wing = Math.sin(frameCount * 0.2) * 4;
          ctx.fillRect(e.x, e.y - e.h / 2, e.w, e.h);
          ctx.fillRect(e.x - 4, e.y - e.h / 2 - 4 + wing, 6, 4);
          ctx.fillRect(e.x + e.w - 2, e.y - e.h / 2 - 4 - wing, 6, 4);
          ctx.fillStyle = isNight ? '#1a1a2e' : '#f7f7f7';
          ctx.fillRect(e.x + 4, e.y - e.h / 2 + 3, 3, 3);
        }
      });
    }

    function drawBoss() {
      if (!boss) return;
      const b = boss;
      const col = '#535353';
      const bg = isNight ? '#1a1a2e' : '#f7f7f7';

      // Body - big cube with angry face
      ctx.fillStyle = col;
      ctx.fillRect(b.x, b.y, b.w, b.h);

      // Inner border
      ctx.fillStyle = bg;
      ctx.fillRect(b.x + 3, b.y + 3, b.w - 6, b.h - 6);

      // Inner body
      ctx.fillStyle = col;
      ctx.fillRect(b.x + 6, b.y + 6, b.w - 12, b.h - 12);

      // Angry eyes
      ctx.fillStyle = bg;
      ctx.fillRect(b.x + 12, b.y + 16, 12, 10);
      ctx.fillRect(b.x + 40, b.y + 16, 12, 10);
      ctx.fillStyle = col;
      ctx.fillRect(b.x + 16, b.y + 19, 5, 5);
      ctx.fillRect(b.x + 44, b.y + 19, 5, 5);

      // Angry eyebrows
      ctx.fillStyle = col;
      ctx.fillRect(b.x + 10, b.y + 12, 14, 3);
      ctx.fillRect(b.x + 16, b.y + 9, 8, 3);
      ctx.fillRect(b.x + 40, b.y + 12, 14, 3);
      ctx.fillRect(b.x + 40, b.y + 9, 8, 3);

      // Mouth
      ctx.fillStyle = bg;
      ctx.fillRect(b.x + 18, b.y + 42, 28, 6);
      ctx.fillStyle = col;
      ctx.fillRect(b.x + 20, b.y + 44, 4, 4);
      ctx.fillRect(b.x + 28, b.y + 44, 4, 4);
      ctx.fillRect(b.x + 36, b.y + 44, 4, 4);

      // Legs (stomping animation)
      const stomp = Math.floor(frameCount / 8) % 2;
      ctx.fillStyle = col;
      ctx.fillRect(b.x + 8, b.y + b.h, 12, stomp ? 10 : 6);
      ctx.fillRect(b.x + b.w - 20, b.y + b.h, 12, stomp ? 6 : 10);

      // HP bar above boss
      const barW = b.w + 10;
      const barH = 8;
      const barX = b.x - 5;
      const barY = b.y - 18;
      ctx.fillStyle = bg;
      ctx.fillRect(barX, barY, barW, barH);
      ctx.fillStyle = col;
      ctx.fillRect(barX, barY, barW, barH * (b.hp / b.maxHp));
      ctx.strokeStyle = col;
      ctx.lineWidth = 1;
      ctx.strokeRect(barX, barY, barW, barH);

      // "BOSS" label
      ctx.fillStyle = col;
      ctx.font = '8px "Press Start 2P", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('BOSS', b.x + b.w / 2, barY - 4);
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.fillStyle = `rgba(83,83,83,${p.life})`;
        ctx.fillRect(p.x, p.y, p.size, p.size);
      });
    }

    function drawClouds() {
      const col = isNight ? '#2a2a4a' : '#e0e0e0';
      ctx.fillStyle = col;
      clouds.forEach(c => {
        ctx.fillRect(c.x, c.y, c.w, c.h);
        ctx.fillRect(c.x + 8, c.y - 4, c.w * 0.4, 6);
        ctx.fillRect(c.x + c.w * 0.4, c.y - 6, c.w * 0.3, 6);
      });
    }

    function drawGround() {
      ctx.fillStyle = '#535353';
      ctx.fillRect(0, GROUND_Y, canvas.width, 2);
      groundMarks.forEach(m => {
        ctx.fillRect(m.x, m.y, m.size, m.size);
      });
    }

    function drawHUD() {
      const col = isNight ? '#f7f7f7' : '#535353';
      ctx.fillStyle = col;
      ctx.font = '16px "Press Start 2P", monospace';
      ctx.textAlign = 'right';
      ctx.fillText(`HI ${String(highScore).padStart(5, '0')}  ${String(Math.floor(score)).padStart(5, '0')}`, canvas.width - 20, 28);

      // Ammo bar - bottom left
      ctx.textAlign = 'left';
      ctx.font = '10px "Press Start 2P", monospace';
      ctx.fillText('AMMO', 16, canvas.height - 8);

      // Ammo blocks
      const barX = 80;
      const barY = canvas.height - 16;
      for (let i = 0; i < MAX_AMMO; i++) {
        ctx.fillStyle = i < player.ammo ? col : (isNight ? '#333' : '#ccc');
        ctx.fillRect(barX + i * 12, barY, 8, 10);
      }

      // Reload indicator
      if (player.reloading) {
        const pct = player.reloadTimer / RELOAD_TIME;
        ctx.fillStyle = isNight ? '#f7f7f7' : '#535353';
        ctx.fillRect(barX, barY + 12, 8, 120 * pct);
        ctx.font = '8px "Press Start 2P", monospace';
        ctx.fillText('RELOAD', barX + 12, barY + 20);
      }

      // Double shot indicator
      if (player.doubleShot) {
        ctx.fillStyle = isNight ? '#f7f7f7' : '#535353';
        ctx.font = '10px "Press Start 2P", monospace';
        ctx.textAlign = 'center';
        ctx.fillText('DOUBLE SHOT', canvas.width / 2, 28);
      }
    }

    function drawGameOver() {
      ctx.fillStyle = isNight ? '#f7f7f7' : '#535353';
      ctx.font = '20px "Press Start 2P", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
      ctx.font = '10px "Press Start 2P", monospace';
      ctx.fillText('Press any key to restart', canvas.width / 2, canvas.height / 2 + 10);
    }

    function drawStartMessage() {
      ctx.fillStyle = isNight ? '#f7f7f7' : '#535353';
      ctx.font = '14px "Press Start 2P", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('Press SPACE to start', canvas.width / 2, canvas.height / 2);
    }

    // --- Spawning ---
    function spawnEnemy() {
      const type = Math.random() < 0.5 ? 'walker' : 'flyer';
      let y, w, h;

      if (type === 'walker') {
        w = 16 + Math.random() * 10;
        h = 16 + Math.random() * 8;
        y = GROUND_Y;
      } else {
        w = 18; h = 12;
        y = GROUND_Y - 50 - Math.random() * 50;
      }

      enemies.push({
        x: canvas.width + 20, y, w, h, type, hp: 1
      });
    }

    function spawnBoss() {
      boss = {
        x: canvas.width + 40,
        y: GROUND_Y - 70,
        w: 64, h: 64,
        hp: 20,
        maxHp: 20,
        vx: -1.5,
        phase: 'entering',
        timer: 0
      };
    }

    function spawnParticles(x, y, count) {
      for (let i = 0; i < count; i++) {
        particles.push({
          x, y,
          vx: (Math.random() - 0.5) * 4,
          vy: (Math.random() - 1) * 3,
          size: 2 + Math.random() * 3,
          life: 1
        });
      }
    }

    // --- Collision ---
    function rectsOverlap(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x &&
             a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function playerHitbox() {
      const p = player;
      if (p.isDucking) {
        return { x: p.x + 4, y: GROUND_Y - p.duckSize + 2, w: p.duckWidth - 8, h: p.duckSize - 4 };
      }
      const h = p.size * p.squash;
      return { x: p.x + 4, y: p.y - h + 2, w: p.size - 8, h: h - 4 };
    }

    // --- Update ---
    function update() {
      if (state !== GameState.PLAYING) return;
      frameCount++;
      score += 1 / 6;
      gameSpeed = Math.min(12, 4 + score * 0.001 + Math.floor(score / 100) * 0.3);

      if (Math.floor(score / 100) > lastMilestone) {
        lastMilestone = Math.floor(score / 100);
        snd('milestone');
      }

      // Day/night
      const shouldBeNight = Math.floor(score / 700) % 2 === 1;
      if (shouldBeNight !== isNight) {
        isNight = shouldBeNight;
        container.classList.toggle('night', isNight);
      }

      // Shooting cooldown
      if (player.shootCooldown > 0) player.shootCooldown--;

      // Reload
      if (player.reloading) {
        player.reloadTimer++;
        if (player.reloadTimer >= RELOAD_TIME) {
          player.ammo = MAX_AMMO;
          player.reloading = false;
          player.reloadTimer = 0;
          snd('reload');
        }
      }

      // Squash/stretch recovery
      player.squash += (1 - player.squash) * 0.15;
      player.stretch += (1 - player.stretch) * 0.15;

      // Jump physics
      if (player.isJumping) {
        player.velY += GRAVITY;
        player.y += player.velY;
        if (player.y >= GROUND_Y) {
          player.y = GROUND_Y;
          player.velY = 0;
          player.isJumping = false;
          player.squash = 0.7;
          player.stretch = 1.3;
        }
      }

      // Ground marks
      groundMarks.forEach(m => {
        m.x -= gameSpeed;
        if (m.x < -5) {
          m.x = canvas.width + 5;
          m.y = GROUND_Y + 4 + Math.random() * 14;
        }
      });

      // Clouds
      clouds.forEach(c => {
        c.x -= c.speed;
        if (c.x + c.w < 0) {
          c.x = canvas.width + 10;
          c.y = 15 + Math.random() * 50;
        }
      });

      // Bullets
      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].x += bullets[i].vx;
        if (bullets[i].x > canvas.width + 20) bullets.splice(i, 1);
      }

      // Enemies
      const spawnRate = score > 400 ? 0.025 : (score > 200 ? 0.02 : 0.015);
      const minGap = score > 400 ? 120 : 160;

      // Spawn boss at 200 points
      if (score >= 200 && !bossSpawned && !boss) {
        spawnBoss();
        bossSpawned = true;
        snd('boss');
      }

      // Don't spawn regular enemies while boss is active
      if (!boss && Math.random() < spawnRate && (enemies.length === 0 || enemies[enemies.length - 1].x < canvas.width - minGap)) {
        spawnEnemy();
      }

      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        e.x -= gameSpeed * (e.type === 'flyer' ? 1.2 : 1);

        // Bob flyers
        if (e.type === 'flyer') {
          e.y += Math.sin(frameCount * 0.1 + i) * 0.5;
        }

        if (e.x < -40) { enemies.splice(i, 1); continue; }

        // Bullet collision
        for (let j = bullets.length - 1; j >= 0; j--) {
          const b = bullets[j];
          if (rectsOverlap({ x: b.x, y: b.y, w: 10, h: 4 }, { x: e.x, y: e.y - e.h, w: e.w, h: e.h })) {
            e.hp--;
            bullets.splice(j, 1);
            spawnParticles(e.x + e.w / 2, e.y - e.h / 2, 4);
            if (e.hp <= 0) {
              snd('kill');
              spawnParticles(e.x + e.w / 2, e.y - e.h / 2, 8);
              score += 10;
              enemies.splice(i, 1);
              break;
            }
          }
        }

        // Player collision
        if (e.hp > 0 && rectsOverlap(playerHitbox(), { x: e.x, y: e.y - e.h, w: e.w, h: e.h })) {
          state = GameState.GAME_OVER;
          snd('hit');
          spawnParticles(player.x + player.size / 2, player.y - player.size / 2, 15);
          if (score > highScore) {
            highScore = Math.floor(score);
            localStorage.setItem('sqshooterHS', highScore);
          }
        }
      }

      // --- Boss logic ---
      if (boss) {
        const b = boss;

        if (b.phase === 'entering') {
          b.x += b.vx;
          if (b.x <= canvas.width - 120) {
            b.x = canvas.width - 120;
            b.phase = 'fighting';
          }
        } else if (b.phase === 'fighting') {
          // Bob up and down
          b.y = GROUND_Y - 70 + Math.sin(frameCount * 0.04) * 20;
          // Slowly creep left
          b.x += Math.sin(frameCount * 0.02) * 0.5;
        }

        // Bullet collision with boss
        for (let j = bullets.length - 1; j >= 0; j--) {
          const bul = bullets[j];
          if (rectsOverlap({ x: bul.x, y: bul.y, w: 10, h: 4 }, { x: b.x, y: b.y, w: b.w, h: b.h })) {
            b.hp--;
            bullets.splice(j, 1);
            spawnParticles(bul.x, bul.y, 3);
            if (b.hp <= 0) {
              snd('kill');
              snd('powerup');
              spawnParticles(b.x + b.w / 2, b.y + b.h / 2, 25);
              score += 50;
              player.doubleShot = true;
              player.doubleShotTimer = 0;
              boss = null;
              break;
            }
          }
        }

        // Player collision with boss
        if (boss && rectsOverlap(playerHitbox(), { x: b.x, y: b.y, w: b.w, h: b.h })) {
          state = GameState.GAME_OVER;
          snd('hit');
          spawnParticles(player.x + player.size / 2, player.y - player.size / 2, 15);
          if (score > highScore) {
            highScore = Math.floor(score);
            localStorage.setItem('sqshooterHS', highScore);
          }
        }
      }

      // Particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.1;
        p.life -= 0.03;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function shoot() {
      if (player.reloading || player.ammo <= 0 || player.shootCooldown > 0) return;
      player.ammo--;
      player.shootCooldown = 8;
      snd('shoot');

      const gunX = player.x + (player.isDucking ? player.duckWidth : player.size) + 6;
      const gunY = player.isDucking ? GROUND_Y - player.duckSize + 6 : player.y - player.size * player.squash + 14;

      bullets.push({ x: gunX, y: gunY, vx: 14 });

      if (player.doubleShot) {
        bullets.push({ x: gunX, y: gunY - 10, vx: 14 });
      }

      if (player.ammo <= 0) {
        player.reloading = true;
        player.reloadTimer = 0;
      }
    }

    // --- Draw ---
    function draw() {
      ctx.fillStyle = isNight ? '#1a1a2e' : '#f7f7f7';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawClouds();
      drawGround();
      drawBullets();
      drawEnemies();
      drawBoss();
      drawParticles();
      drawPlayer();

      if (state === GameState.PLAYING || state === GameState.GAME_OVER) drawHUD();

      if (state === GameState.IDLE) {
        drawStartMessage();
        instructions.classList.remove('hidden');
      } else {
        instructions.classList.add('hidden');
      }

      if (state === GameState.GAME_OVER) drawGameOver();
    }

    function resetGame() {
      state = GameState.PLAYING;
      score = 0;
      gameSpeed = 4;
      frameCount = 0;
      lastMilestone = 0;
      player.y = GROUND_Y;
      player.velY = 0;
      player.isJumping = false;
      player.isDucking = false;
      player.ammo = MAX_AMMO;
      player.reloading = false;
      player.reloadTimer = 0;
      player.shootCooldown = 0;
      player.squash = 1;
      player.stretch = 1;
      player.doubleShot = false;
      player.doubleShotTimer = 0;
      boss = null;
      bossSpawned = false;
      bullets.length = 0;
      enemies.length = 0;
      particles.length = 0;
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // --- Input ---
    document.addEventListener('keydown', e => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (state === GameState.IDLE) {
          resetGame();
        } else if (state === GameState.PLAYING) {
          shoot();
        } else if (state === GameState.GAME_OVER) {
          resetGame();
        }
      }

      if (e.code === 'KeyW' || e.code === 'ArrowUp') {
        e.preventDefault();
        if (state === GameState.PLAYING && !player.isJumping) {
          player.isJumping = true;
          player.isDucking = false;
          player.velY = JUMP_VEL;
          player.squash = 1.3;
          player.stretch = 0.8;
          snd('jump');
        }
      }

      if (e.code === 'KeyS' || e.code === 'ArrowDown') {
        e.preventDefault();
        if (state === GameState.PLAYING && !player.isJumping) {
          player.isDucking = true;
        }
      }
    });

    document.addEventListener('keyup', e => {
      if (e.code === 'KeyS' || e.code === 'ArrowDown') {
        player.isDucking = false;
      }
    });

    // Touch support
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const t = e.touches[0];
      const rect = canvas.getBoundingClientRect();
      const y = t.clientY - rect.top;
      const x = t.clientX - rect.left;

      if (state === GameState.IDLE || state === GameState.GAME_OVER) {
        resetGame();
        return;
      }

      if (x > canvas.width * 0.6) {
        shoot();
      } else if (y < canvas.height * 0.4) {
        if (!player.isJumping) {
          player.isJumping = true;
          player.velY = JUMP_VEL;
          player.squash = 1.3;
          player.stretch = 0.8;
          snd('jump');
        }
      } else {
        player.isDucking = true;
      }
    });

    canvas.addEventListener('touchend', () => { player.isDucking = false; });

    gameLoop();
  </script>
</body>
</html>
