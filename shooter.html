<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dino Shooter</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a0a;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Press Start 2P',monospace;overflow:hidden}
    canvas{display:block;border:2px solid #333}
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
ctx.imageSmoothingEnabled=false;

// Colors
const SKY='#607D8B',SKYN='#1a1a2e',CLOUD='#CFD8DC',CLOUDN='#37474F',
GROUND='#B0BEC5',GROUNDL='#90A4AE',
FILL='#ECEFF1',OUTLINE='#455A64',DARK='#263238',MID='#607D8B',WHITE='#ECEFF1',
RED='#ef5350',YELLOW='#fdd835',GREEN='#66bb6a';

// State
let state='idle',score=0,hi=parseInt(localStorage.getItem('dinoShooterHi'))||0,speed=3,frame=0,night=false;
let shake=0,flash=0,invuln=0;

const GY=canvas.height-50, GRAV=0.55, JUMP=-13, MAXAM=10, RLD=60;

// Player
const P={x:120,y:GY,w:32,h:32,dh:20,dw:42,vy:0,jmp:false,duck:false,ammo:MAXAM,rl:false,rlt:0,scd:0,hp:3,maxHp:3,flash:0};

// Boss
let boss=null,bossSpawned=false;

// Pools
const bul=[],bbe=[],ene=[],par=[],smk=[],exp=[],cld=[],mrk=[];

// Ground markers
for(let i=0;i<30;i++)mrk.push({x:Math.random()*canvas.width,y:GY+5+Math.random()*25,s:1+Math.random()*3});
for(let i=0;i<10;i++)cld.push({x:Math.random()*canvas.width,y:20+Math.random()*100,w:50+Math.random()*80,h:12+Math.random()*10,s:.1+Math.random()*.3});

// Audio
const AC=new(window.AudioContext||window.webkitAudioContext)();
function snd(t){
  if(AC.state==='suspended')AC.resume();
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);const n=AC.currentTime;
  const f={jump:['square',250,600,.08,.12],shoot:['square',900,200,.05,.08],
    hit:['sawtooth',150,80,.2,.15],kill:['sine',700,1400,.08,.1],
    boss:['sawtooth',60,30,.6,.2],charge:['sawtooth',60,250,.3,.15],
    boom:['sawtooth',200,10,.8,.25],sword:['sawtooth',500,80,.12,.12],
    bshoot:['square',150,60,.12,.12],phase:['square',300,900,.2,.15],
    reload:['sine',500,700,.08,.06],ding:['sine',800,800,.06,.1],
    hurt:['sawtooth',200,100,.15,.2'],death:['sawtooth',400,50,.5,.3]}[t];
  if(!f)return;
  o.type=f[0];o.frequency.setValueAtTime(f[1],n);o.frequency.exponentialRampToValueAtTime(f[2],n+f[3]);
  g.gain.setValueAtTime(f[4],n);g.gain.exponentialRampToValueAtTime(.001,n+f[3]+.02);
  o.start(n);o.stop(n+f[3]+.03);
}

// Drawing helpers
function r(x,y,w,h,c){ctx.fillStyle=c||FILL;ctx.fillRect(x|0,y|0,w|0,h|0);}

function drawHP(){
  const hx=16,hy=16;
  ctx.font='10px "Press Start 2P",monospace';ctx.textAlign='left';
  ctx.fillStyle=night?WHITE:OUTLINE;ctx.fillText('HP',hx,hy+12);
  for(let i=0;i<P.maxHp;i++){
    const c=i<P.hp?(P.hp===1?RED:GREEN):(night?DARK:MID);
    r(hx+30+i*28,hy,22,18,c);
    r(hx+32+i*22,hy+2,18,14,i<P.hp?FILL:(night?'#1a1a1a':'#555'));
  }
}

function drawPlayer(){
  const p=P,bg=night?SKYN:SKY;
  let w,h,y;
  if(p.duck){w=p.dw;h=p.dh;y=GY-h;}else{w=p.w;h=p.h;y=p.y-h;}
  const x=p.x;
  // Invulnerability flash
  if(invuln>0&&Math.floor(invuln/3)%2===0)return;
  const fl=p.flash>0?WHITE:FILL;
  // Shadow
  r(x-2,GY-2,w+4,5,'rgba(0,0,0,0.1)');
  // Body
  r(x,y,w,h,fl);r(x+2,y+2,w-4,h-4,fl);
  // Eye
  r(x+w-10,y+5,6,6,bg);r(x+w-8,y+7,3,3,OUTLINE);
  // Gun
  if(!p.duck){r(x+w-2,y+14,16,5,OUTLINE);r(x+w+10,y+12,6,9,OUTLINE);}
  else{r(x+w-2,y+5,16,5,OUTLINE);r(x+w+10,y+3,6,9,OUTLINE);}
  // Legs
  if(!p.duck&&!p.jmp){
    const l=Math.floor(frame/5)%2;
    r(x+3,y+h,8,l?10:4,OUTLINE);r(x+w-11,y+h,8,l?4:10,OUTLINE);
  }
}

function drawBullets(){bul.forEach(b=>{r(b.x,b.y,14,4,WHITE);r(b.x-8,b.y+1,8,2,'rgba(228,228,228,0.3)');});}
function drawBB(){bbe.forEach(b=>{r(b.x,b.y,b.z,b.z,DARK);r(b.x+2,b.y+2,b.z-4,b.z-4,MID);});}

function drawEne(){
  ene.forEach(e=>{
    if(e.t==='g'){
      const l=Math.floor(frame/4)%2;
      r(e.x,e.y-e.h,e.w,e.h,DARK);r(e.x+2,e.y-e.h+2,e.w-4,e.h-4,OUTLINE);
      r(e.x+4,e.y-e.h+4,6,6,RED);r(e.x+5,e.y-e.h+5,4,4,DARK);
      r(e.x+2,e.y,6,l?8:3,DARK);r(e.x+e.w-8,e.y,6,l?3:8,DARK);
    }else{
      const w=Math.sin(frame*.2)*8;
      r(e.x,e.y-e.h/2,e.w,e.h,OUTLINE);r(e.x+2,e.y-e.h/2+2,e.w-4,e.h-4,MID);
      r(e.x-8,e.y-e.h/2-8+w,10,8,OUTLINE);r(e.x+e.w-2,e.y-e.h/2-8-w,10,8,OUTLINE);
      r(e.x+6,e.y-e.h/2+4,6,6,RED);r(e.x+7,e.y-e.h/2+5,4,4,OUTLINE);
    }
  });
}

function drawKnightBoss(b){
  const p2=b.phase2,sc=p2?1.3:1,bx=b.x,by=b.y;
  const mc=b.flash>0?WHITE:FILL,bob=Math.sin(frame*(p2?.06:.03))*(p2?8:4);
  
  // Aura (phase 2)
  if(p2){
    ctx.fillStyle=`rgba(200,50,50,${.08+Math.sin(frame*.1)*.04})`;
    ctx.beginPath();ctx.arc(bx+b.w/2*sc,by+b.h/2*sc+bob,b.w*.8*sc,0,Math.PI*2);ctx.fill();
  }
  
  // Shadow
  r(bx-10*sc,GY-3,(b.w+20)*sc,6,'rgba(0,0,0,0.15)');
  
  // Legs
  r(bx+20*sc,by+90*sc+bob,18*sc,35*sc,mc);r(bx+15*sc,by+120*sc+bob,24*sc,18*sc,mc);r(bx+10*sc,by+134*sc+bob,32*sc,10*sc,OUTLINE);
  r(bx+82*sc,by+90*sc+bob,18*sc,35*sc,mc);r(bx+78*sc,by+120*sc+bob,24*sc,18*sc,mc);r(bx+74*sc,by+134*sc+bob,32*sc,10*sc,OUTLINE);
  r(bx+20*sc,by+118*sc+bob,14*sc,8*sc,DARK);r(bx+84*sc,by+118*sc+bob,14*sc,8*sc,DARK);
  
  // Body armor
  r(bx+8*sc,by+25*sc+bob,104*sc,68*sc,mc);r(bx+12*sc,by+30*sc+bob,96*sc,58*sc,OUTLINE);r(bx+18*sc,by+35*sc+bob,84*sc,48*sc,mc);
  // Chest core
  const cf=b.cflash>0;
  r(bx+45*sc,by+42*sc+bob,30*sc,22*sc,cf?YELLOW:DARK);r(bx+50*sc,by+47*sc+bob,20*sc,12*sc,mc);
  if(p2){r(bx+52*sc,by+50*sc+bob,16*sc,6*sc,RED);}
  // Belt
  r(bx+10*sc,by+85*sc+bob,100*sc,10*sc,OUTLINE);r(bx+45*sc,by+86*sc+bob,30*sc,8*sc,DARK);
  
  // Left arm with shield
  const sb=Math.sin(frame*.05)*4;
  r(bx-15*sc,by+32*sc+bob+sb,16*sc,30*sc,mc);r(bx-18*sc,by+58*sc+bob+sb,20*sc,16*sc,mc);
  r(bx-35*sc,by+35*sc+bob+sb,20*sc,42*sc,OUTLINE);r(bx-33*sc,by+39*sc+bob+sb,16*sc,34*sc,DARK);
  r(bx-31*sc,by+45*sc+bob+sb,12*sc,22*sc,OUTLINE);
  // Shield emblem
  r(bx-29*sc,by+50*sc+bob+sb,8*sc,8*sc,p2?RED:WHITE);
  
  // Right arm with sword
  let sa=0;if(b.ap==='sword')sa=Math.sin(b.at*.2)*50;if(b.ap==='fire')sa=-25;
  r(bx+118*sc,by+32*sc+bob-sa/25,16*sc,30*sc,mc);r(bx+120*sc,by+58*sc+bob-sa/25,18*sc,16*sc,mc);
  // Sword blade
  r(bx+135*sc,by+5*sc+bob-sa/10,10*sc,55*sc,p2?RED:MID);r(bx+137*sc,by+8*sc+bob-sa/10,6*sc,50*sc,WHITE);
  r(bx+132*sc,by+60*sc+bob-sa/25,18*sc,8*sc,OUTLINE);r(bx+138*sc,by+66*sc+bob-sa/25,8*sc,14*sc,mc);
  
  // Head with helmet
  r(bx+25*sc,by-8*sc+bob,70*sc,38*sc,mc);r(bx+30*sc,by-18*sc+bob,60*sc,14*sc,OUTLINE);
  // Visor
  r(bx+28*sc,by+2*sc+bob,12*sc,18*sc,DARK);r(bx+30*sc,by+5*sc+bob,10*sc,12*sc,mc);
  r(bx+32*sc,by+8*sc+bob,5*sc,5*sc,p2?RED:WHITE);
  // Mouth grill
  r(bx+25*sc,by+22*sc+bob,14*sc,8*sc,OUTLINE);
  for(let i=0;i<3;i++)r(bx+27*sc,by+(23+i*2)*sc+bob,10*sc,1*sc,mc);
  // Helmet horns
  r(bx+52*sc,by-25*sc+bob,10*sc,14*sc,OUTLINE);r(bx+48*sc,by-32*sc+bob,18*sc,10*sc,OUTLINE);r(bx+50*sc,by-40*sc+bob,14*sc,10*sc,OUTLINE);
  // Side vents
  r(bx+22*sc,by-12*sc+bob,8*sc,18*sc,MID);r(bx+18*sc,by-18*sc+bob,10*sc,10*sc,MID);
  r(bx+90*sc,by-12*sc+bob,8*sc,18*sc,MID);r(bx+92*sc,by-18*sc+bob,10*sc,10*sc,MID);
  // Jaw detail
  r(bx+24*sc,by+28*sc+bob,16*sc,8*sc,OUTLINE);
  
  // Phase 2 flame effects
  if(p2&&frame%3===0){
    for(let i=0;i<2;i++){
      par.push({x:bx+Math.random()*b.w*sc,y:by-40*sc+bob,vx:(Math.random()-.5)*2,vy:-2-Math.random()*2,s:3+Math.random()*4,l:1,c:RED});
    }
  }
}

function drawBoss(){
  if(!boss)return;
  const b=boss;
  
  if(b.t==='knight'){
    if(b.ph==='trans'){
      ctx.fillStyle=`rgba(255,50,50,${Math.sin(b.tt*.3)*.1+.08})`;
      ctx.fillRect(0,0,canvas.width,canvas.height);
    }
    drawKnightBoss(b);
  }
  
  // HP bar
  const hp=b.dhp/b.mhp,bw=300,bh=16,bx=(canvas.width-bw)/2,by=40;
  ctx.fillStyle=night?WHITE:OUTLINE;ctx.font='10px "Press Start 2P",monospace';ctx.textAlign='center';
  ctx.fillText(b.lbl,canvas.width/2,by-10);
  r(bx,by,bw,bh,night?DARK:MID);
  const hpColor=b.phase2?RED:OUTLINE;
  r(bx+2,by+2,(bw-4)*hp,bh-4,hpColor);
  if(b.flash>0)r(bx+2,by+2,(bw-4)*hp,bh-4,'rgba(255,255,255,0.4)');
  ctx.strokeStyle=OUTLINE;ctx.lineWidth=2;ctx.strokeRect(bx,by,bw,bh);
  // Segments
  ctx.fillStyle=night?SKYN:SKY;
  for(let i=1;i<20;i++)ctx.fillRect(bx+(bw/20)*i,by+1,1,bh-2);
  ctx.fillStyle=night?WHITE:OUTLINE;ctx.font='8px "Press Start 2P",monospace';
  ctx.fillText(Math.ceil(b.hp)+'/'+b.mhp,canvas.width/2,by+bh+14);
  if(b.phase2){ctx.fillStyle=RED;ctx.fillText('PHASE 2 - FURY MODE',canvas.width/2,by+bh+28);}
}

function drawClouds(){
  ctx.fillStyle=night?CLOUDN:CLOUD;
  cld.forEach(c=>{
    ctx.fillRect(c.x,c.y,c.w,c.h);
    ctx.fillRect(c.x+10,c.y-6,c.w*.4,8);
    ctx.fillRect(c.x+c.w*.4,c.y-10,c.w*.3,8);
  });
}

function drawGround(){
  r(0,GY,canvas.width,4,GROUNDL);
  r(0,GY+4,canvas.width,canvas.height-GY-4,GROUND);
  mrk.forEach(m=>{r(m.x,m.y,m.s,m.s,GROUNDL);});
}

function drawSmk(){smk.forEach(p=>{r(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz,p.c);});}
function drawExp(){
  exp.forEach(p=>{
    ctx.fillStyle=p.c;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);
    ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
  });
}
function drawPar(){par.forEach(p=>{r(p.x,p.y,p.s,p.s,p.c);});}

function drawHUD(){
  ctx.fillStyle=night?WHITE:OUTLINE;ctx.font='18px "Press Start 2P",monospace';ctx.textAlign='right';
  ctx.fillText('HI '+String(hi).padStart(5,'0'),canvas.width-20,30);
  ctx.fillText(String(Math.floor(score)).padStart(5,'0'),canvas.width-20,55);
  
  // Ammo bar
  ctx.textAlign='left';ctx.font='10px "Press Start 2P",monospace';ctx.fillStyle=night?WHITE:OUTLINE;
  ctx.fillText('AMMO',16,canvas.height-12);
  const ax=90,ay=canvas.height-24;
  for(let i=0;i<MAXAM;i++){
    const c=i<P.ammo?(P.ammo<=3?RED:OUTLINE):(night?DARK:MID);
    r(ax+i*16,ay,12,14,c);
  }
  if(P.rl){
    const pct=P.rlt/RLD;
    r(ax,ay+18,12,60*pct,DARK);
    ctx.font='8px "Press Start 2P",monospace';ctx.fillStyle=night?WHITE:OUTLINE;
    ctx.fillText('RELOADING',ax+20,ay+24);
  }
  
  drawHP();
}

function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle=RED;ctx.font='28px "Press Start 2P",monospace';ctx.textAlign='center';
  ctx.fillText('GAME OVER',canvas.width/2,canvas.height/2-30);
  ctx.fillStyle=WHITE;ctx.font='12px "Press Start 2P",monospace';
  ctx.fillText('Score: '+Math.floor(score),canvas.width/2,canvas.height/2+10);
  ctx.fillText('Press SPACE to restart',canvas.width/2,canvas.height/2+40);
}

function drawIdle(){
  ctx.fillStyle=night?WHITE:OUTLINE;ctx.font='24px "Press Start 2P",monospace';ctx.textAlign='center';
  ctx.fillText('DINO SHOOTER',canvas.width/2,canvas.height/2-50);
  ctx.font='12px "Press Start 2P",monospace';
  ctx.fillText('SPACE: Shoot | W: Jump | S: Duck',canvas.width/2,canvas.height/2);
  ctx.fillStyle=RED;ctx.font='10px "Press Start 2P",monospace';
  ctx.fillText('Press SPACE to start',canvas.width/2,canvas.height/2+40);
  // Blinking
  if(Math.floor(frame/30)%2===0){
    ctx.fillStyle=WHITE;ctx.font='10px "Press Start 2P",monospace';
    ctx.fillText('Press SPACE to start',canvas.width/2,canvas.height/2+40);
  }
}

// Spawn
function spawnE(){
  const t=Math.random()<.5?'g':'f';
  let y,w,h;
  if(t==='g'){w=18+Math.random()*12;h=18+Math.random()*10;y=GY;}
  else{w=30;h=22;y=GY-90-Math.random()*80;}
  ene.push({x:canvas.width+30,y,w,h,t,hp:1});
}

function spawnBoss(){
  boss={t:'knight',x:canvas.width+100,y:GY-150,w:140,h:150,hp:80,mhp:80,dhp:80,
    ph:'enter',phase2:false,ap:'idle',at:0,st:0,si:120,flash:0,cflash:0,lbl:'KNIGHT COMMANDER',
    hx:canvas.width-200,tt:0,dt:0};
  snd('boss');
}

function sp(x,y,n){for(let i=0;i<n;i++)par.push({x,y,vx:(Math.random()-.5)*6,vy:(Math.random()-1)*5,s:2+Math.random()*4,l:1,c:FILL});}
function spS(x,y,n){for(let i=0;i<n;i++)smk.push({x:x+(Math.random()-.5)*25,y:y+(Math.random()-.5)*25,vx:(Math.random()-.5)*2,vy:-1-Math.random()*2,sz:5+Math.random()*10,l:1,c:`rgba(${100+Math.random()*50|0},${100+Math.random()*50|0},${100+Math.random()*50|0},0.4)`});}
function spE(bx,by,bw,bh){
  shake=25;flash=8;
  for(let i=0;i<25;i++){
    exp.push({x:bx+Math.random()*bw,y:by+Math.random()*bh,vx:(Math.random()-.5)*10,vy:(Math.random()-1)*8,
      w:5+Math.random()*14,h:5+Math.random()*14,l:1,c:[FILL,WHITE,RED,YELLOW][Math.floor(Math.random()*4)],r:(Math.random()-.5)*.4});
  }
  sp(bx+bw/2,by+bh/2,30);spS(bx+bw/2,by+bh/2,8);
}

function ro(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function phb(){const p=P;if(p.duck)return{x:p.x+4,y:GY-p.dh+3,w:p.dw-8,h:p.dh-6};return{x:p.x+4,y:p.y-p.h+3,w:p.w-8,h:p.h-6};}

function playerHit(){
  if(invuln>0)return;
  P.hp--;
  P.flash=10;
  invuln=90; // 1.5 seconds of invulnerability
  snd('hurt');
  shake=10;flash=5;
  sp(P.x+P.w/2,P.y-P.h/2,10);
  if(P.hp<=0){
    state='over';
    snd('death');
    sp(P.x+P.w/2,P.y-P.h/2,20);
    if(score>hi){hi=Math.floor(score);localStorage.setItem('dinoShooterHi',hi);}
  }
}

// Update
function update(){
  if(state!=='play')return;
  frame++;
  score+=1/6;
  speed=Math.min(12,3+score*.001+Math.floor(score/100)*.25);
  if(shake>0)shake--;
  if(flash>0)flash--;
  if(invuln>0)invuln--;
  if(P.flash>0)P.flash--;
  
  // Night cycle
  const sn=Math.floor(score/700)%2===1;
  if(sn!==night)night=sn;
  
  // Auto-reload
  if(P.rl){
    P.rlt++;
    if(P.rlt>=RLD){P.ammo=MAXAM;P.rl=false;P.rlt=0;snd('reload');}
  }else if(P.ammo<MAXAM&&P.scd===0&&frame%12===0){
    P.ammo=Math.min(MAXAM,P.ammo+1);
  }
  
  // Player physics
  P.y+=P.vy;
  if(P.y>=GY){P.y=GY;P.vy=0;P.jmp=false;}
  if(P.jmp)P.vy+=GRAV;
  
  // Scrolling
  mrk.forEach(m=>{m.x-=speed;if(m.x<-5){m.x=canvas.width+5;m.y=GY+5+Math.random()*25;}});
  cld.forEach(c=>{c.x-=c.s;if(c.x+c.w<0){c.x=canvas.width+10;c.y=20+Math.random()*100;}});
  
  // Bullets
  for(let i=bul.length-1;i>=0;i--){
    bul[i].x+=bul[i].vx;
    if(bul[i].x>canvas.width+20)bul.splice(i,1);
  }
  
  // Boss bullets
  for(let i=bbe.length-1;i>=0;i--){
    const b=bbe[i];b.x+=b.vx;b.y+=b.vy;
    if(b.x<-20||b.x>canvas.width+20||b.y<-20||b.y>canvas.height+20){bbe.splice(i,1);continue;}
    if(ro(phb(),{x:b.x,y:b.y,w:b.z,h:b.z})){
      bbe.splice(i,1);
      playerHit();
      if(state!=='play')return;
    }
  }
  
  // Spawn boss at score 200
  if(score>=200&&!bossSpawned&&!boss){spawnBoss();bossSpawned=true;}
  
  // Spawn enemies
  const br=boss?.008:(score>400?.025:(score>200?.018:.014));
  const mg=boss?250:(score>400?150:200);
  if(Math.random()<br&&(ene.length===0||ene[ene.length-1].x<canvas.width-mg))spawnE();
  
  // Enemies
  for(let i=ene.length-1;i>=0;i--){
    const e=ene[i];
    e.x-=speed*(e.t==='f'?1.3:1);
    if(e.t==='f')e.y+=Math.sin(frame*.1+i)*1.5;
    if(e.x<-40){ene.splice(i,1);continue;}
    
    // Bullet-enemy collision
    for(let j=bul.length-1;j>=0;j--){
      const b=bul[j];
      const hx=e.t==='f'?e.x-8:e.x;
      const hy=e.t==='f'?e.y-e.h-8:e.y-e.h;
      const hw=e.t==='f'?e.w+16:e.w;
      const hh=e.t==='f'?e.h+16:e.h;
      if(ro({x:b.x,y:b.y,w:14,h:4},{x:hx,y:hy,w:hw,h:hh})){
        e.hp--;bul.splice(j,1);sp(e.x+e.w/2,e.y-e.h/2,4);
        if(e.hp<=0){snd('kill');sp(e.x+e.w/2,e.y-e.h/2,10);score+=10;ene.splice(i,1);break;}
      }
    }
    
    // Enemy-player collision
    if(e.hp>0&&ro(phb(),{x:e.x,y:e.y-e.h,w:e.w,h:e.h})){
      playerHit();
      if(state!=='play'){ene.splice(i,1);continue;}
      ene.splice(i,1);
    }
  }
  
  // Boss logic
  if(boss){
    const b=boss;
    if(b.flash>0)b.flash--;
    if(b.cflash>0)b.cflash--;
    b.dhp+=(b.hp-b.dhp)*.1;
    
    if(b.t==='knight'){
      if(b.ph==='trans'){
        b.tt++;
        b.y=GY-150+Math.sin(b.tt*.08)*20;
        if(b.tt%6===0)spE(b.x+Math.random()*b.w,b.y+Math.random()*b.h,30,30);
        if(b.tt>90){
          b.ph='fight';b.phase2=true;b.w=180;b.h=180;b.y=GY-180;
          b.hx=canvas.width-250;b.x=b.hx;b.si=80;b.ap='idle';b.at=0;
          flash=15;shake=20;
        }
      }
      else if(b.ph==='enter'){
        b.x-=2;
        if(b.x<=b.hx){b.x=b.hx;b.ph='fight';b.ap='idle';b.at=0;}
      }
      else if(b.ph==='fight'){
        const bs=b.phase2?.05:.025;
        const ba=b.phase2?10:5;
        b.y=(b.phase2?GY-180:GY-150)+Math.sin(frame*bs)*ba;
        b.at++;
        
        const iv=b.phase2?b.si*.4:b.si;
        if(b.ap==='idle'){
          b.st++;
          if(b.st>=iv){
            b.st=0;
            const rr=Math.random();
            if(rr<(b.phase2?.3:.35)){b.ap='fire';b.at=0;}
            else if(rr<(b.phase2?.6:.65)){b.ap='sword';b.at=0;}
            else{b.ap='stomp';b.at=0;}
          }
        }
        else if(b.ap==='fire'){
          const fr=b.phase2?8:15;
          if(b.at%fr===0&&b.at<=fr*(b.phase2?6:3)){
            snd('bshoot');
            const dx=P.x-b.x,dy=(P.y-P.h/2)-(b.y+50),dist=Math.sqrt(dx*dx+dy*dy);
            const spd=b.phase2?5:3.5;
            bbe.push({x:b.x-5,y:b.y+(b.phase2?30:15),vx:(dx/dist)*spd,vy:(dy/dist)*spd,z:b.phase2?12:9});
          }
          if(b.at>70)b.ap='idle';
        }
        else if(b.ap==='sword'){
          if(b.at===12)snd('sword');
          if(b.phase2&&b.at%12===0&&b.at<45){
            bbe.push({x:b.x+120,y:b.y+70,vx:2.5,vy:Math.sin(b.at*.2)*4,z:12});
          }
          if(b.at>(b.phase2?40:50))b.ap='idle';
        }
        else if(b.ap==='stomp'){
          if(b.at===18){
            snd('bshoot');
            bbe.push({x:b.x+70,y:GY-10,vx:-5,vy:0,z:16});
            bbe.push({x:b.x+70,y:GY-10,vx:5,vy:0,z:16});
            if(b.phase2){
              bbe.push({x:b.x+70,y:GY-10,vx:-3,vy:-2.5,z:12});
              bbe.push({x:b.x+70,y:GY-10,vx:3,vy:-2.5,z:12});
            }
          }
          if(b.at>(b.phase2?30:45))b.ap='idle';
        }
        
        // Phase transition at 50% health
        if(!b.phase2&&b.hp<=b.mhp*.5){
          b.ph='trans';b.tt=0;b.ap='idle';snd('phase');flash=18;shake=25;
        }
      }
      else if(b.ph==='die'){
        b.dt++;
        if(b.dt===5)spE(b.x,b.y,b.w*.3,b.h*.3);
        if(b.dt===15)spE(b.x+b.w*.5,b.y,b.w*.3,b.h*.3);
        if(b.dt===25)spE(b.x+b.w*.7,b.y+20,b.w*.3,b.h*.3);
        if(b.dt===35)spE(b.x+10,b.y+b.h*.5,b.w*.5,b.h*.3);
        if(b.dt===45)spE(b.x+b.w*.3,b.y+b.h*.6,b.w*.4,b.h*.3);
        if(b.dt===55){spE(b.x+b.w/2,b.y+b.h/2,b.w,b.h);shake=35;flash=12;}
        if(b.dt===70){snd('boom');snd('death');sp(b.x+b.w/2,b.y+b.h/2,60);}
        if(b.dt>90){score+=150;boss=null;}
      }
    }
    
    // Boss-player collision
    if(boss&&boss.ph!=='die'&&boss.ph!=='trans'&&ro(phb(),{x:boss.x,y:boss.y,w:boss.w,h:boss.h})){
      playerHit();
      if(state!=='play')return;
    }
    
    // Bullet-boss collision
    if(boss&&boss.ph!=='die'&&boss.ph!=='trans'){
      for(let j=bul.length-1;j>=0;j--){
        const bl=bul[j];
        let dmg=1;
        if(boss.t==='knight'){
          const sc=boss.phase2?1.3:1;
          // Core weak point = 3x damage
          if(ro({x:bl.x,y:bl.y,w:14,h:4},{x:boss.x+45*sc,y:boss.y+42*sc,w:30*sc,h:22*sc})){
            dmg=4;boss.cflash=10;
          }
          // Leg joints = 2x damage
          else if(ro({x:bl.x,y:bl.y,w:14,h:4},{x:boss.x+20*sc,y:boss.y+118*sc,w:14*sc,h:8*sc}))dmg=2;
          else if(ro({x:bl.x,y:bl.y,w:14,h:4},{x:boss.x+84*sc,y:boss.y+118*sc,w:14*sc,h:8*sc}))dmg=2;
        }
        if(ro({x:bl.x,y:bl.y,w:14,h:4},{x:boss.x,y:boss.y,w:boss.w,h:boss.h})){
          boss.hp-=dmg;boss.flash=6;bul.splice(j,1);
          sp(bl.x,bl.y,dmg>2?8:3);spS(bl.x,bl.y,dmg>2?5:2);
          if(boss.hp<=0){
            boss.ph='die';boss.dt=0;snd('boom');
            break;
          }
        }
      }
    }
  }
  
  // Particles
  for(let i=exp.length-1;i>=0;i--){
    const p=exp[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.l-=.012;p.r+=.02;
    if(p.l<=0)exp.splice(i,1);
  }
  for(let i=smk.length-1;i>=0;i--){
    const p=smk[i];p.x+=p.vx;p.y+=p.vy;p.sz+=.15;p.l-=.018;
    if(p.l<=0)smk.splice(i,1);
  }
  for(let i=par.length-1;i>=0;i--){
    const p=par[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.l-=.035;
    if(p.l<=0)par.splice(i,1);
  }
}

function shoot(){
  if(P.ammo<=0||P.scd>0||P.rl)return;
  P.ammo--;P.scd=8;snd('shoot');
  if(P.ammo<=0){P.rl=true;P.rlt=0;}
  const gx=P.x+(P.duck?P.dw:P.w)+8;
  const gy=P.duck?GY-P.dh+8:P.y-P.h+16;
  bul.push({x:gx,y:gy,vx:18});
}

function draw(){
  ctx.save();
  if(shake>0)ctx.translate((Math.random()-.5)*shake*1.5,(Math.random()-.5)*shake*1.5);
  
  // Sky
  ctx.fillStyle=night?SKYN:SKY;
  ctx.fillRect(0,0,canvas.width,canvas.height);
  
  // Stars at night
  if(night){
    ctx.fillStyle='rgba(255,255,255,0.5)';
    for(let i=0;i<30;i++){
      const sx=(i*137+frame*.1)%canvas.width;
      const sy=(i*97)%((GY-50));
      ctx.fillRect(sx,sy,2,2);
    }
  }
  
  drawClouds();
  drawGround();
  drawBullets();
  drawBB();
  drawEne();
  drawBoss();
  drawSmk();
  drawExp();
  drawPar();
  
  if(flash>0){ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(0,0,canvas.width,canvas.height);}
  ctx.restore();
  
  drawPlayer();
  if(state==='play'||state==='over')drawHUD();
  if(state==='idle')drawIdle();
  if(state==='over')drawGameOver();
}

function reset(){
  state='play';score=0;speed=3;frame=0;shake=0;flash=0;night=false;invuln=0;
  P.y=GY;P.vy=0;P.jmp=false;P.duck=false;P.ammo=MAXAM;P.rl=false;P.rlt=0;P.scd=0;P.hp=P.maxHp;P.flash=0;
  boss=null;bossSpawned=false;
  bul.length=0;bbe.length=0;ene.length=0;par.length=0;smk.length=0;exp.length=0;
}

function loop(){update();draw();requestAnimationFrame(loop);}

// Input
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){
    e.preventDefault();
    if(state==='idle'||state==='over')reset();
    else if(state==='play')shoot();
  }
  if(e.code==='KeyW'||e.code==='ArrowUp'){
    e.preventDefault();
    if(state==='play'&&!P.jmp){P.jmp=true;P.duck=false;P.vy=JUMP;snd('jump');}
  }
  if(e.code==='KeyS'||e.code==='ArrowDown'){
    e.preventDefault();
    if(state==='play'&&!P.jmp)P.duck=true;
  }
});
document.addEventListener('keyup',e=>{
  if(e.code==='KeyS'||e.code==='ArrowDown')P.duck=false;
});

// Touch support
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0],rect=canvas.getBoundingClientRect();
  const y=t.clientY-rect.top,x=t.clientX-rect.left;
  if(state!=='play'){reset();return;}
  if(x>canvas.width*.5)shoot();
  else if(y<canvas.height*.4){if(!P.jmp){P.jmp=true;P.vy=JUMP;snd('jump');}}
  else P.duck=true;
});
canvas.addEventListener('touchend',()=>{P.duck=false;});

// Resize
window.addEventListener('resize',()=>{
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
});

loop();
</script>
</body>
