<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Square Shooter</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e; display: flex; justify-content: center;
      align-items: center; min-height: 100vh;
      font-family: 'Press Start 2P', monospace; overflow: hidden;
    }
    #gameContainer { position: relative; border: 4px solid #535353; background: #f7f7f7; }
    #gameCanvas { display: block; }
    #instructions {
      position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
      color: #535353; font-size: 9px; text-align: center; white-space: nowrap;
      pointer-events: none; transition: opacity 0.3s;
    }
    #instructions.hidden { opacity: 0; }
    .night #gameContainer { background: #1a1a2e; border-color: #f7f7f7; }
    .night #instructions { color: #f7f7f7; }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="instructions">W: Jump | S: Duck | SPACE: Shoot</div>
  </div>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('gameContainer');
    const instructions = document.getElementById('instructions');
    canvas.width = Math.min(800, window.innerWidth - 40);
    canvas.height = 250;
    ctx.imageSmoothingEnabled = false;

    const GameState = { IDLE: 0, PLAYING: 1, GAME_OVER: 2 };
    let state = GameState.IDLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('sqshooterHS')) || 0;
    let gameSpeed = 4;
    let frameCount = 0;
    let isNight = false;
    let lastMilestone = 0;
    let shakeTimer = 0;
    let shakeIntensity = 0;

    const GROUND_Y = canvas.height - 24;
    const GRAVITY = 0.55;
    const JUMP_VEL = -11;
    const MAX_AMMO = 10;
    const RELOAD_TIME = 60;

    const player = {
      x: 80, y: GROUND_Y, size: 32, duckSize: 20, duckWidth: 40,
      velY: 0, isJumping: false, isDucking: false,
      ammo: MAX_AMMO, reloading: false, reloadTimer: 0,
      squash: 1, stretch: 1, shootCooldown: 0,
      doubleShot: false, tripleShot: false, damageFlash: 0
    };

    let boss = null;
    let boss1Spawned = false;
    let boss2Spawned = false;

    const bullets = [];
    const bossBullets = [];
    const enemies = [];
    const particles = [];
    const explosionParts = [];
    const clouds = [];
    const groundMarks = [];

    for (let i = 0; i < 5; i++) clouds.push({ x: Math.random()*canvas.width, y: 15+Math.random()*50, w: 30+Math.random()*40, h: 8+Math.random()*6, speed: 0.2+Math.random()*0.3 });
    for (let i = 0; i < 15; i++) groundMarks.push({ x: Math.random()*canvas.width, y: GROUND_Y+4+Math.random()*14, size: 1+Math.random()*2 });

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function snd(type) {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination); const t = audioCtx.currentTime;
      switch(type) {
        case 'jump': o.type='square'; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(500,t+0.08); g.gain.setValueAtTime(0.1,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.08); o.start(t); o.stop(t+0.08); break;
        case 'shoot': o.type='square'; o.frequency.setValueAtTime(800,t); o.frequency.exponentialRampToValueAtTime(200,t+0.06); g.gain.setValueAtTime(0.08,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.06); o.start(t); o.stop(t+0.06); break;
        case 'hit': o.type='sawtooth'; o.frequency.setValueAtTime(100,t); g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.15); o.start(t); o.stop(t+0.15); break;
        case 'kill': o.type='sine'; o.frequency.setValueAtTime(600,t); o.frequency.exponentialRampToValueAtTime(1200,t+0.08); g.gain.setValueAtTime(0.1,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.1); o.start(t); o.stop(t+0.1); break;
        case 'reload': o.type='sine'; o.frequency.setValueAtTime(400,t); o.frequency.exponentialRampToValueAtTime(600,t+0.1); g.gain.setValueAtTime(0.06,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.12); o.start(t); o.stop(t+0.12); break;
        case 'milestone': o.type='sine'; o.frequency.setValueAtTime(800,t); g.gain.setValueAtTime(0.08,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.06); o.start(t); o.stop(t+0.06); break;
        case 'boss': o.type='sawtooth'; o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(50,t+0.3); g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.3); o.start(t); o.stop(t+0.3); break;
        case 'powerup': o.type='sine'; o.frequency.setValueAtTime(400,t); o.frequency.exponentialRampToValueAtTime(1000,t+0.15); g.gain.setValueAtTime(0.1,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.2); o.start(t); o.stop(t+0.2); break;
        case 'bossshoot': o.type='square'; o.frequency.setValueAtTime(120,t); o.frequency.exponentialRampToValueAtTime(60,t+0.1); g.gain.setValueAtTime(0.1,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.12); o.start(t); o.stop(t+0.12); break;
        case 'charge': o.type='sawtooth'; o.frequency.setValueAtTime(80,t); o.frequency.exponentialRampToValueAtTime(300,t+0.2); g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.25); o.start(t); o.stop(t+0.25); break;
        case 'explosion': o.type='sawtooth'; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(30,t+0.5); g.gain.setValueAtTime(0.2,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.5); o.start(t); o.stop(t+0.5); break;
        case 'sword': o.type='sawtooth'; o.frequency.setValueAtTime(300,t); o.frequency.exponentialRampToValueAtTime(100,t+0.12); g.gain.setValueAtTime(0.1,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.15); o.start(t); o.stop(t+0.15); break;
      }
    }

    function drawPlayer() {
      const p = player;
      const bg = isNight ? '#1a1a2e' : '#f7f7f7';
      const col = player.damageFlash > 0 ? '#fff' : '#535353';
      let w, h, y;
      if (p.isDucking) { w=p.duckWidth; h=p.duckSize; y=GROUND_Y-h; }
      else { w=p.size*p.stretch; h=p.size*p.squash; y=p.y-h; }
      const x = p.x;
      ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(x-2,GROUND_Y-2,w+4,4);
      ctx.fillStyle = col; ctx.fillRect(x,y,w,h);
      ctx.fillStyle = bg; ctx.fillRect(x+w-10,y+6,5,5);
      ctx.fillStyle = col; ctx.fillRect(x+w-8,y+7,2,3);
      ctx.fillStyle = bg;
      if (p.shootCooldown>5) ctx.fillRect(x+w-10,y+14,6,4);
      else ctx.fillRect(x+w-8,y+15,4,2);
      if (!p.isDucking && !p.isJumping) {
        const leg = Math.floor(frameCount/5)%2;
        ctx.fillStyle = col;
        ctx.fillRect(x+4,y+h,6,leg?8:5); ctx.fillRect(x+w-10,y+h,6,leg?5:8);
        ctx.fillRect(x+2,y+h+(leg?8:5),10,3); ctx.fillRect(x+w-12,y+h+(leg?5:8),10,3);
      }
      if (!p.isDucking) { ctx.fillStyle=col; ctx.fillRect(x+w-2,y+12,10,4); ctx.fillRect(x+w+4,y+10,4,8); }
      else { ctx.fillRect(x+w-2,y+4,10,4); ctx.fillRect(x+w+4,y+2,4,8); }
    }

    function drawBullets() {
      ctx.fillStyle='#535353';
      bullets.forEach(b=>{ ctx.fillRect(b.x,b.y,10,4); ctx.fillStyle='rgba(83,83,83,0.3)'; ctx.fillRect(b.x-6,b.y+1,6,2); ctx.fillStyle='#535353'; });
    }
    function drawBossBullets() {
      bossBullets.forEach(b=>{
        ctx.fillStyle='#535353'; ctx.fillRect(b.x,b.y,b.size||8,b.size||8);
        ctx.fillStyle=isNight?'#1a1a2e':'#f7f7f7'; ctx.fillRect(b.x+2,b.y+2,(b.size||8)-4,(b.size||8)-4);
        ctx.fillStyle='rgba(83,83,83,0.3)'; ctx.fillRect(b.x+(b.size||8),b.y+2,6,4);
      });
    }
    function drawEnemies() {
      enemies.forEach(e=>{
        ctx.fillStyle='#535353';
        if(e.type==='walker'){
          const leg=Math.floor(frameCount/4)%2;
          ctx.fillRect(e.x,e.y-e.h,e.w,e.h);
          ctx.fillStyle=isNight?'#1a1a2e':'#f7f7f7'; ctx.fillRect(e.x+3,e.y-e.h+3,4,4);
          ctx.fillStyle='#535353'; ctx.fillRect(e.x+4,e.y-e.h+4,2,2);
          ctx.fillRect(e.x+2,e.y,4,leg?6:3); ctx.fillRect(e.x+e.w-6,e.y,4,leg?3:6);
        } else {
          const wing=Math.sin(frameCount*0.25)*6;
          ctx.fillRect(e.x,e.y-e.h/2,e.w,e.h);
          ctx.fillRect(e.x-6,e.y-e.h/2-6+wing,8,6); ctx.fillRect(e.x+e.w-2,e.y-e.h/2-6-wing,8,6);
          ctx.fillStyle=isNight?'#1a1a2e':'#f7f7f7'; ctx.fillRect(e.x+6,e.y-e.h/2+4,5,5);
          ctx.fillStyle='#535353'; ctx.fillRect(e.x+7,e.y-e.h/2+5,3,3);
        }
      });
    }

    function drawKnightBoss(b) {
      const col='#535353'; const bg=isNight?'#1a1a2e':'#f7f7f7';
      const flash=b.hitFlash>0; const bc=flash?'#fff':col;
      const bx=b.x, by=b.y;

      // Legs with joints
      const legAnim=Math.sin(frameCount*0.06)*3;
      ctx.fillStyle=bc;
      // Left leg
      ctx.fillRect(bx+12,by+68,14,20); ctx.fillRect(bx+10,by+86+legAnim,18,12);
      // Right leg
      ctx.fillRect(bx+74,by+68,14,20); ctx.fillRect(bx+72,by+86-legAnim,18,12);
      // Knee joints
      ctx.fillStyle=bg; ctx.fillRect(bx+14,by+82,10,4); ctx.fillRect(bx+76,by+82,10,4);

      // Body/torso
      ctx.fillStyle=bc; ctx.fillRect(bx+8,by+24,84,48);
      // Chest plate detail
      ctx.fillStyle=bg; ctx.fillRect(bx+12,by+28,76,40);
      ctx.fillStyle=bc; ctx.fillRect(bx+16,by+32,68,32);
      // Armor lines
      ctx.fillStyle=bg; ctx.fillRect(bx+48,by+32,4,32);

      // Core weak point (glowing)
      const coreGlow = b.coreFlash > 0;
      ctx.fillStyle = coreGlow ? '#fff' : bg;
      ctx.fillRect(bx+42,by+42,16,16);
      ctx.fillStyle=bc; ctx.fillRect(bx+46,by+46,8,8);

      // Arms with joints
      const armSwing = Math.sin(frameCount*0.08)*4;
      // Left arm (shield arm)
      ctx.fillStyle=bc;
      ctx.fillRect(bx-8,by+30+armSwing,12,24);
      ctx.fillRect(bx-12,by+50+armSwing,16,14);
      // Shield
      ctx.fillRect(bx-18,by+38+armSwing,12,28);
      ctx.fillStyle=bg; ctx.fillRect(bx-16,by+42+armSwing,8,20);
      ctx.fillStyle=bc; ctx.fillRect(bx-14,by+46+armSwing,4,12);
      // Shoulder joint
      ctx.fillStyle=bg; ctx.fillRect(bx-6,by+48+armSwing,8,4);

      // Right arm (sword arm)
      const swordPhase = b.attackPhase;
      let swordAngle = 0;
      if (swordPhase === 'sword_sweep') swordAngle = Math.sin(b.attackTimer * 0.15) * 30;
      ctx.fillStyle=bc;
      ctx.fillRect(bx+96,by+30-armSwing,12,24);
      ctx.fillRect(bx+96,by+50-armSwing,16,14);
      // Shoulder joint
      ctx.fillStyle=bg; ctx.fillRect(bx+98,by+48-armSwing,8,4);
      // Sword
      ctx.fillStyle=bc;
      ctx.fillRect(bx+108,by+20-armSwing-swordAngle/5,6,36);
      ctx.fillRect(bx+106,by+16-armSwing-swordAngle/5,10,6);
      ctx.fillRect(bx+104,by+12-armSwing-swordAngle/5,14,6);

      // Head/Helmet
      ctx.fillStyle=bc; ctx.fillRect(bx+24,by,52,28);
      // Visor
      ctx.fillStyle=bg; ctx.fillRect(bx+30,by+6,40,10);
      // Eyes
      const eyeGlow = b.attackPhase === 'firing';
      ctx.fillStyle = eyeGlow ? '#fff' : bc;
      ctx.fillRect(bx+34,by+8,8,6); ctx.fillRect(bx+58,by+8,8,6);
      // Visor slit
      ctx.fillStyle=bc; ctx.fillRect(bx+46,by+10,8,4);
      // Helmet crest
      ctx.fillRect(bx+44,by-8,12,10);
      ctx.fillRect(bx+42,by-12,16,6);
      ctx.fillRect(bx+46,by-16,8,6);
      // Chin guard
      ctx.fillRect(bx+30,by+20,40,6);

      // Weak point markers (glowing joints)
      if (Math.sin(frameCount*0.2)>0) {
        ctx.fillStyle=bg;
        ctx.fillRect(bx+14,by+82,8,4); // left knee
        ctx.fillRect(bx+78,by+82,8,4); // right knee
        ctx.fillRect(bx-6,by+48+armSwing,6,4); // left shoulder
        ctx.fillRect(bx+100,by+48-armSwing,6,4); // right shoulder
      }
    }

    function drawBoss() {
      if (!boss) return;
      const b = boss;
      const col='#535353'; const bg=isNight?'#1a1a2e':'#f7f7f7';
      const flash=b.hitFlash>0;

      if (b.type === 'knight') {
        drawKnightBoss(b);
      } else if (b.type === 'charger') {
        const bc=flash?'#fff':col;
        const isCharging=b.phase==='charging';
        ctx.fillStyle=bc; ctx.fillRect(b.x,b.y,b.w,b.h);
        for(let i=0;i<5;i++) ctx.fillRect(b.x+8+i*16,b.y-8-(i%2)*4,8,8+(i%2)*4);
        ctx.fillStyle=bg; ctx.fillRect(b.x+4,b.y+4,b.w-8,b.h-8);
        ctx.fillStyle=bc; ctx.fillRect(b.x+8,b.y+8,b.w-16,b.h-16);
        ctx.fillStyle=bg; ctx.fillRect(b.x+14,b.y+18,16,12); ctx.fillRect(b.x+50,b.y+18,16,12);
        ctx.fillStyle=bc; ctx.fillRect(b.x+18,b.y+21,6,6); ctx.fillRect(b.x+54,b.y+21,6,6);
        ctx.fillRect(b.x+12,b.y+14,18,3); ctx.fillRect(b.x+20,b.y+11,10,3);
        ctx.fillRect(b.x+48,b.y+14,18,3); ctx.fillRect(b.x+48,b.y+11,10,3);
        ctx.fillStyle=bg;
        if(isCharging){ctx.fillRect(b.x+20,b.y+44,40,10);ctx.fillStyle=bc;for(let i=0;i<5;i++)ctx.fillRect(b.x+22+i*8,b.y+46,5,5);}
        else{ctx.fillRect(b.x+22,b.y+44,36,6);ctx.fillStyle=bc;for(let i=0;i<4;i++)ctx.fillRect(b.x+24+i*8,b.y+46,4,4);}
        ctx.fillStyle=bc;
        if(isCharging){ctx.fillRect(b.x+4,b.y+b.h,14,12);ctx.fillRect(b.x+b.w-18,b.y+b.h,14,12);}
        else{const stomp=Math.floor(frameCount/10)%2;ctx.fillRect(b.x+10,b.y+b.h,14,stomp?10:6);ctx.fillRect(b.x+b.w-24,b.y+b.h,14,stomp?6:10);}
        ctx.fillRect(b.x-6,b.y+20,6,8); ctx.fillRect(b.x+b.w,b.y+28,6,8);
      }

      // HP Bar
      if (boss) {
        const hpPct = boss.displayHp / boss.maxHp;
        const barW = boss.type === 'knight' ? 260 : 140;
        const barH = 12;
        const barX = (canvas.width - barW) / 2;
        const barY = 40;
        ctx.fillStyle=col; ctx.font='8px "Press Start 2P", monospace'; ctx.textAlign='center';
        ctx.fillText(boss.label, canvas.width/2, barY-6);
        ctx.fillStyle=isNight?'#333':'#ccc'; ctx.fillRect(barX,barY,barW,barH);
        let hpColor;
        if(hpPct>0.6) hpColor=isNight?'#4a4':'#535353';
        else if(hpPct>0.3) hpColor=isNight?'#aa4':'#535353';
        else hpColor=isNight?'#a44':'#535353';
        ctx.fillStyle=hpColor; ctx.fillRect(barX+1,barY+1,(barW-2)*hpPct,barH-2);
        ctx.fillStyle=isNight?'#1a1a2e':'#f7f7f7';
        const segs = boss.type === 'knight' ? 20 : 10;
        for(let i=1;i<segs;i++) ctx.fillRect(barX+(barW/segs)*i,barY+1,1,barH-2);
        ctx.strokeStyle=col; ctx.lineWidth=2; ctx.strokeRect(barX,barY,barW,barH);
        // HP text
        ctx.fillStyle=col; ctx.font='7px "Press Start 2P", monospace';
        ctx.fillText(`${Math.ceil(boss.hp)}/${boss.maxHp}`, canvas.width/2, barY+barH+10);
      }
    }

    function drawExplosionParts() {
      explosionParts.forEach(p => {
        ctx.fillStyle = `rgba(83,83,83,${p.life})`;
        ctx.fillRect(p.x, p.y, p.w, p.h);
      });
    }

    function drawParticles() {
      particles.forEach(p=>{ ctx.fillStyle=`rgba(83,83,83,${p.life})`; ctx.fillRect(p.x,p.y,p.size,p.size); });
    }
    function drawClouds() {
      const col=isNight?'#2a2a4a':'#e0e0e0'; ctx.fillStyle=col;
      clouds.forEach(c=>{ ctx.fillRect(c.x,c.y,c.w,c.h); ctx.fillRect(c.x+8,c.y-4,c.w*0.4,6); ctx.fillRect(c.x+c.w*0.4,c.y-6,c.w*0.3,6); });
    }
    function drawGround() {
      ctx.fillStyle='#535353'; ctx.fillRect(0,GROUND_Y,canvas.width,2);
      groundMarks.forEach(m=>{ ctx.fillRect(m.x,m.y,m.size,m.size); });
    }
    function drawHUD() {
      const col=isNight?'#f7f7f7':'#535353';
      ctx.fillStyle=col; ctx.font='16px "Press Start 2P", monospace'; ctx.textAlign='right';
      ctx.fillText(`HI ${String(highScore).padStart(5,'0')}  ${String(Math.floor(score)).padStart(5,'0')}`,canvas.width-20,28);
      ctx.textAlign='left'; ctx.font='10px "Press Start 2P", monospace';
      ctx.fillText('AMMO',16,canvas.height-8);
      const barX=80, barY=canvas.height-16;
      for(let i=0;i<MAX_AMMO;i++){ctx.fillStyle=i<player.ammo?col:(isNight?'#333':'#ccc');ctx.fillRect(barX+i*12,barY,8,10);}
      if(player.reloading){const pct=player.reloadTimer/RELOAD_TIME;ctx.fillStyle=isNight?'#f7f7f7':'#535353';ctx.fillRect(barX,barY+12,8,120*pct);ctx.font='8px "Press Start 2P", monospace';ctx.fillText('RELOAD',barX+12,barY+20);}
      ctx.textAlign='center';
      if(player.tripleShot){ctx.fillStyle=col;ctx.font='10px "Press Start 2P", monospace';ctx.fillText('TRIPLE SHOT',canvas.width/2,28);}
      else if(player.doubleShot){ctx.fillStyle=col;ctx.font='10px "Press Start 2P", monospace';ctx.fillText('DOUBLE SHOT',canvas.width/2,28);}
    }
    function drawGameOver() {
      ctx.fillStyle=isNight?'#f7f7f7':'#535353'; ctx.font='20px "Press Start 2P", monospace'; ctx.textAlign='center';
      ctx.fillText('GAME OVER',canvas.width/2,canvas.height/2-20);
      ctx.font='10px "Press Start 2P", monospace'; ctx.fillText('Press any key to restart',canvas.width/2,canvas.height/2+10);
    }
    function drawStartMessage() {
      ctx.fillStyle=isNight?'#f7f7f7':'#535353';
      ctx.font='16px "Press Start 2P", monospace'; ctx.textAlign='center';
      ctx.fillText("This is Justin's game",canvas.width/2,canvas.height/2-30);
      ctx.font='12px "Press Start 2P", monospace'; ctx.fillText('Press SPACE to start',canvas.width/2,canvas.height/2+10);
    }

    function spawnEnemy() {
      const type=Math.random()<0.5?'walker':'flyer';
      let y,w,h;
      if(type==='walker'){w=16+Math.random()*10;h=16+Math.random()*8;y=GROUND_Y;}
      else{w=28;h=20;y=GROUND_Y-80-Math.random()*50;}
      enemies.push({x:canvas.width+20,y,w,h,type,hp:1});
    }

    function spawnKnightBoss() {
      boss = {
        type:'knight', x:canvas.width+40, y:GROUND_Y-100,
        w:100, h:100,
        hp:60, maxHp:60, displayHp:60,
        phase:'entering', attackPhase:'idle', attackTimer:0,
        shootTimer:0, shootInterval:150,
        hitFlash:0, coreFlash:0,
        label:'KNIGHT COMMANDER',
        homeX:canvas.width-160,
        weakPoints: { core:true, leftKnee:true, rightKnee:true, leftShoulder:true, rightShoulder:true }
      };
    }

    function spawnBoss2() {
      boss = {
        type:'charger', x:canvas.width+40, y:GROUND_Y-80,
        w:80, h:70, hp:35, maxHp:35, displayHp:35,
        phase:'entering', homeX:canvas.width-140,
        chargeTimer:0, chargeSpeed:0, hitFlash:0,
        label:'CHARGING BOSS'
      };
    }

    function spawnParticles(x,y,count) {
      for(let i=0;i<count;i++) particles.push({x,y,vx:(Math.random()-0.5)*4,vy:(Math.random()-1)*3,size:2+Math.random()*3,life:1});
    }

    function spawnExplosion(bx,by,bw,bh) {
      shakeTimer=30; shakeIntensity=6;
      for(let i=0;i<20;i++){
        explosionParts.push({
          x:bx+Math.random()*bw, y:by+Math.random()*bh,
          vx:(Math.random()-0.5)*8, vy:(Math.random()-1)*6,
          w:4+Math.random()*12, h:4+Math.random()*12,
          life:1, rot:(Math.random()-0.5)*0.2
        });
      }
      spawnParticles(bx+bw/2,by+bh/2,40);
    }

    function rectsOverlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
    function playerHitbox(){
      const p=player;
      if(p.isDucking) return{x:p.x+4,y:GROUND_Y-p.duckSize+2,w:p.duckWidth-8,h:p.duckSize-4};
      const h=p.size*p.squash; return{x:p.x+4,y:p.y-h+2,w:p.size-8,h:h-4};
    }

    function update() {
      if(state!==GameState.PLAYING) return;
      frameCount++;
      score+=1/6;
      gameSpeed=Math.min(12,4+score*0.001+Math.floor(score/100)*0.3);
      if(Math.floor(score/100)>lastMilestone){lastMilestone=Math.floor(score/100);snd('milestone');}

      if(shakeTimer>0) shakeTimer--;

      const shouldBeNight=Math.floor(score/700)%2===1;
      if(shouldBeNight!==isNight){isNight=shouldBeNight;container.classList.toggle('night',isNight);}

      if(player.shootCooldown>0) player.shootCooldown--;
      if(player.damageFlash>0) player.damageFlash--;
      if(player.reloading){player.reloadTimer++;if(player.reloadTimer>=RELOAD_TIME){player.ammo=MAX_AMMO;player.reloading=false;player.reloadTimer=0;snd('reload');}}
      player.squash+=(1-player.squash)*0.15; player.stretch+=(1-player.stretch)*0.15;
      if(player.isJumping){player.velY+=GRAVITY;player.y+=player.velY;if(player.y>=GROUND_Y){player.y=GROUND_Y;player.velY=0;player.isJumping=false;player.squash=0.7;player.stretch=1.3;}}

      groundMarks.forEach(m=>{m.x-=gameSpeed;if(m.x<-5){m.x=canvas.width+5;m.y=GROUND_Y+4+Math.random()*14;}});
      clouds.forEach(c=>{c.x-=c.speed;if(c.x+c.w<0){c.x=canvas.width+10;c.y=15+Math.random()*50;}});
      for(let i=bullets.length-1;i>=0;i--){bullets[i].x+=bullets[i].vx;if(bullets[i].x>canvas.width+20)bullets.splice(i,1);}

      // Boss bullets
      for(let i=bossBullets.length-1;i>=0;i--){
        const bb=bossBullets[i]; bb.x+=bb.vx; bb.y+=bb.vy;
        if(bb.x<-20||bb.x>canvas.width+20||bb.y<-20||bb.y>canvas.height+20){bossBullets.splice(i,1);continue;}
        if(rectsOverlap(playerHitbox(),{x:bb.x,y:bb.y,w:bb.size||8,h:bb.size||8})){
          state=GameState.GAME_OVER; snd('hit');
          spawnParticles(player.x+player.size/2,player.y-player.size/2,15);
          if(score>highScore){highScore=Math.floor(score);localStorage.setItem('sqshooterHS',highScore);}
          return;
        }
      }

      // Boss spawning
      if(score>=200&&!boss1Spawned&&!boss){spawnKnightBoss();boss1Spawned=true;snd('boss');}
      if(score>=700&&!boss2Spawned&&!boss&&boss1Spawned){spawnBoss2();boss2Spawned=true;snd('boss');}

      // Regular enemies
      const baseRate=boss?0.008:(score>400?0.025:(score>200?0.02:0.015));
      const minGap=boss?200:(score>400?120:160);
      if(Math.random()<baseRate&&(enemies.length===0||enemies[enemies.length-1].x<canvas.width-minGap)) spawnEnemy();

      for(let i=enemies.length-1;i>=0;i--){
        const e=enemies[i]; e.x-=gameSpeed*(e.type==='flyer'?1.4:1);
        if(e.type==='flyer') e.y+=Math.sin(frameCount*0.15+i)*1.2;
        if(e.x<-40){enemies.splice(i,1);continue;}
        for(let j=bullets.length-1;j>=0;j--){
          const b=bullets[j];
          const hitW=e.type==='flyer'?e.w+14:e.w; const hitH=e.type==='flyer'?e.h+14:e.h;
          const hitX=e.type==='flyer'?e.x-7:e.x; const hitY=e.type==='flyer'?e.y-e.h-7:e.y-e.h;
          if(rectsOverlap({x:b.x,y:b.y,w:10,h:4},{x:hitX,y:hitY,w:hitW,h:hitH})){
            e.hp--; bullets.splice(j,1); spawnParticles(e.x+e.w/2,e.y-e.h/2,4);
            if(e.hp<=0){snd('kill');spawnParticles(e.x+e.w/2,e.y-e.h/2,8);score+=10;enemies.splice(i,1);break;}
          }
        }
        if(e.hp>0&&rectsOverlap(playerHitbox(),{x:e.x,y:e.y-e.h,w:e.w,h:e.h})){
          state=GameState.GAME_OVER;snd('hit');spawnParticles(player.x+player.size/2,player.y-player.size/2,15);
          if(score>highScore){highScore=Math.floor(score);localStorage.setItem('sqshooterHS',highScore);}
        }
      }

      // Boss logic
      if(boss){
        const b=boss;
        if(b.hitFlash>0) b.hitFlash--;
        if(b.coreFlash>0) b.coreFlash--;
        b.displayHp+=(b.hp-b.displayHp)*0.12;

        if(b.type==='knight'){
          if(b.phase==='entering'){
            b.x-=1.5;
            if(b.x<=b.homeX){b.x=b.homeX;b.phase='fighting';b.attackPhase='idle';b.attackTimer=0;}
          } else if(b.phase==='fighting'){
            b.y=GROUND_Y-100+Math.sin(frameCount*0.03)*10;
            b.attackTimer++;

            // Attack pattern cycling
            if(b.attackPhase==='idle'){
              // Shoot burst every interval
              b.shootTimer++;
              if(b.shootTimer>=b.shootInterval){
                b.shootTimer=0;
                const atkRoll=Math.random();
                if(atkRoll<0.4){ b.attackPhase='firing'; b.attackTimer=0; }
                else if(atkRoll<0.7){ b.attackPhase='sword_sweep'; b.attackTimer=0; }
                else { b.attackPhase='stomp'; b.attackTimer=0; }
              }
            } else if(b.attackPhase==='firing'){
              // Fire 3 projectiles in a spread
              if(b.attackTimer===20||b.attackTimer===35||b.attackTimer===50){
                snd('bossshoot');
                const dx=player.x-b.x; const dy=(player.y-player.size/2)-(b.y+40);
                const dist=Math.sqrt(dx*dx+dy*dy); const spd=3;
                bossBullets.push({x:b.x-5,y:b.y+12,vx:(dx/dist)*spd,vy:(dy/dist)*spd,size:8});
              }
              if(b.attackTimer>60) b.attackPhase='idle';
            } else if(b.attackPhase==='sword_sweep'){
              if(b.attackTimer===15) snd('sword');
              if(b.attackTimer>50) b.attackPhase='idle';
            } else if(b.attackPhase==='stomp'){
              if(b.attackTimer===20) {
                snd('bossshoot');
                // Ground shockwave projectile
                bossBullets.push({x:b.x+40,y:GROUND_Y-6,vx:-3,vy:0,size:12});
                bossBullets.push({x:b.x+40,y:GROUND_Y-6,vx:3,vy:0,size:12});
              }
              if(b.attackTimer>50) b.attackPhase='idle';
            }
          } else if(b.phase==='dying'){
            // Explosion animation
            b.deathTimer++;
            if(b.deathTimer===10) spawnExplosion(b.x,b.y,b.w*0.3,b.h*0.3);
            if(b.deathTimer===25) spawnExplosion(b.x+b.w*0.4,b.y,b.w*0.3,b.h*0.3);
            if(b.deathTimer===40) spawnExplosion(b.x+b.w*0.7,b.y+20,b.w*0.3,b.h*0.3);
            if(b.deathTimer===55) spawnExplosion(b.x+10,b.y+b.h*0.5,b.w*0.5,b.h*0.3);
            if(b.deathTimer>70){
              snd('powerup');
              spawnParticles(b.x+b.w/2,b.y+b.h/2,50);
              score+=100;
              player.doubleShot=true;
              boss=null;
            }
          }
        } else if(b.type==='charger'){
          if(b.phase==='entering'){b.x-=1.5;if(b.x<=b.homeX){b.x=b.homeX;b.phase='idle';b.chargeTimer=0;}}
          else if(b.phase==='idle'){b.y=GROUND_Y-80+Math.sin(frameCount*0.05)*15;b.chargeTimer++;if(b.chargeTimer>=90){b.phase='charging';b.chargeSpeed=10;b.targetY=player.y-player.size;snd('charge');}}
          else if(b.phase==='charging'){b.x-=b.chargeSpeed;const dy=b.targetY-b.y;b.y+=dy*0.08;b.chargeSpeed*=0.99;if(b.x<40||b.chargeSpeed<2)b.phase='retreating';}
          else if(b.phase==='retreating'){b.x+=3;b.y+=(GROUND_Y-80-b.y)*0.05;if(b.x>=b.homeX){b.x=b.homeX;b.phase='idle';b.chargeTimer=0;}}
        }

        // Boss collision with player
        if(boss&&boss.phase!=='dying'&&rectsOverlap(playerHitbox(),{x:b.x,y:b.y,w:b.w,h:b.h})){
          state=GameState.GAME_OVER;snd('hit');spawnParticles(player.x+player.size/2,player.y-player.size/2,15);
          if(score>highScore){highScore=Math.floor(score);localStorage.setItem('sqshooterHS',highScore);} return;
        }

        // Bullet collision with boss
        if(boss&&boss.phase!=='dying'){
          for(let j=bullets.length-1;j>=0;j--){
            const bul=bullets[j];
            let dmg=1; let hitWeak=false;
            if(boss.type==='knight'){
              // Check weak points for extra damage
              if(rectsOverlap({x:bul.x,y:bul.y,w:10,h:4},{x:b.x+42,y:b.y+42,w:16,h:16})){dmg=3;hitWeak=true;b.coreFlash=8;}
              else if(rectsOverlap({x:bul.x,y:bul.y,w:10,h:4},{x:b.x+10,y:b.y+82,w:16,h:8})){dmg=2;hitWeak=true;}
              else if(rectsOverlap({x:bul.x,y:bul.y,w:10,h:4},{x:b.x+74,y:b.y+82,w:16,h:8})){dmg=2;hitWeak=true;}
              else if(rectsOverlap({x:bul.x,y:bul.y,w:10,h:4},{x:b.x-8,y:b.y+48,w:16,h:8})){dmg=2;hitWeak=true;}
              else if(rectsOverlap({x:bul.x,y:bul.y,w:10,h:4},{x:b.x+96,y:b.y+48,w:16,h:8})){dmg=2;hitWeak=true;}
              else if(b.phase==='charging') dmg=0.5;
            } else {
              if(b.phase==='charging') dmg=0.5;
            }

            if(rectsOverlap({x:bul.x,y:bul.y,w:10,h:4},{x:b.x,y:b.y,w:b.w,h:b.h})){
              b.hp-=dmg; b.hitFlash=6; bullets.splice(j,1);
              spawnParticles(bul.x,bul.y,hitWeak?6:3);
              if(b.hp<=0){
                if(b.type==='knight'){
                  b.phase='dying'; b.deathTimer=0;
                  snd('explosion');
                } else {
                  snd('kill'); snd('powerup');
                  spawnParticles(b.x+b.w/2,b.y+b.h/2,30);
                  score+=50; player.tripleShot=true; boss=null;
                }
                break;
              }
            }
          }
        }
      }

      // Explosion parts
      for(let i=explosionParts.length-1;i>=0;i--){
        const p=explosionParts[i];
        p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=0.015;
        if(p.life<=0) explosionParts.splice(i,1);
      }
      // Particles
      for(let i=particles.length-1;i>=0;i--){
        const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life-=0.03;
        if(p.life<=0) particles.splice(i,1);
      }
    }

    function shoot() {
      if(player.reloading||player.ammo<=0||player.shootCooldown>0) return;
      player.ammo--; player.shootCooldown=8; snd('shoot');
      const gunX=player.x+(player.isDucking?player.duckWidth:player.size)+6;
      const gunY=player.isDucking?GROUND_Y-player.duckSize+6:player.y-player.size*player.squash+14;
      bullets.push({x:gunX,y:gunY,vx:14});
      if(player.doubleShot) bullets.push({x:gunX,y:gunY-10,vx:14});
      if(player.tripleShot) bullets.push({x:gunX,y:gunY+10,vx:14});
      if(player.ammo<=0){player.reloading=true;player.reloadTimer=0;}
    }

    function draw() {
      ctx.save();
      if(shakeTimer>0){
        const sx=(Math.random()-0.5)*shakeIntensity;
        const sy=(Math.random()-0.5)*shakeIntensity;
        ctx.translate(sx,sy);
      }
      ctx.fillStyle=isNight?'#1a1a2e':'#f7f7f7'; ctx.fillRect(0,0,canvas.width,canvas.height);
      drawClouds(); drawGround(); drawBullets(); drawBossBullets(); drawEnemies();
      drawBoss(); drawExplosionParts(); drawParticles(); drawPlayer();
      ctx.restore();
      if(state===GameState.PLAYING||state===GameState.GAME_OVER) drawHUD();
      if(state===GameState.IDLE){drawStartMessage();instructions.classList.remove('hidden');}
      else instructions.classList.add('hidden');
      if(state===GameState.GAME_OVER) drawGameOver();
    }

    function resetGame() {
      state=GameState.PLAYING; score=0; gameSpeed=4; frameCount=0; lastMilestone=0;
      shakeTimer=0; shakeIntensity=0;
      player.y=GROUND_Y; player.velY=0; player.isJumping=false; player.isDucking=false;
      player.ammo=MAX_AMMO; player.reloading=false; player.reloadTimer=0;
      player.shootCooldown=0; player.squash=1; player.stretch=1;
      player.doubleShot=false; player.tripleShot=false; player.damageFlash=0;
      boss=null; boss1Spawned=false; boss2Spawned=false;
      bullets.length=0; bossBullets.length=0; enemies.length=0;
      particles.length=0; explosionParts.length=0;
    }

    function gameLoop(){update();draw();requestAnimationFrame(gameLoop);}

    document.addEventListener('keydown',e=>{
      if(e.code==='Space'){e.preventDefault();if(state===GameState.IDLE)resetGame();else if(state===GameState.PLAYING)shoot();else if(state===GameState.GAME_OVER)resetGame();}
      if(e.code==='KeyW'||e.code==='ArrowUp'){e.preventDefault();if(state===GameState.PLAYING&&!player.isJumping){player.isJumping=true;player.isDucking=false;player.velY=JUMP_VEL;player.squash=1.3;player.stretch=0.8;snd('jump');}}
      if(e.code==='KeyS'||e.code==='ArrowDown'){e.preventDefault();if(state===GameState.PLAYING&&!player.isJumping)player.isDucking=true;}
    });
    document.addEventListener('keyup',e=>{if(e.code==='KeyS'||e.code==='ArrowDown')player.isDucking=false;});

    canvas.addEventListener('touchstart',e=>{
      e.preventDefault();const t=e.touches[0];const rect=canvas.getBoundingClientRect();const y=t.clientY-rect.top;const x=t.clientX-rect.left;
      if(state===GameState.IDLE||state===GameState.GAME_OVER){resetGame();return;}
      if(x>canvas.width*0.6)shoot();
      else if(y<canvas.height*0.4){if(!player.isJumping){player.isJumping=true;player.velY=JUMP_VEL;player.squash=1.3;player.stretch=0.8;snd('jump');}}
      else player.isDucking=true;
    });
    canvas.addEventListener('touchend',()=>{player.isDucking=false;});

    gameLoop();
  </script>
</body>
</html>
